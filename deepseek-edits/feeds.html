<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#05080F"/>
<title>Feed — Pulsify</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ══ Exact same CSS variables and base as index.html ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080F;--bg2:#090D1A;--surf:#0D1424;--surf2:#121B30;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  --or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--cy:#00E5FF;
  --pu:#B026FF;--te:#00D4AA;--tx:#F0EEF8;--mu:#5A5870;--mu2:#9997B0;
  --th:58px;--bh:70px
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--or);border-radius:2px}

/* ── Topbar — identical to index.html ── */
.tb{position:fixed;top:0;left:0;right:0;height:var(--th);z-index:800;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(5,8,15,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.06em;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--tx);text-decoration:none}
.dot{width:8px;height:8px;border-radius:50%;background:var(--or);box-shadow:0 0 12px var(--or);animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.back-btn{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--mu2);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;padding:0}
.tb2-btn{background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:7px 16px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.74rem;font-weight:700;cursor:pointer}

/* ── Filter chips — same .cr/.chip as index.html ── */
.cr{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:8px 14px 6px;position:fixed;top:var(--th);left:0;right:0;z-index:100;background:rgba(5,8,15,.95);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.cr::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:50px;border:1px solid var(--border);background:rgba(255,255,255,.02);font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;color:var(--mu);cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.chip.active{border-color:var(--or);color:var(--or);background:rgba(255,92,0,.09)}

/* ── Feed scroll — same as .hi in index.html ── */
.feed{position:fixed;top:calc(var(--th) + 42px);left:0;right:0;bottom:var(--bh);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.feed::-webkit-scrollbar{display:none}

/* ── Post card — built on same .fc style as index.html event cards ── */
.fc{margin:0 0 2px;border-bottom:1px solid var(--border);background:var(--surf);cursor:default;-webkit-tap-highlight-color:transparent}

/* Post header — same as .fh */
.fh{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.fa{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:1.5px solid var(--border);overflow:hidden;background:linear-gradient(135deg,#B026FF,#FF5C00)}
.fa img{width:100%;height:100%;object-fit:cover}
.fa.org{border-color:rgba(255,92,0,.6)}
.fo{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;line-height:1.2;display:flex;align-items:center;gap:6px}
.fl{font-size:.66rem;color:var(--mu)}
.org-pill{font-size:.54rem;background:rgba(255,92,0,.12);border:1px solid rgba(255,92,0,.28);color:var(--or);padding:2px 7px;border-radius:50px;font-weight:700}
.follow-btn{margin-left:auto;padding:5px 13px;border-radius:50px;border:1px solid var(--border2);background:transparent;color:var(--mu2);font-family:'Syne',sans-serif;font-size:.66rem;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.follow-btn.on{border-color:var(--or);color:var(--or);background:rgba(255,92,0,.08)}

/* Post image — same as .fb */
.fb{width:100%;max-height:420px;object-fit:cover;display:block}

/* Caption — same as .fd */
.fd{padding:10px 14px 4px}
.cap{font-size:.84rem;line-height:1.6;color:var(--mu2)}
.cap-ev{font-family:'Syne',sans-serif;font-size:.64rem;font-weight:700;color:var(--or);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.cap-more{color:var(--or);cursor:pointer;font-family:'Syne',sans-serif;font-size:.74rem;font-weight:700}

/* Action bar — same as .fac */
.fac{display:flex;align-items:center;gap:8px;padding:6px 14px 12px}
.ab{display:flex;align-items:center;gap:5px;background:transparent;border:none;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:var(--mu);cursor:pointer;padding:4px 6px;border-radius:50px;transition:color .18s;-webkit-tap-highlight-color:transparent}
.ab:active{background:rgba(255,255,255,.04)}
.ab.lk{color:var(--pk)}
.ab.rp{color:var(--li)}
.ai{font-size:1rem;line-height:1}

/* Comments — slides down, same card surface */
.cmt-wrap{background:rgba(0,0,0,.2);border-top:1px solid var(--border);display:none}
.cmt-item{display:flex;gap:9px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.cmt-item:last-of-type{border-bottom:none}
.cmt-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:.78rem;overflow:hidden}
.cmt-av img{width:100%;height:100%;object-fit:cover}
.cmt-name{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;margin-bottom:2px}
.cmt-text{font-size:.78rem;color:var(--mu2);line-height:1.45}
.cmt-time{font-size:.6rem;color:var(--mu);margin-top:3px}
/* Comment input — same as .cir in index.html */
.cir{display:flex;gap:8px;padding:9px 14px;border-top:1px solid var(--border);align-items:center}
.ci{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:8px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s}
.ci:focus{border-color:var(--or)!important}
.ci::placeholder{color:var(--mu)}
.csnd{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#B026FF,#FF5C00);border:none;color:#fff;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Compose FAB */
.fab{position:fixed;bottom:calc(var(--bh) + 14px);right:16px;z-index:200;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#B026FF,#FF5C00);border:none;color:#fff;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 18px rgba(176,38,255,.4);display:flex;align-items:center;justify-content:center}

/* Compose sheet — same .co/.cs as index.html */
.co{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);z-index:1200;display:none;align-items:flex-end;justify-content:center}
.co.open{display:flex}
.cs{width:100%;max-width:520px;background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid rgba(255,255,255,.1);border-bottom:none;animation:su .25s ease;display:flex;flex-direction:column;max-height:85vh;overflow-y:auto}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1;flex-shrink:0}
.ct{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.cc{width:30px;height:30px;border-radius:50%;background:var(--surf);border:none;color:var(--tx);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.compose-body{padding:16px 18px 28px}
.img-drop{height:150px;background:rgba(255,255,255,.03);border:1.5px dashed rgba(0,229,255,.3);border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;overflow:hidden;flex-direction:column;gap:8px}
.img-drop img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.ff-c{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;margin-bottom:10px;transition:border-color .2s}
.ff-c:focus{border-color:var(--or)}.ff-c::placeholder{color:var(--mu)}
textarea.ff-c{resize:none;height:80px;line-height:1.55}
.post-btn{width:100%;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:14px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.post-btn:disabled{opacity:.45;cursor:not-allowed}

/* Pagination — same .pg/.pb/.pi as index.html */
.pg{display:flex;gap:10px;padding:16px 14px 24px;justify-content:center;align-items:center}
.pb{background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:10px 22px;font-family:'Syne',sans-serif;font-size:.76rem;font-weight:700;color:var(--tx);cursor:pointer;transition:all .2s}
.pb:active{border-color:var(--or);color:var(--or)}.pb:disabled{opacity:.3;cursor:default}
.pi{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:var(--mu)}

/* Empty state — same .es as index.html */
.es{padding:60px 24px;text-align:center}
.ei{font-size:3rem;margin-bottom:14px}
.et{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:8px}
.em{font-size:.82rem;color:var(--mu);line-height:1.5;margin-bottom:20px}

/* Bottom nav — identical to index.html .bn/.bb/.bl */
.bn{position:fixed;bottom:0;left:0;right:0;height:var(--bh);z-index:800;background:rgba(5,8,15,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:stretch}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;border:none;cursor:pointer;padding:8px 2px 10px;position:relative;-webkit-tap-highlight-color:transparent}
.bb svg{width:22px;height:22px;stroke:var(--mu);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s,transform .2s}
.bb.active svg{stroke:var(--or);transform:scale(1.12)}
.bl{font-family:'Syne',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);transition:color .2s}
.bb.active .bl{color:var(--or)}
.bb.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,#B026FF,#FF5C00);border-radius:0 0 4px 4px}

/* Toast — exact same as index.html */
.toast{position:fixed;bottom:calc(var(--bh) + 16px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:10px 20px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;color:var(--tx);z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(198,255,74,.4);color:var(--li)}
.toast.err{border-color:rgba(255,45,120,.4);color:var(--pk)}

/* Section label — same .sl as index.html */
.sl{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;font-family:'Syne',sans-serif;font-size:.64rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--mu)}
</style>
</head>
<body>

<!-- Topbar -->
<header class="tb">
  <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
  <a class="logo" href="feeds.html"><span class="dot"></span>
    <span style="font-size:1.4rem">Feed</span>
  </a>
  <button class="tb2-btn" onclick="openCompose()">+ Post</button>
</header>

<!-- Filter chips -->
<div class="cr">
  <button class="chip active" onclick="setFilter(this,'all')">✦ All</button>
  <button class="chip" onclick="setFilter(this,'following')">👥 Following</button>
  <button class="chip" onclick="setFilter(this,'organizers')">📢 Organizers</button>
  <button class="chip" onclick="setFilter(this,'community')">👤 Community</button>
</div>

<!-- Feed -->
<div class="feed" id="feed"></div>

<!-- Compose FAB -->
<button class="fab" onclick="openCompose()" title="Share a post">✏️</button>

<!-- Bottom nav — same as index.html -->
<nav class="bn">
  <button class="bb" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24"><path d="M12 3C12 3 4 9.5 4 15a8 8 0 0016 0C20 9.5 12 3 12 3Z"/><path d="M12 10v5M9.5 13h5"/></svg>
    <span class="bl">Home</span>
  </button>
  <button class="bb active">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    <span class="bl">Feed</span>
  </button>
  <button class="bb" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3M9 20V7m6 13l5.447-2.724A1 1 0 0021 16.382V5.618a1 1 0 00-1.447-.894L15 7m0 13V7M9 7l6-3"/></svg>
    <span class="bl">Map</span>
  </button>
  <button class="bb" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M16 7v-.5a3.5 3.5 0 00-7 0V7M16 17v.5a3.5 3.5 0 01-7 0V17"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span class="bl">Bookings</span>
  </button>
  <button class="bb" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
    <span class="bl">Profile</span>
  </button>
</nav>

<!-- Compose sheet -->
<div class="co" id="compose-modal" onclick="if(event.target===this)closeCompose()">
  <div class="cs">
    <div class="ch">
      <span class="ct">📸 Share a Post</span>
      <button class="cc" onclick="closeCompose()">✕</button>
    </div>
    <div class="compose-body">
      <!-- Photo upload — all users -->
      <div class="img-drop" id="img-drop" onclick="document.getElementById('post-img-file').click()">
        <span style="font-size:2rem">📷</span>
        <span style="font-size:.8rem;color:var(--mu)" id="img-drop-hint">Tap to add a photo</span>
      </div>
      <input type="file" id="post-img-file" accept="image/*" style="display:none" onchange="handleImg(this)"/>

      <!-- Caption — visible to all, required for users -->
      <textarea class="ff-c" id="post-caption" placeholder="Add a caption…" maxlength="500"></textarea>

      <!-- Text-only note — shown to regular users -->
      <div id="user-posting-note" style="display:none;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);border-radius:10px;padding:10px 13px;font-size:.74rem;color:var(--mu2);line-height:1.5;margin-bottom:10px">
        📸 Upload a photo from an event you attended. Caption is optional.
      </div>

      <!-- Text-only post section — organizers/businesses only -->
      <div id="organizer-text-section" style="display:none">
        <div style="font-family:'Syne',sans-serif;font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:6px">Or post text only</div>
        <textarea class="ff-c" id="post-text-only" placeholder="Write an update, promo or announcement…" maxlength="1000" style="height:96px"></textarea>
      </div>

      <input class="ff-c" id="post-event-name" placeholder="Tag an event name (optional)"/>
      <button class="post-btn" id="post-submit" onclick="submitPost()">Share 🔥</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const PAGE_SIZE  = 8;
let _filter      = 'all';
let _page        = 1;
let _totalPages  = 1;

       query = query.in('user_id', following);

     return query;
   }

function getFilteredPosts() {
  let following = [];
  try { following = JSON.parse(localStorage.getItem('p_following') || '[]'); } catch(e) {}

  let posts = [...MOCK_POSTS];
  if (_filter === 'following') {
    posts = posts.filter(p => following.includes(p.user_id) || p.user_id === _uid);
  } else if (_filter === 'organizers') {
    posts = posts.filter(p => p.role === 'organizer');
  } else if (_filter === 'community') {
    posts = posts.filter(p => p.role === 'user');
  }
  // Posts from followed pages appear first
  posts.sort((a, b) => {
    const af = following.includes(a.user_id) ? 1 : 0;
    const bf = following.includes(b.user_id) ? 1 : 0;
    if (bf !== af) return bf - af;
    return new Date(b.ts) - new Date(a.ts);
  });
  return posts;
}

/* ── Persist reactions in localStorage ──────────────────── */

   supabase.from('post_reposts').upsert/delete({ post_id, user_id })

function _getLikes(postId) {
  try { return JSON.parse(localStorage.getItem('p_likes_'+postId) || 'null'); } catch { return null; }
}
function _setLikes(postId, arr) { localStorage.setItem('p_likes_'+postId, JSON.stringify(arr)); }
function _getReposts(postId) {
  try { return JSON.parse(localStorage.getItem('p_rp_'+postId) || 'null'); } catch { return null; }
}
function _setReposts(postId, arr) { localStorage.setItem('p_rp_'+postId, JSON.stringify(arr)); }
function _getComments(postId) {
  try { return JSON.parse(localStorage.getItem('p_cmts_'+postId) || 'null'); } catch { return null; }
}
function _setComments(postId, arr) { localStorage.setItem('p_cmts_'+postId, JSON.stringify(arr)); }

function getLikes(post)    { return _getLikes(post.id)    || post.likes    || []; }
function getReposts(post)  { return _getReposts(post.id)  || post.reposts  || []; }
function getComments(post) { return _getComments(post.id) || post.comments || []; }

/* ── Helpers ─────────────────────────────────────────────── */
function x(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(iso) {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60)    return 'just now';
  if (d < 3600)  return Math.floor(d/60)+'m ago';
  if (d < 86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}
function fn(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n||0); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── Render ──────────────────────────────────────────────── */
function setFilter(btn, filter) {
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _filter = filter; _page = 1;
  render();
}

function render() {
  const feedEl = document.getElementById('feed');
  feedEl.innerHTML = '';
  feedEl.scrollTop = 0;

  const all   = getFilteredPosts();
  _totalPages = Math.max(1, Math.ceil(all.length / PAGE_SIZE));
  if (_page > _totalPages) _page = _totalPages;
  const posts = all.slice((_page-1)*PAGE_SIZE, _page*PAGE_SIZE);

  if (!posts.length) {
    feedEl.innerHTML = `<div class="es"><div class="ei">📰</div><div class="et">Nothing here yet</div><div class="em">${_filter==='following'?'Follow event pages and organizers to see their posts here.':'Posts from the community will appear here.'}</div></div>`;
    return;
  }

  posts.forEach(post => feedEl.appendChild(buildCard(post)));

  // Pagination
  if (_totalPages > 1) {
    const pg = document.createElement('div');
    pg.className = 'pg';
    pg.innerHTML = `
      <button class="pb" onclick="changePage(-1)" ${_page===1?'disabled':''}>← Prev</button>
      <span class="pi">${_page} / ${_totalPages}</span>
      <button class="pb" onclick="changePage(1)" ${_page>=_totalPages?'disabled':''}>Next →</button>`;
    feedEl.appendChild(pg);
  }
}

function changePage(delta) { _page += delta; render(); }

function buildCard(post) {
  const likes    = getLikes(post);
  const reposts  = getReposts(post);
  const comments = getComments(post);
  const liked    = _uid && likes.includes(_uid);
  const reposted = _uid && reposts.includes(_uid);
  const isOrg    = post.role === 'organizer';
  let following  = [];
  try { following = JSON.parse(localStorage.getItem('p_following') || '[]'); } catch(e) {}
  const isFollowing = following.includes(post.user_id);
  const isOwn    = post.user_id === _uid;

  const cap = post.caption || '';
  const shortCap = cap.length > 220 ? cap.slice(0,220) : cap;

  const el = document.createElement('div');
  el.className = 'fc';
  el.id = 'post-' + post.id;
  el.innerHTML = `
    <div class="fh">
      <div class="fa ${isOrg?'org':''}">
        ${post.avatar_url ? `<img src="${x(post.avatar_url)}" loading="lazy" onerror="this.style.display='none'"/>` : (post.display_name?.[0]?.toUpperCase()||'😊')}
      </div>
      <div style="flex:1;min-width:0">
        <div class="fo">
          ${x(post.display_name || post.username)}
          ${isOrg ? '<span class="org-pill">📢 Page</span>' : ''}
        </div>
        ${post.event_name ? `<div style="font-size:.64rem;color:var(--or);font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.04em">🎟 ${x(post.event_name)}</div>` : ''}
        <div class="fl">@${x(post.username)} · ${timeAgo(post.ts)}</div>
      </div>
      ${!isOwn ? `<button class="follow-btn ${isFollowing?'on':''}" id="fbtn-${x(post.id)}" onclick="doFollow('${x(post.user_id)}','${x(post.id)}')">${isFollowing?'✓ Following':'+ Follow'}</button>` : ''}
    </div>
    ${post.image_url ? `<img class="fb" src="${x(post.image_url)}" loading="lazy" onerror="this.remove()"/>` : ''}
    ${cap ? `<div class="fd"><div class="cap" id="cap-${x(post.id)}">${x(shortCap)}${cap.length>220?` <span class="cap-more" onclick="expandCap('${x(post.id)}')">more</span>`:''}` + `</div></div>` : ''}
    <div class="fac">
      <button class="ab ${liked?'lk':''}" id="lb-${x(post.id)}" onclick="doLike('${x(post.id)}')">
        <span class="ai">${liked?'❤️':'🤍'}</span> <span id="lc-${x(post.id)}">${fn(likes.length)}</span>
      </button>
      <button class="ab" onclick="toggleCmt('${x(post.id)}')">
        <span class="ai">💬</span> <span id="cc-${x(post.id)}">${fn(comments.length)}</span>
      </button>
      <button class="ab ${reposted?'rp':''}" id="rb-${x(post.id)}" onclick="doRepost('${x(post.id)}')">
        <span class="ai">🔁</span> <span id="rc-${x(post.id)}">${fn(reposts.length)}</span>
      </button>
      <button class="ab" onclick="doShare('${x(post.caption||'')}')">
        <span class="ai">🔗</span>
      </button>
    </div>
    <div class="cmt-wrap" id="cmt-${x(post.id)}">
      <div id="cmtl-${x(post.id)}">${buildCmts(comments)}</div>
      <div class="cir">
        <input class="ci" id="cmti-${x(post.id)}" placeholder="Add a comment…" maxlength="300"
          onkeydown="if(event.key==='Enter')doComment('${x(post.id)}')"/>
        <button class="csnd" onclick="doComment('${x(post.id)}')">➤</button>
      </div>
    </div>`;
  return el;
}

function buildCmts(comments) {
  if (!comments.length) return '<div style="padding:10px 14px;font-size:.76rem;color:var(--mu)">No comments yet. Be first 💬</div>';
  return comments.slice(-10).map(c => `
    <div class="cmt-item">
      <div class="cmt-av">${(c.display_name||c.username||'?')[0].toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div class="cmt-name">${x(c.display_name||c.username)}</div>
        <div class="cmt-text">${x(c.text)}</div>
        <div class="cmt-time">${timeAgo(c.ts||c.timestamp)}</div>
      </div>
    </div>`).join('');
}

/* ── Actions ─────────────────────────────────────────────── */
function expandCap(postId) {
  const post = MOCK_POSTS.find(p => p.id === postId);
  if (!post) return;
  const el = document.getElementById('cap-'+postId);
  if (el) el.innerHTML = x(post.caption);
}

function doLike(postId) {
  if (!_uid) return showToast('Sign in to like posts');
  const post  = MOCK_POSTS.find(p => p.id === postId);
  if (!post) return;
  const likes = getLikes(post);
  const idx   = likes.indexOf(_uid);
  if (idx > -1) likes.splice(idx, 1); else likes.push(_uid);
  _setLikes(postId, likes);
  const liked = likes.includes(_uid);
  const btn   = document.getElementById('lb-'+postId);
  const cnt   = document.getElementById('lc-'+postId);
  if (btn) { btn.classList.toggle('lk', liked); btn.querySelector('.ai').textContent = liked?'❤️':'🤍'; }
  if (cnt) cnt.textContent = fn(likes.length);
}

function doRepost(postId) {
  if (!_uid) return showToast('Sign in to repost');
  const post    = MOCK_POSTS.find(p => p.id === postId);
  if (!post) return;
  const reposts = getReposts(post);
  const idx     = reposts.indexOf(_uid);
  if (idx > -1) reposts.splice(idx, 1); else reposts.push(_uid);
  _setReposts(postId, reposts);
  const rp  = reposts.includes(_uid);
  const btn = document.getElementById('rb-'+postId);
  const cnt = document.getElementById('rc-'+postId);
  if (btn) btn.classList.toggle('rp', rp);
  if (cnt) cnt.textContent = fn(reposts.length);
  if (rp) showToast('🔁 Reposted!', 'ok');
}

function toggleCmt(postId) {
  const el = document.getElementById('cmt-'+postId);
  if (el) { el.style.display = el.style.display === 'block' ? 'none' : 'block'; }
}

function doComment(postId) {
  if (!_uid) return showToast('Sign in to comment');
  const inp = document.getElementById('cmti-'+postId);
  const txt = inp?.value.trim(); if (!txt) return;
  const post = MOCK_POSTS.find(p => p.id === postId);
  if (!post) return;
  const comments = getComments(post);
  const name     = _profile?.display_name || _session?.display_name || 'You';
  const uname    = _profile?.username || _session?.email?.split('@')[0] || 'you';
  const comment  = { id:'c_'+Date.now(), user_id:_uid, username:uname, display_name:name, text:txt, ts:new Date().toISOString() };
  comments.push(comment);
  _setComments(postId, comments);
  inp.value = '';
  const lEl = document.getElementById('cmtl-'+postId);
  if (lEl) lEl.innerHTML = buildCmts(comments);
  const cEl = document.getElementById('cc-'+postId);
  if (cEl) cEl.textContent = fn(comments.length);
}

function doFollow(targetUserId, postId) {
  if (!_uid) return showToast('Sign in to follow');
  let following = [];
  try { following = JSON.parse(localStorage.getItem('p_following') || '[]'); } catch(e) {}
  const idx = following.indexOf(targetUserId);
  if (idx > -1) following.splice(idx, 1); else following.push(targetUserId);
  localStorage.setItem('p_following', JSON.stringify(following));
  const fol = following.includes(targetUserId);
  // Update all follow buttons for this user
  document.querySelectorAll(`[id^="fbtn-"]`).forEach(btn => {
    const pid = btn.id.replace('fbtn-','');
    const p   = MOCK_POSTS.find(mp => mp.id === pid);
    if (p && p.user_id === targetUserId) {
      btn.classList.toggle('on', fol);
      btn.textContent = fol ? '✓ Following' : '+ Follow';
    }
  });
  showToast(fol ? '✓ Following' : 'Unfollowed', fol ? 'ok' : '');
  if (_filter === 'following') { _page=1; render(); }
}

function doShare(caption) {
  if (navigator.share) navigator.share({title:'Pulsify Post', text:caption||'Check this out on Pulsify!', url:location.href});
  else { navigator.clipboard?.writeText(location.href); showToast('🔗 Link copied!'); }
}

/* ── Compose ─────────────────────────────────────────────── */
let _cImg = null;
function openCompose() {
  if (!_uid) { window.location.href='signin.html'; return; }

  const isOrg = _session?.role === 'organizer' || _session?.role === 'admin';

  // Show/hide sections based on role
  const orgSection  = document.getElementById('organizer-text-section');
  const userNote    = document.getElementById('user-posting-note');
  const imgHint     = document.getElementById('img-drop-hint');

  if (orgSection) orgSection.style.display = isOrg ? 'block' : 'none';
  if (userNote)   userNote.style.display   = isOrg ? 'none'  : 'block';
  if (imgHint)    imgHint.textContent      = isOrg ? 'Tap to add a photo (optional)' : 'Tap to add a photo from the event *';

  document.getElementById('compose-modal').classList.add('open');
}
function closeCompose() {
  document.getElementById('compose-modal').classList.remove('open');
  document.getElementById('post-caption').value    = '';
  document.getElementById('post-event-name').value = '';
  const to = document.getElementById('post-text-only');
  if (to) to.value = '';
  document.getElementById('img-drop').innerHTML = '<span style="font-size:2rem">📷</span><span style="font-size:.8rem;color:var(--mu)" id="img-drop-hint">Tap to add a photo</span>';
  _cImg = null;
}
function handleImg(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    _cImg = e.target.result;
    document.getElementById('img-drop').innerHTML = `<img src="${e.target.result}"/>`;
  };
  reader.readAsDataURL(file);
}
function submitPost() {
  const isOrg    = _session?.role === 'organizer' || _session?.role === 'admin';
  const caption  = document.getElementById('post-caption').value.trim();
  const textOnly = (document.getElementById('post-text-only')?.value || '').trim();
  const evName   = document.getElementById('post-event-name').value.trim();
  const finalCap = caption || textOnly;

  // Enforce rules
  if (!isOrg && !_cImg) return showToast('Please upload a photo from the event 📸', 'err');
  if (isOrg && !_cImg && !textOnly && !caption) return showToast('Add a photo or write something');
  if (!isOrg && !finalCap) return showToast('Add a caption to your photo');
  const btn = document.getElementById('post-submit');
  btn.disabled = true; btn.textContent = 'Sharing…';

  /* SUPABASE SWAP: replace with:
     await supabase.from('posts').insert({
       user_id: _uid, caption, event_name: evName||null,
       image_url: _cImg, visibility: 'public',
       created_at: new Date().toISOString()
     })
  */
  const name  = _profile?.display_name || _session?.display_name || 'You';
  const uname = _profile?.username || _session?.email?.split('@')[0] || 'you';
  const newPost = {
    id: 'p_'+Date.now(), user_id: _uid, username: uname, display_name: name,
    role: _session?.role||'user', avatar_url: _profile?.avatar_url||null,
    event_name: evName||null, image_url: _cImg||null, caption,
    likes:[], comments:[], reposts:[], ts: new Date().toISOString()
  };
  MOCK_POSTS.unshift(newPost);
  closeCompose();
  btn.disabled = false; btn.textContent = 'Share Post 🔥';
  _page = 1; render();
  showToast('🔥 Post shared!', 'ok');
}

/* ── Boot ────────────────────────────────────────────────── */
// Try real API first, fall back to mock
async function initFeed() {
  try {
    const res = await fetch('/api/posts?page=1&limit=10&filter=all');
    if (res.ok) {
      const data = await res.json();
      if (data.posts && data.posts.length > 0) {
        // Map API response to MOCK_POSTS format and render
        data.posts.forEach(p => {
          if (!MOCK_POSTS.find(m => m.id === p.id)) {
            MOCK_POSTS.unshift({
              id: p.id, user_id: p.user_id,
              username: p.profiles?.username || 'user',
              display_name: p.profiles?.display_name || 'User',
              role: p.profiles?.role || 'user',
              post_type: p.post_type || 'organizer',
              image_url: p.image_url || null,
              caption: p.caption || '',
              event_name: p.event_name || null,
              likes:[], comments:[], reposts:[],
              ts: p.created_at
            });
          }
        });
      }
    }
  } catch(e) { console.log('API offline, using mock data'); }
  render();
}
initFeed();
</script>
