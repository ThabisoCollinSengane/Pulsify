<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Pulsify — Order Pickup</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080F;--bg2:#090D1A;--surf:#0D1424;--surf2:#121B30;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--cy:#00E5FF;--pu:#B026FF;--te:#00D4AA;--tx:#F0EEF8;--mu:#5A5870;--mu2:#9997B0;--th:58px;--cart-h:64px}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--or);border-radius:2px}

/* ── TOP BAR ── */
.tb{position:fixed;top:0;left:0;right:0;height:var(--th);z-index:900;display:flex;align-items:center;padding:0 16px;gap:12px;background:rgba(5,8,15,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.06em;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--tx)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--or);box-shadow:0 0 10px var(--or);animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.cart-btn{margin-left:auto;position:relative;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:9px 18px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;-webkit-tap-highlight-color:transparent;transition:opacity .2s}
.cart-btn:active{opacity:.85}
.cart-count{background:rgba(255,255,255,.25);border-radius:50px;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;padding:0 4px}

/* ── MAIN ── */
.main{padding-top:calc(var(--th) + 8px);padding-bottom:calc(var(--cart-h) + 24px)}

/* ── HERO ── */
.biz-hero{position:relative;height:220px;overflow:hidden;display:flex;align-items:flex-end}
.biz-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.biz-hero-emo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:5rem}
.biz-hero-grad{position:absolute;inset:0;background:linear-gradient(transparent 20%,rgba(5,8,15,.97))}
.biz-hero-info{position:relative;z-index:1;padding:20px 16px;width:100%}
.biz-cat-badge{display:inline-block;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;font-family:'Syne',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 11px;border-radius:50px;margin-bottom:8px}
.biz-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.03em;line-height:1;margin-bottom:4px}
.biz-meta{font-size:.74rem;color:var(--mu2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.biz-rating{color:#F0C040;font-family:'Syne',sans-serif;font-weight:700}

/* ── INFO STRIP ── */
.info-strip{display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.info-chip{flex:1;text-align:center;padding:10px 6px;border-right:1px solid var(--border)}
.info-chip:last-child{border-right:none}
.ic-ico{font-size:1.1rem;margin-bottom:2px}
.ic-label{font-family:'Syne',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mu)}
.ic-val{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;color:var(--tx);margin-top:1px}

/* ── CATEGORY CHIPS ── */
.cat-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:12px 14px 8px;position:sticky;top:var(--th);background:var(--bg);z-index:50;border-bottom:1px solid var(--border)}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:7px 15px;border-radius:50px;border:1px solid var(--border);background:rgba(255,255,255,.02);font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;color:var(--mu);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.cat-chip.active{border-color:var(--or);color:var(--or);background:rgba(255,92,0,.09)}

/* ── MENU SECTION ── */
.menu-section{padding:0 14px 8px}
.cat-heading{font-family:'Syne',sans-serif;font-size:.64rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--mu);padding:16px 0 10px;display:flex;align-items:center;gap:10px}
.cat-heading::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── MENU ITEM CARD ── */
.mi-card{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:12px 14px;margin-bottom:10px;transition:border-color .2s;-webkit-tap-highlight-color:transparent}
.mi-card:active{border-color:rgba(255,92,0,.3)}
.mi-card.unavail{opacity:.45;pointer-events:none}
.mi-thumb{width:64px;height:64px;border-radius:12px;background:var(--surf2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;overflow:hidden;position:relative}
.mi-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.mi-info{flex:1;min-width:0}
.mi-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.86rem;margin-bottom:3px}
.mi-desc{font-size:.7rem;color:var(--mu);line-height:1.4;margin-bottom:6px}
.mi-price{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--li)}
.mi-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.qty-control{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:50%;background:var(--surf2);border:1px solid var(--border2);color:var(--tx);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
.qty-btn:active{background:var(--or);border-color:var(--or)}
.qty-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;min-width:18px;text-align:center}
.add-btn{background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:7px 16px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .18s}
.add-btn:active{opacity:.8}

/* ── CART BAR ── */
.cart-bar{position:fixed;bottom:0;left:0;right:0;height:var(--cart-h);z-index:800;background:linear-gradient(135deg,rgba(176,38,255,.95),rgba(255,92,0,.95));backdrop-filter:blur(12px);display:none;align-items:center;padding:0 16px;gap:14px;box-shadow:0 -4px 24px rgba(0,0,0,.4)}
.cart-bar.show{display:flex}
.cart-bar-info{flex:1}
.cb-count{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.8);margin-bottom:2px}
.cb-total{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.03em}
.cb-checkout{background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.5);color:#fff;padding:10px 24px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;transition:background .18s}
.cb-checkout:active{background:rgba(255,255,255,.35)}

/* ── CHECKOUT SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(14px);z-index:2000;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{width:100%;max-width:520px;background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid rgba(255,255,255,.1);border-bottom:none;animation:su .26s ease;max-height:92vh;display:flex;flex-direction:column}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 0;flex-shrink:0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.03em}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--surf);border:none;color:var(--tx);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-body{overflow-y:auto;padding:16px 18px 32px;flex:1}
.ff{width:100%;background:var(--surf);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;margin-bottom:10px;transition:border-color .2s}
.ff:focus{border-color:var(--or)}.ff::placeholder{color:var(--mu)}
.ff-label{font-family:'Syne',sans-serif;font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mu2);margin-bottom:5px;display:block}

/* ── ORDER SUMMARY ── */
.order-summary{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px}
.os-row{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:8px}
.os-row:last-child{margin-bottom:0;border-top:1px solid var(--border);padding-top:9px;margin-top:4px}
.os-row:last-child .os-label{font-family:'Syne',sans-serif;font-weight:700}
.os-row:last-child .os-val{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--or)}
.os-label{color:var(--mu)}.os-val{font-family:'Syne',sans-serif;font-weight:700}

/* ── PAY BUTTON ── */
.pay-btn{width:100%;background:linear-gradient(135deg,#00C89C,#0090E0);color:#fff;border:none;padding:15px;border-radius:13px;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;box-shadow:0 4px 24px rgba(0,200,156,.2);transition:opacity .2s;-webkit-tap-highlight-color:transparent}
.pay-btn:active{opacity:.85}
.pay-note{text-align:center;font-size:.72rem;color:var(--mu);margin-top:8px;line-height:1.5}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--surf2);border:1px solid var(--border2);border-radius:50px;padding:10px 22px;font-family:'Syne',sans-serif;font-size:.76rem;font-weight:700;color:var(--tx);z-index:9999;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(198,255,74,.3);color:var(--li)}
.toast.err{border-color:rgba(255,45,120,.3);color:var(--pk)}

/* ── EMPTY / ERROR ── */
.big-empty{padding:64px 24px;text-align:center}
.be-ico{font-size:4rem;margin-bottom:16px}
.be-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;margin-bottom:8px}
.be-sub{font-size:.84rem;color:var(--mu);line-height:1.6;margin-bottom:24px}
.btn-home{display:inline-block;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:12px 28px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;text-decoration:none}

/* ── OPEN/CLOSED BADGE ── */
.open-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.open-badge.open{background:rgba(0,212,170,.12);color:var(--te);border:1px solid rgba(0,212,170,.3)}
.open-badge.closed{background:rgba(255,45,120,.1);color:var(--pk);border:1px solid rgba(255,45,120,.25)}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="tb">
  <a href="index.html" class="logo"><span class="dot"></span>PULSIFY</a>
  <button class="cart-btn" id="cart-top-btn" onclick="openSheet('checkout-sheet')" style="display:none">
    🛒 Cart <span class="cart-count" id="cart-count-top">0</span>
  </button>
</header>

<div class="main" id="main"></div>

<!-- CART BAR -->
<div class="cart-bar" id="cart-bar">
  <div class="cart-bar-info">
    <div class="cb-count" id="cb-count">0 items</div>
    <div class="cb-total" id="cb-total">R0.00</div>
  </div>
  <button class="cb-checkout" onclick="openSheet('checkout-sheet')">Checkout →</button>
</div>

<!-- CHECKOUT SHEET -->
<div class="overlay" id="checkout-sheet" onclick="if(event.target===this)closeSheet('checkout-sheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head"><div class="sheet-title">Checkout</div><button class="sheet-close" onclick="closeSheet('checkout-sheet')">✕</button></div>
    <div class="sheet-body">
      <div class="order-summary" id="order-summary-display"></div>
      <label class="ff-label">Your Name *</label>
      <input class="ff" type="text" id="co-name" placeholder="Full name" autocomplete="name"/>
      <label class="ff-label">WhatsApp / Phone Number *</label>
      <input class="ff" type="tel" id="co-phone" placeholder="e.g. 082 123 4567" autocomplete="tel"/>
      <label class="ff-label">Preferred Pickup Time *</label>
      <select class="ff" id="co-time"><option value="">Select pickup time…</option></select>
      <label class="ff-label">Special Instructions (optional)</label>
      <textarea class="ff" id="co-notes" placeholder="e.g. Extra chakalaka, no onions…" rows="2" style="resize:none"></textarea>
      <button class="pay-btn" onclick="placeOrder()">
        🎭 Simulate Payment &amp; Confirm Order
      </button>
      <div class="pay-note">🔒 No real charge — demo mode · Real Paystack integration coming soon<br/>Your order will be sent directly to the business.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
const BIZ_ID = params.get('id') || '';
let BIZ_DATA = {};
let MENU     = [];
let HOURS    = [];
let CART     = {}; // { menuItemId: qty }

// ════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  if (!BIZ_ID) { renderNotFound('No business ID provided. Check the URL.'); return; }

  // Load business data from biz_accounts
  const accounts = JSON.parse(localStorage.getItem('biz_accounts') || '[]');
  const acc = accounts.find(a => a.id === BIZ_ID);
  if (!acc) { renderNotFound('Business "' + BIZ_ID + '" not found. Make sure the business is registered on Pulsify.'); return; }

  // Load profile overrides (edited in dashboard)
  const profileKey = BIZ_ID + '_profile';
  const pf = JSON.parse(localStorage.getItem(profileKey) || '{}');
  BIZ_DATA = { ...acc, ...pf };

  // Load menu & hours
  MENU  = JSON.parse(localStorage.getItem(BIZ_ID + '_menu')  || '[]');
  HOURS = JSON.parse(localStorage.getItem(BIZ_ID + '_hours') || '[]');

  renderPage();
});

// ════════════════════════════════════════════════════════════
//  RENDER PAGE
// ════════════════════════════════════════════════════════════
function renderPage() {
  const typeEmoji = { club:'🌙', shisanyama:'🥩', restaurant:'🍽️', bar:'🍺', hotel:'🏨', venue:'🎪', food:'🍔', other:'📍' };
  const emo   = typeEmoji[BIZ_DATA.type] || '🏪';
  const open  = isOpenNow();
  const cats  = [...new Set(MENU.filter(i => i.available !== '0' && i.available !== false).map(i => i.cat || 'General'))];

  document.title = `Order from ${BIZ_DATA.name} — Pulsify`;

  let html = `
    <!-- HERO -->
    <div class="biz-hero" style="background:linear-gradient(135deg,rgba(176,38,255,.3),rgba(255,92,0,.2))">
      ${BIZ_DATA.logo ? `<img src="${xe(BIZ_DATA.logo)}" loading="lazy" onerror="this.style.display='none'" alt=""/>` : ''}
      <div class="biz-hero-emo">${emo}</div>
      <div class="biz-hero-grad"></div>
      <div class="biz-hero-info">
        <div class="biz-cat-badge">${xe(BIZ_DATA.type || 'Business')}</div>
        <div class="biz-name">${xe(BIZ_DATA.name)}</div>
        <div class="biz-meta">
          <span>📍 ${xe(BIZ_DATA.city || '')}</span>
          ${BIZ_DATA.phone ? `<span>📞 ${xe(BIZ_DATA.phone)}</span>` : ''}
          <span class="open-badge ${open?'open':'closed'}">${open ? '● Open Now' : '● Closed'}</span>
        </div>
      </div>
    </div>

    <!-- INFO STRIP -->
    <div class="info-strip">
      <div class="info-chip"><div class="ic-ico">🏃</div><div class="ic-label">Order Type</div><div class="ic-val">Pickup Only</div></div>
      <div class="info-chip"><div class="ic-ico">⏱</div><div class="ic-label">Wait Time</div><div class="ic-val">15–25 min</div></div>
      <div class="info-chip"><div class="ic-ico">💳</div><div class="ic-label">Payment</div><div class="ic-val">Pay Online</div></div>
      <div class="info-chip"><div class="ic-ico">📍</div><div class="ic-label">Location</div><div class="ic-val">${xe(BIZ_DATA.city||'KZN')}</div></div>
    </div>`;

  if (!MENU.length) {
    html += `<div class="big-empty"><div class="be-ico">${emo}</div><div class="be-title">Menu Coming Soon</div><div class="be-sub">This business hasn't uploaded their menu yet. Check back soon!</div><a href="index.html" class="btn-home">Back to Pulsify</a></div>`;
    document.getElementById('main').innerHTML = html;
    return;
  }

  // Category chips
  html += `<div class="cat-scroll" id="cat-scroll"><div class="cat-chip active" onclick="scrollToAll(this)">All</div>` +
    cats.map(c => `<div class="cat-chip" onclick="scrollToCat('${xe(c)}',this)">${xe(c)}</div>`).join('') + '</div>';

  // Menu items by category
  html += '<div class="menu-section">';
  cats.forEach(cat => {
    const items = MENU.filter(i => (i.cat || 'General') === cat && i.available !== '0' && i.available !== false);
    if (!items.length) return;
    html += `<div class="cat-heading" id="cat-${xe(cat)}">${xe(cat)}</div>`;
    items.forEach(item => {
      html += `
        <div class="mi-card" id="mi-card-${xe(item.id)}">
          <div class="mi-thumb">${item.img ? `<img src="${xe(item.img)}" loading="lazy" onerror="this.style.display='none'" alt=""/>` : ''}${item.emoji || '🍽️'}</div>
          <div class="mi-info">
            <div class="mi-name">${xe(item.name)}</div>
            ${item.desc ? `<div class="mi-desc">${xe(item.desc)}</div>` : ''}
            <div class="mi-price">R${item.price}</div>
          </div>
          <div class="mi-right">
            <div class="qty-control" id="qty-ctrl-${xe(item.id)}" style="display:none">
              <button class="qty-btn" onclick="changeQty('${xe(item.id)}',-1)">−</button>
              <div class="qty-num" id="qty-${xe(item.id)}">0</div>
              <button class="qty-btn" onclick="changeQty('${xe(item.id)}',1)">+</button>
            </div>
            <button class="add-btn" id="add-btn-${xe(item.id)}" onclick="addItem('${xe(item.id)}')">Add</button>
          </div>
        </div>`;
    });
  });
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

// ════════════════════════════════════════════════════════════
//  CART LOGIC
// ════════════════════════════════════════════════════════════
function addItem(id) {
  CART[id] = (CART[id] || 0) + 1;
  document.getElementById('add-btn-' + id).style.display    = 'none';
  document.getElementById('qty-ctrl-' + id).style.display   = 'flex';
  document.getElementById('qty-' + id).textContent = CART[id];
  updateCartUI();
}

function changeQty(id, delta) {
  CART[id] = Math.max(0, (CART[id] || 0) + delta);
  if (CART[id] === 0) {
    delete CART[id];
    document.getElementById('qty-ctrl-' + id).style.display   = 'none';
    document.getElementById('add-btn-' + id).style.display    = '';
  } else {
    document.getElementById('qty-' + id).textContent = CART[id];
  }
  updateCartUI();
}

function cartTotal() {
  return Object.entries(CART).reduce((s, [id, qty]) => {
    const item = MENU.find(i => i.id === id);
    return s + (item ? item.price * qty : 0);
  }, 0);
}

function cartItemCount() { return Object.values(CART).reduce((s, q) => s + q, 0); }

function updateCartUI() {
  const count = cartItemCount(), total = cartTotal();
  const bar = document.getElementById('cart-bar');
  const topBtn = document.getElementById('cart-top-btn');
  bar.classList.toggle('show', count > 0);
  if (topBtn) { topBtn.style.display = count > 0 ? 'flex' : 'none'; document.getElementById('cart-count-top').textContent = count; }
  document.getElementById('cb-count').textContent = count + ' item' + (count !== 1 ? 's' : '');
  document.getElementById('cb-total').textContent = 'R' + total.toFixed(2);
}

// ════════════════════════════════════════════════════════════
//  CHECKOUT SHEET
// ════════════════════════════════════════════════════════════
function openSheet(id) {
  if (id === 'checkout-sheet') {
    if (cartItemCount() === 0) { toast('Your cart is empty', 'err'); return; }
    buildOrderSummary();
    buildTimeSlots();
  }
  document.getElementById(id).classList.add('open');
}
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }

function buildOrderSummary() {
  const items    = Object.entries(CART).map(([id, qty]) => { const m = MENU.find(i => i.id === id); return m ? { ...m, qty } : null; }).filter(Boolean);
  const subtotal = cartTotal();
  const service  = Math.round(subtotal * 0.05 * 100) / 100;
  const total    = subtotal + service;
  document.getElementById('order-summary-display').innerHTML =
    items.map(i => `<div class="os-row"><span class="os-label">${xe(i.name)} × ${i.qty}</span><span class="os-val">R${(i.price * i.qty).toFixed(2)}</span></div>`).join('') +
    `<div class="os-row"><span class="os-label">Service fee (5%)</span><span class="os-val">R${service.toFixed(2)}</span></div>` +
    `<div class="os-row"><span class="os-label">Total</span><span class="os-val">R${total.toFixed(2)}</span></div>`;
}

function buildTimeSlots() {
  const sel = document.getElementById('co-time');
  sel.innerHTML = '<option value="">Select pickup time…</option>';
  const now = new Date(), minTime = new Date(now.getTime() + 25 * 60000);
  const dayName = now.toLocaleDateString('en-ZA', { weekday:'long' });
  const todayHours = HOURS.find(h => h.day.toLowerCase() === dayName.toLowerCase());
  const from = todayHours?.open ? (todayHours.from || '10:00') : '10:00';
  const to   = todayHours?.open ? (todayHours.to   || '18:00') : '18:00';
  if (todayHours && !todayHours.open) {
    const opt = document.createElement('option'); opt.value = 'Closed today'; opt.textContent = '⚠️ Closed today — try tomorrow';
    sel.appendChild(opt); return;
  }
  const [fH, fM] = from.split(':').map(Number);
  const [tH, tM] = to.split(':').map(Number);
  const end = new Date(); end.setHours(tH, tM, 0, 0);
  let slot = new Date(Math.max(new Date().setHours(fH, fM, 0, 0), minTime.getTime()));
  slot.setMinutes(Math.ceil(slot.getMinutes() / 15) * 15, 0, 0);
  let count = 0;
  while (slot <= end && count < 24) {
    const label = slot.toLocaleTimeString('en-ZA', { hour:'2-digit', minute:'2-digit' });
    const opt = document.createElement('option'); opt.value = label; opt.textContent = label;
    sel.appendChild(opt); slot = new Date(slot.getTime() + 15 * 60000); count++;
  }
  if (count === 0) {
    const opt = document.createElement('option'); opt.value = 'ASAP'; opt.textContent = 'ASAP';
    sel.appendChild(opt);
  }
}

function placeOrder() {
  const name       = document.getElementById('co-name').value.trim();
  const phone      = document.getElementById('co-phone').value.trim();
  const pickupTime = document.getElementById('co-time').value;
  if (!name)       { toast('Please enter your name', 'err'); return; }
  if (!phone)      { toast('Please enter your phone number', 'err'); return; }
  if (!pickupTime) { toast('Please select a pickup time', 'err'); return; }

  const items    = Object.entries(CART).map(([id, qty]) => { const m = MENU.find(i => i.id === id); return m ? { id, name:m.name, price:m.price, qty } : null; }).filter(Boolean);
  const subtotal = cartTotal();
  const service  = Math.round(subtotal * 0.05 * 100) / 100;
  const total    = +(subtotal + service).toFixed(2);

  const order = {
    id: 'ord_' + Date.now(), bizId: BIZ_ID, customer: name, phone, items,
    subtotal, service, total, pickupTime,
    notes: document.getElementById('co-notes').value.trim(),
    status: 'pending', created: new Date().toISOString()
  };

  // Save to business orders store (read by business-dashboard.html)
  const ordersKey = BIZ_ID + '_orders';
  const orders = JSON.parse(localStorage.getItem(ordersKey) || '[]');
  orders.push(order); localStorage.setItem(ordersKey, JSON.stringify(orders));

  // Save for confirmation page
  localStorage.setItem('last_order', JSON.stringify({ ...order, bizName: BIZ_DATA.name, bizAddress: BIZ_DATA.address || BIZ_DATA.city }));

  CART = {}; closeSheet('checkout-sheet');
  window.location.href = 'order-confirmation.html';
}

// ════════════════════════════════════════════════════════════
//  HOURS CHECK
// ════════════════════════════════════════════════════════════
function isOpenNow() {
  if (!HOURS.length) return true;
  const day = new Date().toLocaleDateString('en-ZA', { weekday:'long' });
  const h   = HOURS.find(r => r.day.toLowerCase() === day.toLowerCase());
  if (!h || !h.open) return false;
  const now = new Date();
  const [fH, fM] = (h.from || '10:00').split(':').map(Number);
  const [tH, tM] = (h.to   || '18:00').split(':').map(Number);
  const from = new Date(); from.setHours(fH, fM, 0, 0);
  const to   = new Date(); to.setHours(tH, tM, 0, 0);
  return now >= from && now <= to;
}

// ════════════════════════════════════════════════════════════
//  CATEGORY SCROLL
// ════════════════════════════════════════════════════════════
function scrollToCat(cat, btn) {
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('cat-' + cat)?.scrollIntoView({ behavior:'smooth', block:'start' });
}
function scrollToAll(btn) {
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); window.scrollTo({ top:0, behavior:'smooth' });
}

//  UTILS
// ════════════════════════════════════════════════════════════
function renderNotFound(msg) {
  document.getElementById('main').innerHTML = `<div class="big-empty"><div class="be-ico">🔍</div><div class="be-title">Business Not Found</div><div class="be-sub">${msg}</div><a class="btn-home" href="index.html">Back to Pulsify</a></div>`;
}
function xe(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'; setTimeout(()=>t.className='toast',2600); }
</script>
