<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#05080F"/>
<title>Sign In — Pulsify</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080F;--bg2:#090D1A;--surf:#0D1424;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--tx:#F0EEF8;--mu:#5A5870;--mu2:#9997B0;--pu:#B026FF}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px}
.logo{font-family:"Bebas Neue",sans-serif;font-size:2rem;letter-spacing:.06em;display:flex;align-items:center;gap:10px;margin-bottom:4px;cursor:pointer;text-decoration:none;color:var(--tx)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--or);box-shadow:0 0 12px var(--or);animation:p 2s ease-in-out infinite;flex-shrink:0}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.tagline{font-size:.78rem;color:var(--mu);margin-bottom:28px;text-align:center}
.card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border2);border-radius:22px;padding:26px 22px 30px}
.card-title{font-family:"Bebas Neue",sans-serif;font-size:1.8rem;letter-spacing:.03em;margin-bottom:4px}
.card-sub{font-size:.8rem;color:var(--mu);margin-bottom:20px}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:"DM Sans",sans-serif;font-size:.88rem;outline:none;margin-bottom:12px;transition:border-color .2s}
.inp:focus{border-color:var(--or)!important}.inp::placeholder{color:var(--mu)}
.pw-wrap{position:relative;margin-bottom:12px}
.pw-wrap .inp{margin-bottom:0}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mu);cursor:pointer;font-size:.78rem;font-family:"Syne",sans-serif;font-weight:700}
.forgot{display:block;text-align:right;font-family:"Syne",sans-serif;font-size:.7rem;font-weight:700;color:var(--or);cursor:pointer;margin-bottom:18px}
.btn{width:100%;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:14px;border-radius:50px;font-family:"Syne",sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.85}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--mu);font-size:.76rem}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
.gbtn{width:100%;background:var(--surf);color:var(--tx);border:1px solid var(--border2);padding:13px;border-radius:50px;font-family:"Syne",sans-serif;font-size:.84rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s}
.gbtn:active{border-color:var(--or)}
.asw{text-align:center;margin-top:16px;font-size:.78rem;color:var(--mu)}
.asw a{color:var(--or);font-weight:700;text-decoration:none}
.err{background:rgba(255,45,120,.08);border:1px solid rgba(255,45,120,.3);border-radius:10px;padding:10px 14px;font-size:.78rem;color:var(--pk);margin-bottom:12px;display:none}
.err.show{display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:10px 22px;font-family:"Syne",sans-serif;font-size:.78rem;font-weight:700;color:var(--tx);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(198,255,74,.4);color:var(--li)}
.back{margin-top:16px;font-size:.76rem;color:var(--mu);cursor:pointer;text-align:center}
.back a{color:var(--mu2);text-decoration:none}
</style>
</head>
<body>
<a class="logo" href="index.html"><span class="dot"></span>PULSIFY</a>
<p class="tagline">Feel the Vibe 🇿🇦</p>

<div class="card">
  <div class="card-title">Welcome Back</div>
  <div class="card-sub">Sign in to access your tickets, bookings & squad</div>
  <div class="err" id="err"></div>

  <button class="gbtn" onclick="showToast('Google sign-in coming soon')">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider">or sign in with email</div>

  <input class="inp" id="em" type="email" placeholder="Email address" autocomplete="email"/>
  <div class="pw-wrap">
    <input class="inp" id="pw" type="password" placeholder="Password" autocomplete="current-password"/>
    <button class="pw-eye" type="button" onclick="togPw()">Show</button>
  </div>
  <span class="forgot" onclick="handleForgot()">Forgot password?</span>
  <button class="btn" id="btn" onclick="doSignIn()">Sign In</button>
  <div class="asw">No account? <a href="create-account.html">Sign up free →</a></div>
</div>
<div class="back"><a href="index.html">← Back to Pulsify</a></div>
<div class="toast" id="toast"></div>

<script>
// Already logged in — go home
try { var _s=JSON.parse(localStorage.getItem("p_user")); if(_s&&_s.id) window.location.href="index.html"; } catch(e){}

function togPw(){var i=document.getElementById("pw");var s=i.type==="password";i.type=s?"text":"password";document.querySelector(".pw-eye").textContent=s?"Hide":"Show";}

function showErr(m){var e=document.getElementById("err");e.textContent=m;e.classList.add("show");}
function hideErr(){document.getElementById("err").classList.remove("show");}
function showToast(m,t){var el=document.getElementById("toast");el.textContent=m;el.className="toast "+(t||"")+" show";setTimeout(function(){el.classList.remove("show");},3000);}

function handleForgot(){
  var em=document.getElementById("em").value.trim();
  if(!em) return showErr("Enter your email address first.");
  showToast("Password reset link sent to "+em,"ok");
}

function doSignIn(){
  hideErr();
  var em=document.getElementById("em").value.trim();
  var pw=document.getElementById("pw").value;
  var btn=document.getElementById("btn");

  if(!em) return showErr("Please enter your email address.");
  if(!pw) return showErr("Please enter your password.");

  btn.textContent="Signing in…";btn.style.opacity=".7";

  // Check localStorage for existing account
  try {
    var stored = JSON.parse(localStorage.getItem("p_user"));
    if(stored && stored.email === em){
      stored.last_login = new Date().toISOString();
      localStorage.setItem("p_user", JSON.stringify(stored));
      showToast("✅ Welcome back!","ok");
      setTimeout(function(){ window.location.href="index.html"; },800);
      return;
    }
  } catch(e){}

  // No account found
  btn.textContent="Sign In";btn.style.opacity="1";
  showErr("No account found for this email. Please sign up first.");
}

document.addEventListener("keydown",function(e){if(e.key==="Enter")doSignIn();});
</script>
</body>
</html>
