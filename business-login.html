<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Pulsify Business — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080F;--bg2:#090D1A;--surf:#0D1424;--surf2:#121B30;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--cy:#00E5FF;--pu:#B026FF;--te:#00D4AA;--tx:#F0EEF8;--mu:#5A5870;--mu2:#9997B0}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(176,38,255,.18),transparent),radial-gradient(ellipse 50% 40% at 80% 100%,rgba(255,92,0,.12),transparent);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;display:flex;align-items:center;gap:10px;margin-bottom:6px;cursor:pointer;text-decoration:none;color:var(--tx)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--or);box-shadow:0 0 12px var(--or);animation:p 2s ease-in-out infinite;flex-shrink:0}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.sub-logo{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--mu2);margin-bottom:32px}
.card{width:100%;max-width:420px;background:var(--surf);border:1px solid var(--border2);border-radius:24px;padding:28px 24px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.tab-row{display:flex;background:var(--bg2);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.t-btn{flex:1;padding:9px 0;text-align:center;font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.04em;color:var(--mu);border:none;background:transparent;border-radius:9px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.t-btn.active{background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;box-shadow:0 2px 12px rgba(176,38,255,.3)}
.form-view{display:none}.form-view.active{display:block}
.field-wrap{margin-bottom:14px}
.field-label{font-family:'Syne',sans-serif;font-size:.67rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mu2);margin-bottom:6px;display:block}
.ff{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
.ff:focus{border-color:var(--or)}.ff::placeholder{color:var(--mu)}
.ff-select{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;-webkit-appearance:none;cursor:pointer}
.ff-select option{background:#090D1A}
.pw-wrap{position:relative}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mu);cursor:pointer;font-size:1rem;padding:0}
.ff-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-main{width:100%;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:14px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 4px 24px rgba(176,38,255,.28);transition:opacity .18s,transform .18s;-webkit-tap-highlight-color:transparent}
.btn-main:active{opacity:.85;transform:scale(.98)}
.btn-main:disabled{opacity:.45;cursor:not-allowed}
.or-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--mu);font-size:.72rem}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.msg{padding:10px 14px;border-radius:10px;font-family:'Syne',sans-serif;font-size:.76rem;font-weight:700;margin-bottom:14px;display:none}
.msg.err{background:rgba(255,45,120,.1);border:1px solid rgba(255,45,120,.3);color:var(--pk)}
.msg.ok{background:rgba(198,255,74,.08);border:1px solid rgba(198,255,74,.25);color:var(--li)}
.msg.show{display:block}
.home-link{margin-top:20px;font-size:.78rem;color:var(--mu2);text-align:center}
.home-link a{color:var(--or);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="logo"><span class="dot"></span>PULSIFY</a>
  <div class="sub-logo">Business Portal</div>

  <div class="card">
    <div class="tab-row">
      <button class="t-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="t-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div class="form-view active" id="login-view">
      <div class="msg" id="login-msg"></div>
      <div class="field-wrap">
        <label class="field-label">Email Address</label>
        <input class="ff" type="email" id="l-email" placeholder="your@business.co.za" autocomplete="email"/>
      </div>
      <div class="field-wrap">
        <label class="field-label">Password</label>
        <div class="pw-wrap">
          <input class="ff" type="password" id="l-pw" placeholder="••••••••" autocomplete="current-password"/>
          <button class="pw-eye" onclick="togglePw('l-pw',this)">👁</button>
        </div>
      </div>
      <button class="btn-main" id="login-btn" onclick="doLogin()">Sign In to Dashboard</button>
      <div class="or-divider">or</div>
      <p style="text-align:center;font-size:.76rem;color:var(--mu2)">No account? <a href="#" onclick="switchTab('register');return false" style="color:var(--or);font-weight:700">Register your business →</a></p>
    </div>

    <!-- REGISTER -->
    <div class="form-view" id="register-view">
      <div class="msg" id="reg-msg"></div>
      <div class="field-wrap">
        <label class="field-label">Business Name</label>
        <input class="ff" type="text" id="r-name" placeholder="e.g. Eve's Lounge"/>
      </div>
      <div class="field-wrap">
        <label class="field-label">Business Type</label>
        <select class="ff-select" id="r-type">
          <option value="">Select category…</option>
          <option value="club">🌙 Club / Nightlife</option>
          <option value="shisanyama">🥩 Shisanyama / Braai</option>
          <option value="restaurant">🍽️ Restaurant</option>
          <option value="bar">🍺 Bar / Lounge</option>
          <option value="hotel">🏨 Hotel / BnB</option>
          <option value="venue">🎪 Event Venue</option>
          <option value="food">🍔 Food & Takeout</option>
          <option value="other">📍 Other</option>
        </select>
      </div>
      <div class="field-wrap">
        <label class="field-label">Email Address</label>
        <input class="ff" type="email" id="r-email" placeholder="owner@business.co.za"/>
      </div>
      <div class="ff-row" style="margin-bottom:14px">
        <div class="field-wrap" style="margin-bottom:0">
          <label class="field-label">Phone</label>
          <input class="ff" type="tel" id="r-phone" placeholder="+27 xx xxx xxxx"/>
        </div>
        <div class="field-wrap" style="margin-bottom:0">
          <label class="field-label">City</label>
          <input class="ff" type="text" id="r-city" placeholder="e.g. Durban"/>
        </div>
      </div>
      <div class="field-wrap">
        <label class="field-label">Province</label>
        <select class="ff-select" id="r-province">
          <option value="">Select…</option>
          <option>KwaZulu-Natal</option><option>Gauteng</option><option>Western Cape</option>
          <option>Eastern Cape</option><option>Limpopo</option><option>Mpumalanga</option>
          <option>North West</option><option>Free State</option><option>Northern Cape</option>
        </select>
      </div>
      <div class="field-wrap">
        <label class="field-label">Password (min 6 characters)</label>
        <div class="pw-wrap">
          <input class="ff" type="password" id="r-pw" placeholder="Min 6 characters" autocomplete="new-password"/>
          <button class="pw-eye" onclick="togglePw('r-pw',this)">👁</button>
        </div>
      </div>
      <button class="btn-main" id="reg-btn" onclick="doRegister()">Create Business Account</button>
    </div>
  </div>

  <div class="home-link"><a href="index.html">← Back to Pulsify Home</a></div>
</div>

<script>
const SUPA_URL = 'https://cjzewfvtdayjgjdpdmln.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqemV3ZnZ0ZGF5amdqZHBkbWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTg0MjYsImV4cCI6MjA5MTQzNDQyNn0.KQ80RmaB6cfA0dkcT-pdTe53fwyUrrIBeVJtToWF_Mk';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function redirectByRole() {
    let role = null;
    try { role = JSON.parse(localStorage.getItem('p_user') || '{}').role; } catch(e) {}
    if (!role) return; 

    const currentPage = window.location.pathname.split('/').pop();

    if (role === 'organizer') {
        if (currentPage !== 'organizer-dashboard.html') window.location.href = 'organizer-dashboard.html';
    } else if (role === 'business' || role === 'admin') {
        if (currentPage !== 'business-dashboard.html') window.location.href = 'business-dashboard.html';
    }
}
redirectByRole();

function switchTab(tab) {
  document.querySelectorAll('.t-btn').forEach((b,i) => b.classList.toggle('active', tab==='login'?i===0:i===1));
  document.getElementById('login-view').classList.toggle('active', tab==='login');
  document.getElementById('register-view').classList.toggle('active', tab!=='login');
}

function showMsg(id, txt, type) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className = 'msg ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 4000);
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}


async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pw    = document.getElementById('l-pw').value;
  if (!email || !pw) { showMsg('login-msg','Please fill in all fields','err'); return; }

  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;

    const { data: profile, error: pError } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
    if (pError) throw pError;

    if (!['business','organizer','admin'].includes(profile.role)) {
      btn.textContent='Sign In to Dashboard'; btn.disabled=false;
      showMsg('login-msg','This is not a business or organizer account. Use the main sign in page.','err');
      return;
    }

    const userPayload = {id: data.user.id, email, display_name: profile.display_name || email.split('@')[0], role: profile.role};
    localStorage.setItem('p_user', JSON.stringify(userPayload));
    localStorage.setItem('p_profile', JSON.stringify(profile));
    localStorage.setItem('p_token', data.session.access_token);
    
    // Legacy biz_session for dashboard compatibility
    if (profile.role === 'business') {
      const session = {id:data.user.id, email, name:profile.display_name||email.split('@')[0],
        type:profile.category||'business', city:profile.city||'', role:profile.role};
      localStorage.setItem('biz_session', JSON.stringify(session));
    }

    showMsg('login-msg','Welcome back! Redirecting…','ok');
    
    if (profile.role === 'organizer') {
      setTimeout(()=>window.location.href='organizer-dashboard.html', 800);
    } else { // business or admin
      setTimeout(()=>window.location.href='business-dashboard.html', 800);
    }

  } catch(e) {
    btn.textContent='Sign In to Dashboard'; btn.disabled=false;
    showMsg('login-msg', e.message.includes('Invalid login') ? 'Incorrect email or password.' : e.message, 'err');
  }
}

async function doRegister() {
  const name     = document.getElementById('r-name').value.trim();
  const type     = document.getElementById('r-type').value;
  const email    = document.getElementById('r-email').value.trim();
  const phone    = document.getElementById('r-phone').value.trim();
  const city     = document.getElementById('r-city').value.trim();
  const province = document.getElementById('r-province')?.value || '';
  const pw       = document.getElementById('r-pw').value;

  if (!name||!type||!email||!city||!pw) { showMsg('reg-msg','Please fill in all required fields','err'); return; }
  if (pw.length < 6) { showMsg('reg-msg','Password must be at least 6 characters','err'); return; }

  const btn = document.getElementById('reg-btn');
  btn.textContent = 'Creating account…'; btn.disabled = true;

  try {
    const r = await fetch(`/api/auth/register-business`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, type, email, phone, city, province, password: pw, address: '' })
    });
    const d = await r.json();
    if (!r.ok) {
      throw new Error(d.error || 'Registration failed');
    }

    const token = d.session?.access_token;
    if (token) {
        localStorage.setItem('p_token', token);
        const userPayload = {id:d.user.id, email, display_name:name, role:'business'};
        localStorage.setItem('p_user', JSON.stringify(userPayload));
        const session = {id:d.user.id, email, name, type, city, province, phone, role:'business'};
        localStorage.setItem('biz_session', JSON.stringify(session));

        showMsg('reg-msg','✅ Account created! Redirecting…','ok');
        setTimeout(()=>window.location.href='business-dashboard.html', 800);
    } else {
        throw new Error('No session token returned.');
    }
  } catch(e) {
      btn.textContent='Create Business Account'; btn.disabled=false;
      showMsg('reg-msg', e.message ,'err');
  }
}

document.addEventListener('keydown', e => {
  if (e.key==='Enter') {
    if (document.getElementById('login-view').classList.contains('active')) doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
