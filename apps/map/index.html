<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0A0E1A"/>
<title>Map — Pulsify</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--cy:#00E5FF;--pu:#B026FF;
  --tx:#FFFFFF;--mu:rgba(255,255,255,.55);
  --glass:rgba(10,14,26,.82);--border:rgba(255,255,255,.12)
}
html,body{height:100%;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#map{position:fixed;inset:0}

/* ── Top Bar ── */
.tb{
  position:fixed;top:0;left:0;right:0;height:56px;z-index:100;
  display:flex;align-items:center;padding:0 12px;gap:10px;
  background:linear-gradient(135deg,rgba(176,38,255,.95),rgba(255,92,0,.95));
  backdrop-filter:blur(24px);
}
.bk{
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:1rem;text-decoration:none;flex-shrink:0;
  transition:background .15s
}
.bk:hover{background:rgba(255,255,255,.28)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.06em;color:#fff;flex:1;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.cnt{
  display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);
  border-radius:50px;padding:4px 10px;font-family:'Syne',sans-serif;
  font-size:.68rem;font-weight:800;color:#fff;letter-spacing:.04em;
}
.cnt b{color:var(--li)}

/* ── Filter chips ── */
.fl{
  position:fixed;top:64px;left:0;right:0;z-index:99;
  display:flex;gap:6px;padding:8px 12px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.fl::-webkit-scrollbar{display:none}
.cb{
  flex-shrink:0;background:var(--glass);backdrop-filter:blur(20px);
  border:1.5px solid var(--border);color:rgba(255,255,255,.7);
  padding:6px 14px;border-radius:50px;font-family:'Syne',sans-serif;
  font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;
}
.cb.active{
  background:linear-gradient(135deg,var(--pu),var(--or));
  color:#fff;border-color:transparent;
  box-shadow:0 4px 18px rgba(176,38,255,.45)
}

/* ── Markers (NO ::after — avoids flicker) ── */
.marker-wrap{
  position:relative;width:48px;height:48px;cursor:pointer;
  will-change:transform;
}
.pulse-ring{
  position:absolute;inset:-6px;border-radius:50%;
  pointer-events:none; /* never intercepts touch — fixes flickering */
  animation:pulse-ring 2.4s ease-out infinite;
}
.pin-dot{
  position:absolute;inset:4px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;line-height:1;
  border:2.5px solid rgba(255,255,255,.9);
  box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.1),inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
.marker-wrap:hover .pin-dot{transform:scale(1.22)}
.marker-wrap:active .pin-dot{transform:scale(.95)}

/* pin colour themes */
.pin-event .pin-dot{background:linear-gradient(135deg,#FF5C00,#FF2D78)}
.pin-event .pulse-ring{background:radial-gradient(circle,rgba(255,92,0,.5),transparent 70%)}
.pin-biz   .pin-dot{background:linear-gradient(135deg,#B026FF,#00E5FF)}
.pin-biz   .pulse-ring{background:radial-gradient(circle,rgba(176,38,255,.5),transparent 70%)}
.pin-shisa .pin-dot{background:linear-gradient(135deg,#FF2D78,#FF5C00)}
.pin-shisa .pulse-ring{background:radial-gradient(circle,rgba(255,45,120,.5),transparent 70%)}
.pin-rest  .pin-dot{background:linear-gradient(135deg,#00E5FF,#C6FF4A)}
.pin-rest  .pulse-ring{background:radial-gradient(circle,rgba(0,229,255,.5),transparent 70%)}
.pin-night .pin-dot{background:linear-gradient(135deg,#C6FF4A,#B026FF)}
.pin-night .pulse-ring{background:radial-gradient(circle,rgba(198,255,74,.5),transparent 70%)}

@keyframes pulse-ring{
  0%{transform:scale(.7);opacity:.7}
  70%{opacity:.3}
  100%{transform:scale(1.9);opacity:0}
}

/* ── Popups ── */
.mapboxgl-popup{max-width:300px!important}
.mapboxgl-popup-content{
  background:rgba(10,14,26,.97)!important;
  border:1.5px solid rgba(176,38,255,.5)!important;
  border-radius:18px!important;padding:0!important;
  box-shadow:0 12px 48px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06)!important;
  overflow:hidden!important;
}
.mapboxgl-popup-tip{border-top-color:rgba(176,38,255,.5)!important;border-bottom-color:rgba(176,38,255,.5)!important}
.mapboxgl-popup-close-button{
  color:rgba(255,255,255,.7)!important;font-size:1.3rem;
  padding:8px 10px;z-index:2;top:2px;right:2px;
}
.pop-img{width:100%;height:130px;object-fit:cover;display:block}
.pop-body{padding:14px}
.pop-tag-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.pop-tag{
  background:rgba(176,38,255,.2);border:1px solid rgba(176,38,255,.4);
  color:var(--cy);border-radius:50px;padding:3px 9px;
  font-family:'Syne',sans-serif;font-size:.62rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em
}
.pop-tag.or{background:rgba(255,92,0,.2);border-color:rgba(255,92,0,.4);color:var(--or)}
.pop-tag.gr{background:rgba(198,255,74,.15);border-color:rgba(198,255,74,.4);color:var(--li)}
.pop-name{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;line-height:1.1;color:#fff;margin-bottom:4px}
.pop-meta{font-size:.73rem;color:var(--mu);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.pop-btn{
  display:block;width:100%;margin-top:12px;
  background:linear-gradient(135deg,var(--pu),var(--or));
  color:#fff;text-align:center;padding:10px;border-radius:50px;
  font-family:'Syne',sans-serif;font-size:.76rem;font-weight:800;
  text-decoration:none;border:none;cursor:pointer;
  box-shadow:0 4px 16px rgba(176,38,255,.4);transition:opacity .15s
}
.pop-btn:hover{opacity:.88}

/* ── Legend ── */
.legend{
  position:fixed;bottom:16px;left:12px;
  background:var(--glass);backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:16px;
  padding:10px 14px;z-index:99;
  box-shadow:0 8px 32px rgba(0,0,0,.5)
}
.legend-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:.7rem;color:rgba(255,255,255,.7);font-family:'Syne',sans-serif;font-weight:700}
.legend-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.5)}

/* ── Toast ── */
.toast{
  position:fixed;top:130px;left:50%;transform:translateX(-50%) translateY(-8px);
  background:var(--glass);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:50px;
  padding:9px 20px;font-family:'Syne',sans-serif;font-size:.75rem;
  font-weight:700;color:#fff;z-index:200;
  opacity:0;transition:all .25s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--pk);color:var(--pk)}

/* ── Banner strip ── */
#banner-strip{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:199;width:min(420px,calc(100% - 24px));display:none;pointer-events:auto}
.b-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px);margin-bottom:8px;cursor:pointer;animation:slideDown .3s ease;transition:opacity .2s}
.b-card:hover{opacity:.9}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── Loading overlay — PULSIFY MAP EXPLORE ── */
#loader{
  position:fixed;inset:0;z-index:300;
  background:radial-gradient(ellipse at center,#0c0f1f 0%,#05080F 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  text-align:center;padding:24px;
}
#loader.fade-out{animation:loaderOut .45s ease-in forwards}
.ms-pulse{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.ms-pulse::before,.ms-pulse::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--or);box-shadow:0 0 30px rgba(255,92,0,.55);animation:msRing 1.8s ease-out infinite}
.ms-pulse::after{animation-delay:.9s;border-color:var(--pu);box-shadow:0 0 30px rgba(176,38,255,.55)}
.ms-dot{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,var(--or) 55%,var(--pu));box-shadow:0 0 50px var(--or),0 0 90px rgba(176,38,255,.6);animation:msDot 1.6s ease-in-out infinite}
.loader-logo{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:.18em;line-height:1;
  background:linear-gradient(135deg,#FF5C00,#B026FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 30px rgba(255,92,0,.35)}
.loader-sub{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.5em;color:var(--cy);margin-top:-2px;
  text-shadow:0 0 12px rgba(0,229,255,.6);padding-left:.5em}
.loader-sub2{font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--mu);margin-top:4px;animation:loaderTextPulse 1.6s ease-in-out infinite}
@keyframes msRing{0%{transform:scale(.65);opacity:1}100%{transform:scale(1.9);opacity:0}}
@keyframes msDot{0%,100%{transform:scale(1);box-shadow:0 0 50px var(--or),0 0 90px rgba(176,38,255,.6)}50%{transform:scale(1.12);box-shadow:0 0 70px var(--or),0 0 120px rgba(176,38,255,.8)}}
@keyframes loaderTextPulse{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes loaderOut{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>

<div id="loader">
  <div class="ms-pulse"><div class="ms-dot"></div></div>
  <div class="loader-logo">PULSIFY MAP</div>
  <div class="loader-sub">EXPLORE</div>
  <div class="loader-sub2">Loading the streets…</div>
</div>

<div class="tb">
  <a onclick="history.length>1?history.back():window.location.href='/'" class="bk" title="Back" style="cursor:pointer">←</a>
  <div class="logo">📍 PULSIFY MAP</div>
  <div class="cnt"><b id="cnt-num">0</b>&nbsp;spots</div>
</div>

<div class="fl">
  <button class="cb active" onclick="setFilter('all',this)">✦ All</button>
  <button class="cb" onclick="setFilter('upcoming',this)">🔜 Upcoming</button>
  <button class="cb" onclick="setFilter('event',this)">🎟 Events</button>
  <button class="cb" onclick="setFilter('business',this)">🏪 Businesses</button>
  <button class="cb" onclick="setFilter('shisanyama',this)">🔥 Shisanyama</button>
  <button class="cb" onclick="setFilter('restaurant',this)">🍴 Restaurants</button>
  <button class="cb" onclick="setFilter('nightclub',this)">🎵 Nightlife</button>
</div>

<div id="map"></div>
<div id="banner-strip"></div>

<div class="legend">
  <div class="legend-row"><div class="legend-dot" style="background:linear-gradient(135deg,#FF5C00,#FF2D78)"></div>Events</div>
  <div class="legend-row"><div class="legend-dot" style="background:linear-gradient(135deg,#B026FF,#00E5FF)"></div>Businesses</div>
  <div class="legend-row"><div class="legend-dot" style="background:linear-gradient(135deg,#FF2D78,#FF5C00)"></div>Shisanyama</div>
  <div class="legend-row"><div class="legend-dot" style="background:linear-gradient(135deg,#00E5FF,#C6FF4A)"></div>Food</div>
  <div class="legend-row"><div class="legend-dot" style="background:linear-gradient(135deg,#C6FF4A,#B026FF)"></div>Nightlife</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL  = 'https://cjzewfvtdayjgjdpdmln.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqemV3ZnZ0ZGF5amdqZHBkbWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTg0MjYsImV4cCI6MjA5MTQzNDQyNn0.KQ80RmaB6cfA0dkcT-pdTe53fwyUrrIBeVJtToWF_Mk';
const MB_TOKEN  = 'pk.eyJ1IjoidGhhY29sbGluMiIsImEiOiJjbW51Mm95cHEwYm8xMnJyMXEzaXgxMDBmIn0.nF80wBOn-jxhjpAIus9anw';

const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
mapboxgl.accessToken = MB_TOKEN;

function hideSplash() {
  const el = document.getElementById('loader');
  if (el) { el.classList.add('fade-out'); setTimeout(() => el.style.display = 'none', 450); }
}

if (!mapboxgl.supported()) {
  hideSplash();
  document.getElementById('map').innerHTML = '<div style="color:var(--or);font-family:Syne,sans-serif;font-size:1rem;text-align:center;padding:40px">WebGL is not supported on this browser.</div>';
}

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [30.9, -29.9],
  zoom: 10,
  attributionControl: false,
  antialias: true,
});
map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');
map.addControl(new mapboxgl.GeolocateControl({ positionOptions: { enableHighAccuracy: true }, trackUserLocation: false }), 'top-right');

const _splashTimeout = setTimeout(hideSplash, 10000);

map.on('error', (e) => {
  const msg = e?.error?.message || '';
  if (/does not exist in the map'?s style|already.*exist|no.*layer|no.*source/i.test(msg)) return;
  console.warn('[Map error]', msg);
  hideSplash();
});

let allItems = [], currentFilter = 'all';

async function safeJson(r) { try { const t = await r.text(); return t ? JSON.parse(t) : {}; } catch(e) { return {}; } }

function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function validCoord(lat, lon) {
  const la = parseFloat(lat), lo = parseFloat(lon);
  if (!isFinite(la) || !isFinite(lo)) return false;
  if (la === 0 || lo === 0) return false;
  if (la < -35 || la > -22) return false;
  if (lo < 16 || lo > 33) return false;
  return true;
}

function catOf(item) { return (item.category || item.type || item.genre || '').toLowerCase(); }

function pinIcon(item) {
  if (item._kind === 'event') return '🎟';
  const c = catOf(item);
  if (c.includes('shisa')) return '🔥';
  if (c.includes('restaurant') || c.includes('food') || c.includes('cafe')) return '🍴';
  if (c.includes('club') || c.includes('night') || c.includes('bar')) return '🎵';
  if (c.includes('takeaway')) return '🍟';
  return '🏪';
}

function itemCat(item) {
  if (item._kind === 'event') return 'event';
  const c = catOf(item);
  if (c.includes('shisa')) return 'shisanyama';
  if (c.includes('restaurant') || c.includes('food') || c.includes('cafe')) return 'restaurant';
  if (c.includes('club') || c.includes('night') || c.includes('bar')) return 'nightclub';
  return 'business';
}

function popupHTML(item) {
  const isEv = item._kind === 'event';
  const name  = esc(item.name || 'Unknown');
  const img   = item.image_url || null;
  const cat   = esc(catOf(item) || (isEv ? 'Event' : 'Business'));
  const city  = esc(isEv ? (item.venue_city || '') : (item.city || ''));
  const venue = isEv ? esc(item.venue_name || '') : '';
  const date  = isEv && item.date_local
    ? new Date(item.date_local).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}) : '';
  const price = isEv ? (item.is_free ? 'FREE' : item.price_min ? `From R${item.price_min}` : '') : '';
  const isPast = isEv && item._past;
  const detailUrl = isEv ? `/?eid=${encodeURIComponent(item.id)}` : `/?bid=${encodeURIComponent(item.id)}`;
  const accentGrad = isEv
    ? 'linear-gradient(135deg,#FF5C00,#FF2D78)'
    : 'linear-gradient(135deg,#B026FF,#00E5FF)';
  return `<div style="overflow:hidden">
  ${img ? `<div style="position:relative">
    <img style="width:100%;height:160px;object-fit:cover;display:block" src="${esc(img)}" loading="lazy" onerror="this.closest('div').style.display='none'"/>
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(5,8,15,.92) 0%,rgba(5,8,15,.2) 55%,transparent 100%);pointer-events:none"></div>
    <div style="position:absolute;bottom:0;left:0;right:0;padding:10px 14px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1.1;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.9)">${name}</div>
    </div>
    <div style="position:absolute;top:10px;left:10px;display:flex;gap:5px;flex-wrap:wrap">
      <span style="background:${accentGrad};color:#fff;border-radius:50px;padding:3px 9px;font-family:'Syne',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase">${cat}</span>
      ${price ? `<span style="background:rgba(198,255,74,.18);border:1px solid rgba(198,255,74,.5);color:#C6FF4A;border-radius:50px;padding:3px 9px;font-family:'Syne',sans-serif;font-size:.6rem;font-weight:800">${esc(price)}</span>` : ''}
      ${isPast ? `<span style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.5);border-radius:50px;padding:3px 9px;font-family:'Syne',sans-serif;font-size:.6rem;font-weight:700">Past</span>` : ''}
    </div>
  </div>` : `<div style="background:${accentGrad};padding:18px 14px 14px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1.1;color:#fff">${name}</div>
    <div style="margin-top:6px;display:flex;gap:5px">
      <span style="background:rgba(255,255,255,.18);color:#fff;border-radius:50px;padding:3px 9px;font-family:'Syne',sans-serif;font-size:.6rem;font-weight:800;text-transform:uppercase">${cat}</span>
      ${price ? `<span style="background:rgba(198,255,74,.3);color:#C6FF4A;border-radius:50px;padding:3px 9px;font-family:'Syne',sans-serif;font-size:.6rem;font-weight:800">${esc(price)}</span>` : ''}
    </div>
  </div>`}
  <div style="padding:10px 14px 14px">
    ${venue ? `<div class="pop-meta" style="margin-bottom:3px">📍 ${venue}${city ? ', '+city : ''}</div>` : city ? `<div class="pop-meta" style="margin-bottom:3px">📍 ${city}</div>` : ''}
    ${date ? `<div class="pop-meta" style="margin-bottom:3px">📅 ${date}</div>` : ''}
    <a class="pop-btn" href="${detailUrl}" style="margin-top:10px">View Details →</a>
  </div>
</div>`;
}

/* ── Build GeoJSON for the active filter ── */
function buildGeoJSON(filter) {
  const features = allItems.filter(item => {
    if (filter === 'all')        return true;
    if (filter === 'upcoming')   return item._kind === 'event' && !item._past;
    if (filter === 'event')      return item._kind === 'event';
    if (filter === 'business')   return item._kind === 'business';
    if (item._kind !== 'business') return false;
    const c = catOf(item);
    if (filter === 'shisanyama') return c.includes('shisa');
    if (filter === 'restaurant') return c.includes('restaurant') || c.includes('food') || c.includes('cafe');
    if (filter === 'nightclub')  return c.includes('club') || c.includes('night') || c.includes('bar');
    return false;
  }).map(item => {
    const lat = parseFloat(item.venue_lat ?? item.lat);
    const lon = parseFloat(item.venue_lon ?? item.lon);
    if (!validCoord(lat, lon)) return null;
    return {
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [lon, lat] },
      properties: {
        id: String(item.id),
        _kind: item._kind,
        _past: item._past ? 1 : 0,
        _cat:  itemCat(item),
        _icon: pinIcon(item)
      }
    };
  }).filter(Boolean);
  return { type: 'FeatureCollection', features };
}

function updateSource(filter) {
  const src = map.getSource('spots');
  if (!src) return;
  const gj = buildGeoJSON(filter);
  src.setData(gj);
  document.getElementById('cnt-num').textContent = gj.features.length;
  if (gj.features.length > 1) {
    const coords = gj.features.map(f => f.geometry.coordinates);
    const bounds = coords.reduce((b,c) => b.extend(c), new mapboxgl.LngLatBounds(coords[0], coords[0]));
    map.fitBounds(bounds, { padding: 80, maxZoom: 13, duration: 900 });
  } else if (gj.features.length === 1) {
    map.flyTo({ center: gj.features[0].geometry.coordinates, zoom: 13, duration: 900 });
  }
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.cb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateSource(cat);
}

/* ── Mapbox layers: heatmap + clusters + animated pulse ── */
function setupLayers() {
  map.addSource('spots', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] },
    cluster: true,
    clusterMaxZoom: 13,
    clusterRadius: 55
  });

  /* Heatmap — visible until zoom 14 then fades out */
  map.addLayer({
    id: 'heatmap', type: 'heatmap', source: 'spots', maxzoom: 14,
    paint: {
      'heatmap-weight': 1,
      'heatmap-intensity': ['interpolate',['linear'],['zoom'], 6,1, 14,3],
      'heatmap-color': ['interpolate',['linear'],['heatmap-density'],
        0,   'rgba(0,0,0,0)',
        0.1, 'rgba(0,229,255,0.25)',
        0.3, 'rgba(176,38,255,0.5)',
        0.55,'rgba(255,92,0,0.7)',
        0.8, 'rgba(255,45,120,0.85)',
        1,   'rgba(255,255,255,0.95)'
      ],
      'heatmap-radius': ['interpolate',['linear'],['zoom'], 6,18, 12,42],
      'heatmap-opacity': ['interpolate',['linear'],['zoom'], 10,1, 13.5,0]
    }
  });

  /* ── Cluster outer halo (pulsing glow) ── */
  map.addLayer({
    id: 'cluster-halo', type: 'circle', source: 'spots',
    filter: ['has','point_count'],
    paint: {
      'circle-color': ['step',['get','point_count'],
        '#7B2FBE', 5, '#FF5C00', 15, '#FF2D78', 40, '#C6FF4A'
      ],
      'circle-radius': ['step',['get','point_count'], 32,5,42,15,52,40,62],
      'circle-blur': 0.7,
      'circle-opacity': 0.35
    }
  });

  /* Cluster drop-shadow */
  map.addLayer({
    id: 'cluster-shadow', type: 'circle', source: 'spots',
    filter: ['has','point_count'],
    paint: {
      'circle-color': 'rgba(0,0,0,0.5)',
      'circle-radius': ['step',['get','point_count'], 28,10,36,30,44,80,52],
      'circle-blur': 0.85,
      'circle-translate': [2,4]
    }
  });

  /* Cluster circles */
  map.addLayer({
    id: 'cluster-circle', type: 'circle', source: 'spots',
    filter: ['has','point_count'],
    paint: {
      'circle-color': ['step',['get','point_count'],
        '#7B2FBE', 5, '#FF5C00', 15, '#FF2D78', 40, '#C6FF4A'
      ],
      'circle-radius': ['step',['get','point_count'], 22,5,30,15,38,40,46],
      'circle-stroke-width': 2.5,
      'circle-stroke-color': 'rgba(255,255,255,0.4)',
      'circle-opacity': 0.95
    }
  });

  /* Cluster count label */
  map.addLayer({
    id: 'cluster-count', type: 'symbol', source: 'spots',
    filter: ['has','point_count'],
    layout: {
      'text-field': '{point_count_abbreviated}',
      'text-size': 13,
      'text-font': ['DIN Offc Pro Bold','Arial Unicode MS Bold']
    },
    paint: { 'text-color':'#fff','text-halo-color':'rgba(0,0,0,0.5)','text-halo-width':1 }
  });

  /* ── 3 concentric sonar rings per individual pin ── */
  const RING_COLOR = ['match',['get','_kind'],'event','#FF5C00','#B026FF'];
  ['pulse-r1','pulse-r2','pulse-r3'].forEach(id => {
    map.addLayer({
      id, type: 'circle', source: 'spots',
      filter: ['!',['has','point_count']],
      minzoom: 11,
      paint: {
        'circle-color': RING_COLOR,
        'circle-radius': 9,
        'circle-opacity': 0,
        'circle-blur': 0.6
      }
    });
  });

  /* Solid individual pin */
  map.addLayer({
    id: 'unclustered-point', type: 'circle', source: 'spots',
    filter: ['!',['has','point_count']],
    minzoom: 11,
    paint: {
      'circle-color': ['match',['get','_cat'],
        'event',      '#FF5C00',
        'shisanyama', '#FF2D78',
        'restaurant', '#00E5FF',
        'nightclub',  '#C6FF4A',
        '#B026FF'
      ],
      'circle-radius': 9,
      'circle-stroke-width': 2.5,
      'circle-stroke-color': 'rgba(255,255,255,0.92)',
      'circle-opacity': ['case',['==',['get','_past'],1], 0.38, 1]
    }
  });

  /* Emoji icon at street level */
  map.addLayer({
    id: 'unclustered-icon', type: 'symbol', source: 'spots',
    filter: ['!',['has','point_count']],
    minzoom: 13,
    layout: {
      'text-field': ['get','_icon'],
      'text-size': 14,
      'text-allow-overlap': true,
      'text-ignore-placement': true,
      'text-anchor': 'center'
    }
  });

  /* ── Sonar pulse: 3 staggered rings + cluster halo ── */
  const PERIOD = 2400;
  let pulseT0 = null;
  function animatePulse(ts) {
    if (!pulseT0) pulseT0 = ts;
    const elapsed = (ts - pulseT0) % PERIOD;

    // Three rings, each 1/3 period behind the previous
    ['pulse-r1','pulse-r2','pulse-r3'].forEach((id, i) => {
      if (!map.getLayer(id)) return;
      const p = ((elapsed + i * (PERIOD / 3)) % PERIOD) / PERIOD;
      map.setPaintProperty(id, 'circle-radius',  9 + p * 40);
      map.setPaintProperty(id, 'circle-opacity', 0.68 * (1 - p));
    });

    // Cluster halo breathes on a slower sine cycle
    if (map.getLayer('cluster-halo')) {
      const breath = 0.5 + 0.5 * Math.sin((elapsed / PERIOD) * Math.PI * 2);
      map.setPaintProperty('cluster-halo', 'circle-opacity', 0.18 + 0.28 * breath);
    }

    requestAnimationFrame(animatePulse);
  }
  requestAnimationFrame(animatePulse);

  /* ── Interactions ── */
  map.on('click', 'cluster-circle', (e) => {
    const f = map.queryRenderedFeatures(e.point, { layers: ['cluster-circle'] })[0];
    if (!f) return;
    map.getSource('spots').getClusterExpansionZoom(f.properties.cluster_id, (err, zoom) => {
      if (!err) map.easeTo({ center: f.geometry.coordinates, zoom: zoom + 0.5, duration: 500 });
    });
  });

  map.on('click', 'unclustered-point', (e) => {
    const p = e.features[0].properties;
    const item = allItems.find(i => String(i.id) === p.id);
    if (!item) return;
    new mapboxgl.Popup({ offset: 22, closeButton: true, maxWidth: '300px' })
      .setLngLat(e.features[0].geometry.coordinates.slice())
      .setHTML(popupHTML(item))
      .addTo(map);
  });

  ['cluster-circle','unclustered-point','cluster-halo'].forEach(l => {
    map.on('mouseenter', l, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', l, () => { map.getCanvas().style.cursor = ''; });
  });
  map.on('click', 'cluster-halo', (e) => {
    const f = map.queryRenderedFeatures(e.point, { layers: ['cluster-circle'] })[0];
    if (!f) return;
    map.getSource('spots').getClusterExpansionZoom(f.properties.cluster_id, (err, zoom) => {
      if (!err) map.easeTo({ center: f.geometry.coordinates, zoom: zoom + 0.5, duration: 500 });
    });
  });
}

async function loadData() {
  try {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 30);
    const fromDate = cutoff.toISOString().split('T')[0];
    const today    = new Date().toISOString().split('T')[0];

    const [evRes, bzRes] = await Promise.all([
      sb.from('events')
        .select('id,name,date_local,venue_name,venue_city,venue_lat,venue_lon,price_min,is_free,image_url,genre')
        .gte('date_local', fromDate)
        .not('venue_lat','is',null).not('venue_lon','is',null)
        .neq('venue_lat',0).neq('venue_lon',0)
        .order('date_local',{ ascending:false }).limit(500),
      sb.from('businesses')
        .select('id,name,category,city,province,lat,lon,cover_image_url,description')
        .not('lat','is',null).not('lon','is',null)
        .neq('lat',0).neq('lon',0).limit(500),
    ]);

    const events = (evRes.data || []).map(e => ({ ...e, _kind:'event',    _past: e.date_local < today }));
    const biz    = (bzRes.data || []).map(b => ({ ...b, _kind:'business', image_url: b.cover_image_url }));
    allItems = [...events, ...biz];

    hideSplash();
    if (!allItems.length) { toast('No locations found — add some events or businesses first', true); return; }
    updateSource('all');
  } catch (e) {
    console.error('[Map]', e);
    hideSplash();
    toast('Failed to load: ' + e.message, true);
  }
}

map.on('load', () => { clearTimeout(_splashTimeout); hideSplash(); setupLayers(); loadData(); loadBanners(); });

async function loadBanners() {
  try {
    const r = await fetch('/api/banners');
    const { banners } = await safeJson(r);
    if (!banners?.length) return;
    const strip = document.getElementById('banner-strip');
    strip.style.display = 'block';
    strip.innerHTML = banners.map(b => `
      <div class="b-card" style="background:${esc(b.bg_color)}22;border-color:${esc(b.bg_color)}55"
           onclick="${b.target_url ? `window.location='${esc(b.target_url)}'` : 'void 0'}">
        <div style="flex:1;min-width:0">
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(b.title)}</div>
          ${b.subtitle ? `<div style="font-size:.7rem;color:rgba(255,255,255,.6);margin-top:1px">${esc(b.subtitle)}</div>` : ''}
        </div>
        <button onclick="event.stopPropagation();this.closest('.b-card').remove();if(!document.querySelector('.b-card'))document.getElementById('banner-strip').style.display='none'"
          style="background:none;border:none;color:rgba(255,255,255,.5);font-size:.9rem;cursor:pointer;flex-shrink:0;padding:2px 4px;line-height:1">✕</button>
      </div>`).join('');
    setTimeout(() => { strip.style.display = 'none'; }, 15000);
  } catch(e) {}
}
