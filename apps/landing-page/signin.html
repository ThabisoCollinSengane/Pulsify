<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#05080F"/>
<meta name="description" content="Sign in to Pulsefy — South Africa's live event discovery platform. Book tickets, follow organisers, plan outings with your squad."/>
<meta name="robots" content="noindex,follow"/>
<title>Sign In — Pulsefy 🇿🇦</title>
<link rel="canonical" href="https://pulsefy.co.za/signin"/>
<link rel="icon" type="image/png" href="/favicon.png"/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Pulsefy"/>
<meta property="og:title" content="Sign In — Pulsefy"/>
<meta property="og:description" content="Sign in to Pulsefy — South Africa's live event discovery platform."/>
<meta property="og:url" content="https://pulsefy.co.za/signin"/>
<meta property="og:image" content="https://pulsefy.co.za/og-image.png"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="Sign In — Pulsefy"/>
<meta name="twitter:image" content="https://pulsefy.co.za/og-image.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080F;--bg2:#090D1A;--surf:#0D1424;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--tx:#F0EEF8;--mu:#5A5870;--mu2:#9997B0;--pu:#B026FF}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.06em;display:flex;align-items:center;gap:10px;margin-bottom:4px;cursor:pointer;text-decoration:none;color:var(--tx)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--or);box-shadow:0 0 12px var(--or);animation:p 2s ease-in-out infinite;flex-shrink:0}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.tagline{font-size:.78rem;color:var(--mu);margin-bottom:28px;text-align:center}
.card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border2);border-radius:22px;padding:26px 22px 30px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.03em;margin-bottom:4px}
.card-sub{font-size:.8rem;color:var(--mu);margin-bottom:20px}
.lbl{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu2);margin-bottom:5px;display:block}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;margin-bottom:14px;transition:border-color .2s}
.inp:focus{border-color:var(--or)!important}.inp::placeholder{color:var(--mu)}
.pw-wrap{position:relative;margin-bottom:14px}
.pw-wrap .inp{margin-bottom:0}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mu);cursor:pointer;font-size:.78rem;font-family:'Syne',sans-serif;font-weight:700}
.forgot{display:block;text-align:right;font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;color:var(--or);cursor:pointer;margin-bottom:18px}
.btn{width:100%;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:14px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--mu);font-size:.76rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.gbtn{width:100%;background:var(--surf);color:var(--tx);border:1.5px solid var(--border2);padding:13px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.84rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s;margin-bottom:10px}
.gbtn:active{border-color:var(--or)}
.asw{text-align:center;margin-top:16px;font-size:.78rem;color:var(--mu)}
.asw a{color:var(--or);font-weight:700;text-decoration:none}
.err{background:rgba(255,45,120,.08);border:1px solid rgba(255,45,120,.3);border-radius:10px;padding:10px 14px;font-size:.78rem;color:var(--pk);margin-bottom:14px;display:none;line-height:1.5}
.err.show{display:block}
.ok-banner{background:rgba(198,255,74,.07);border:1px solid rgba(198,255,74,.25);border-radius:10px;padding:10px 14px;font-size:.78rem;color:var(--li);margin-bottom:14px;display:none}
.ok-banner.show{display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:10px 22px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;color:var(--tx);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(198,255,74,.4);color:var(--li)}
.biz-link{text-align:center;margin-top:10px;font-size:.74rem}
.biz-link a{color:var(--mu2);text-decoration:none;border-bottom:1px solid var(--border2)}
.back{text-align:center;margin-top:10px;font-size:.74rem}
.back a{color:var(--mu);text-decoration:none}
.acc-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.acc-type-btn{padding:12px 8px;border-radius:14px;border:1.5px solid var(--border);background:rgba(255,255,255,.02);cursor:pointer;text-align:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.acc-type-btn.sel{border-color:var(--or);background:rgba(255,92,0,.08)}
.acc-type-btn .ico{font-size:1.4rem;margin-bottom:4px}
.acc-type-btn .lbl2{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;color:var(--mu2);transition:color .2s}
.acc-type-btn.sel .lbl2{color:var(--or)}
.acc-type-full{grid-column:1/-1;padding:11px;border-radius:14px;border:1.5px solid rgba(176,38,255,.35);background:rgba(176,38,255,.06);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.acc-type-full.sel{border-color:var(--pu);background:rgba(176,38,255,.12)}
.acc-type-full .ico{font-size:1.4rem;flex-shrink:0}
.acc-type-full .inf{text-align:left}
.acc-type-full .inf .ttl{font-family:'Syne',sans-serif;font-size:.76rem;font-weight:700;color:var(--tx)}
.acc-type-full .inf .sub{font-size:.66rem;color:var(--mu)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<a class="logo" href="/"><span class="dot"></span>PULSIFY</a>
<p class="tagline">Feel the Vibe 🇿🇦</p>

<div class="card">
  <div class="card-title">Welcome Back</div>
  <div class="card-sub" id="card-sub">Choose your account type to sign in</div>

  <div class="acc-type-grid" id="acc-type-grid">
    <div class="acc-type-btn sel" id="at-user" onclick="selectType('user')">
      <div class="ico">🎉</div>
      <div class="lbl2">Fan / User</div>
    </div>
    <div class="acc-type-btn" id="at-organizer" onclick="selectType('organizer')">
      <div class="ico">🎪</div>
      <div class="lbl2">Organizer</div>
    </div>
    <div class="acc-type-full" id="at-business" onclick="selectType('business')">
      <div class="ico">🏪</div>
      <div class="inf">
        <div class="ttl">Business / Venue</div>
        <div class="sub">Restaurants, bars, shisanyamas &amp; hotels</div>
      </div>
    </div>
  </div>

  <div class="err" id="err"></div>
  <div class="ok-banner" id="ok-banner"></div>

  <button class="gbtn" id="google-btn" onclick="signInWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <!-- Apple sign-in temporarily hidden — needs Apple Developer account to enable -->
  <button class="gbtn" id="apple-btn" onclick="signInWithApple()" style="display:none;background:#000;color:#fff;border-color:#000;margin-top:8px">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff">
      <path d="M17.05 20.28c-.98.95-2.05.86-3.08.42-1.09-.45-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.42C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
    </svg>
    Sign in with Apple
  </button>

  <div class="divider">or sign in with email</div>

  <label class="lbl">Email Address</label>
  <input class="inp" id="em" type="email" placeholder="you@example.com" autocomplete="email"/>

  <label class="lbl">Password</label>
  <div class="pw-wrap">
    <input class="inp" id="pw" type="password" placeholder="Password" autocomplete="current-password"/>
    <button class="pw-eye" type="button" onclick="togPw()">Show</button>
  </div>
  <span class="forgot" onclick="handleForgot()">Forgot password?</span>

  <button class="btn" id="btn" onclick="doSignIn()">Sign In</button>
  <button class="btn" id="magic-btn" onclick="sendMagicLink()" style="margin-top:8px;background:transparent;border:1.5px solid var(--border2);color:var(--mu2)">📧 Email me a sign-in link</button>
  <div class="asw">No account? <a href="/create-account">Sign up free →</a></div>
</div>

<div class="back"><a href="/">← Back to Pulsefy</a></div>
<div class="toast" id="t"></div>

<script>
const SUPA_URL = 'https://cjzewfvtdayjgjdpdmln.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqemV3ZnZ0ZGF5amdqZHBkbWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTg0MjYsImV4cCI6MjA5MTQzNDQyNn0.KQ80RmaB6cfA0dkcT-pdTe53fwyUrrIBeVJtToWF_Mk';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let _accType = 'user';
let _signingIn = false;
let _sessionHandled = false;
let _resendAt = 0;

function selectType(t) {
  _accType = t;
  ['user','organizer','business'].forEach(id => {
    const el = document.getElementById('at-'+id);
    if (el) el.classList.toggle('sel', id === t);
  });
  const sub = document.getElementById('card-sub');
  const btn = document.getElementById('btn');
  if (sub) sub.textContent = t === 'organizer' ? 'Sign in to your organizer dashboard' : t === 'business' ? 'Sign in to your business dashboard' : 'Sign in to your Pulsefy account';
  if (btn) btn.textContent = t === 'organizer' ? 'Sign In as Organizer' : t === 'business' ? 'Sign In as Business' : 'Sign In';
  hideMsg();
}

function getRoleMismatchError(actualRole, selectedType) {
  if (selectedType === 'user' && actualRole === 'user')           return null;
  if (selectedType === 'organizer' && actualRole === 'organizer') return null;
  if (selectedType === 'user' && actualRole === 'organizer')
    return 'This is an <strong>Organizer</strong> account. Select the Organizer tab to sign in.';
  if (selectedType === 'user' && actualRole === 'business')
    return 'This is a <strong>Business</strong> account. <a href="#" onclick="selectType(\'business\');return false;" style="color:var(--or)">Use the Business tab \u2192</a>';
  if (selectedType === 'organizer' && actualRole === 'user')
    return 'No organizer account found for this email. <a href="/create-account" style="color:var(--or)">Sign up as an organizer \u2192</a>';
  if (selectedType === 'organizer' && actualRole === 'business')
    return 'This is a <strong>Business</strong> account. <a href="#" onclick="selectType(\'business\');return false;" style="color:var(--or)">Use the Business tab \u2192</a>';
  return null;
}

(async () => {
  const savedType = sessionStorage.getItem('p_acc_type');
  if (savedType) { selectType(savedType); sessionStorage.removeItem('p_acc_type'); }
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const profile = await saveSession(session);
  const mismatch = getRoleMismatchError(profile.role || 'user', _accType);
  if (mismatch) { await sb.auth.signOut(); showErr(mismatch); return; }
  _sessionHandled = true;
  redirectByRole();
})();

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session && !_sessionHandled && !_signingIn) {
    _sessionHandled = true;
    const profile = await saveSession(session);
    const mismatch = getRoleMismatchError(profile.role || 'user', _accType);
    if (mismatch) { await sb.auth.signOut(); _sessionHandled = false; showErr(mismatch); return; }
    redirectByRole();
  }
});

function redirectByRole() {
  let role = 'user';
  try { role = JSON.parse(localStorage.getItem('p_user') || '{}').role || 'user'; } catch(e) { window.location.href = '/'; return; }
  if (role === 'organizer') { window.location.href = '/organizer'; }
  else if (role === 'business') { window.location.href = '/business'; }
  else { window.location.href = '/'; }
}

async function saveSession(session) {
  const user = session.user;
  localStorage.setItem('p_token', session.access_token);
  let profile = {};
  const { data, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (error) {
    // Permission denied — save minimal info and redirect to home; admin/organizer won't be redirected correctly until Supabase grants are applied
    console.warn('profiles query failed:', error.message);
    localStorage.setItem('p_user', JSON.stringify({ id: user.id, email: user.email, display_name: user.user_metadata?.full_name || user.email?.split('@')[0], role: 'user', last_login: new Date().toISOString() }));
    return {};
  }
  profile = data || {};
  localStorage.setItem('p_user', JSON.stringify({ id: user.id, email: user.email, display_name: profile.display_name || user.user_metadata?.full_name || user.email?.split('@')[0], role: profile.role || 'user', email_verified: !!user.email_confirmed_at, last_login: new Date().toISOString() }));
  localStorage.setItem('p_profile', JSON.stringify(profile));
  return profile;
}

function togPw() { const i=document.getElementById('pw'); const s=i.type==='password'; i.type=s?'text':'password'; document.querySelector('.pw-eye').textContent=s?'Hide':'Show'; }
function showErr(m) { const e=document.getElementById('err'); e.innerHTML=m; e.classList.add('show'); document.getElementById('ok-banner').classList.remove('show'); }
function showOk(m)  { const e=document.getElementById('ok-banner'); e.innerHTML=m; e.classList.add('show'); document.getElementById('err').classList.remove('show'); }
function hideMsg()  { document.getElementById('err').classList.remove('show'); document.getElementById('ok-banner').classList.remove('show'); }
function toast(m,t) { const el=document.getElementById('t'); el.textContent=m; el.className='toast '+(t||'')+' show'; setTimeout(()=>el.classList.remove('show'),3500); }
function setLoading(on) { const btn=document.getElementById('btn'); btn.disabled=on; btn.innerHTML=on?'<span class="spinner"></span>Signing in\u2026':(_accType==='organizer'?'Sign In as Organizer':'Sign In'); }

async function signInWithGoogle() {
  hideMsg();
  sessionStorage.setItem('p_acc_type', _accType);
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/signin', queryParams: { access_type: 'offline', prompt: 'consent' } }
  });
  if (error) { sessionStorage.removeItem('p_acc_type'); showErr('Google sign-in failed. Please try again.'); }
}

async function signInWithApple() {
  hideMsg();
  sessionStorage.setItem('p_acc_type', _accType);
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'apple',
    options: { redirectTo: window.location.origin + '/signin' }
  });
  if (error) {
    sessionStorage.removeItem('p_acc_type');
    const msg = (error.message || '').toLowerCase();
    if (msg.includes('provider is not enabled') || msg.includes('not configured')) {
      showErr('Apple sign-in is being set up — try Google or email for now.');
    } else {
      showErr('Apple sign-in failed. Please try again.');
    }
  }
}

let _magicAt = 0;
async function sendMagicLink() {
  hideMsg();
  const em = (document.getElementById('em').value || '').trim();
  if (!em || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) return showErr('Enter a valid email above first.');
  const now = Date.now();
  if (now < _magicAt) {
    const wait = Math.ceil((_magicAt - now) / 1000);
    return showErr('Please wait ' + wait + 's before requesting another link.');
  }
  _magicAt = now + 60000;
  const btn = document.getElementById('magic-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
  const { error } = await sb.auth.signInWithOtp({
    email: em,
    options: { emailRedirectTo: window.location.origin + '/signin' }
  });
  if (btn) { btn.disabled = false; btn.textContent = '\u{1F4E7} Email me a sign-in link'; }
  if (error) {
    _magicAt = 0;
    const m = (error.message || '').toLowerCase();
    if (m.includes('rate limit')) return showErr('Too many requests — wait an hour and try again, or use password sign-in.');
    return showErr(error.message || 'Could not send link. Try again.');
  }
  showOk('✉️ Check <strong>' + em + '</strong> for a one-tap sign-in link (check spam if it’s not in inbox).');
}

async function doSignIn() {
  hideMsg();
  const em  = document.getElementById('em').value.trim();
  const pw  = document.getElementById('pw').value;
  if (!em) return showErr('Please enter your email address.');
  if (!pw) return showErr('Please enter your password.');
  setLoading(true);
  _signingIn = true;
  const { data, error } = await sb.auth.signInWithPassword({ email: em, password: pw });
  if (error) {
    _signingIn = false;
    setLoading(false);
    const msg = error.message || '';
    if (msg.includes('Email not confirmed') || msg.includes('not confirmed'))
      return showErr('Please verify your email before signing in.<br><a id="resend-btn" href="#" onclick="resendVerification()" style="color:var(--or)">Resend verification email \u2192</a> &nbsp;\u00b7&nbsp; <a href="/create-account" style="color:var(--mu2)">Wrong email? Sign up again \u2192</a>');
    if (msg.includes('Invalid login') || msg.includes('invalid_credentials') || msg.includes('Invalid credentials'))
      return showErr('Incorrect email or password. <a href="/create-account" style="color:var(--or)">Need an account? \u2192</a>');
    if (msg.includes('rate') || msg.includes('too many') || error.status === 429)
      return showErr('Too many attempts. Please wait a few minutes and try again.');
    if (msg.includes('network') || msg.includes('fetch') || msg.includes('Failed to fetch'))
      return showErr('Connection error. Check your internet and try again.');
    if (msg.includes('User not found') || msg.includes('No user found'))
      return showErr('No account found with that email. <a href="/create-account" style="color:var(--or)">Sign up free \u2192</a>');
    return showErr('Sign-in failed: ' + msg);
  }
  const profile = await saveSession(data.session);
  const mismatch = getRoleMismatchError(profile.role || 'user', _accType);
  if (mismatch) { setLoading(false); await sb.auth.signOut(); return showErr(mismatch); }
  toast('\u2705 Welcome back!', 'ok');
  setTimeout(() => redirectByRole(), 800);
}

let _forgotAt = 0;
async function handleForgot() {
  const em = document.getElementById('em').value.trim();
  if (!em) return showErr('Enter your email address first, then tap Forgot password.');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) return showErr('That does not look like a valid email address.');
  const now = Date.now();
  if (now < _forgotAt) {
    const wait = Math.ceil((_forgotAt - now) / 1000);
    return showErr('Please wait ' + wait + 's before requesting another reset email.');
  }
  _forgotAt = now + 60000;
  const { error } = await sb.auth.resetPasswordForEmail(em, { redirectTo: window.location.origin + '/reset-password' });
  if (error) {
    _forgotAt = 0;
    const msg = (error.message || '').toLowerCase();
    if (msg.includes('rate limit') || msg.includes('too many') || error.status === 429) {
      return showErr('Too many reset requests. Supabase limits this to 4 per hour by default \u2014 wait an hour, then try again. If this keeps happening, custom SMTP needs to be enabled in your Supabase dashboard.');
    }
    if (msg.includes('user not found') || msg.includes('no user found')) {
      return showOk('\u2705 If an account exists for <strong>' + em + '</strong>, a reset link is on the way. Check your inbox (and spam folder).');
    }
    return showErr('Could not send reset email: ' + error.message);
  }
  showOk('\u2705 Password reset link sent to <strong>' + em + '</strong>. Check your inbox (and spam folder). The link expires in 1 hour.');
}

async function resendVerification() {
  const now = Date.now();
  if (now < _resendAt) {
    showErr('Please wait ' + Math.ceil((_resendAt - now) / 1000) + 's before requesting another email.<br><a id="resend-btn" href="#" onclick="resendVerification()" style="color:var(--or)">Resend verification email \u2192</a> &nbsp;\u00b7&nbsp; <a href="/create-account" style="color:var(--mu2)">Wrong email? Sign up again \u2192</a>');
    return;
  }
  const em = document.getElementById('em').value.trim();
  if (!em) return showErr('Enter your email address first.');
  _resendAt = now + 60000;
  const btn = document.getElementById('resend-btn');
  if (btn) { btn.textContent = 'Sending\u2026'; btn.style.pointerEvents = 'none'; }
  const { error } = await sb.auth.resend({ type: 'signup', email: em });
  if (error) {
    _resendAt = 0;
    return showErr('Could not resend: ' + error.message + '<br><a id="resend-btn" href="#" onclick="resendVerification()" style="color:var(--or)">Try again \u2192</a>');
  }
  showOk('\u2705 Verification email resent to <strong>' + em + '</strong>. Check your inbox and spam folder.');
  setTimeout(() => { _resendAt = 0; }, 60000);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter' && !document.getElementById('btn').disabled) doSignIn(); });
</script>
</body>
</html>
