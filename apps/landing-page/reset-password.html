<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#05080F"/>
<meta name="description" content="Reset your Pulsefy password."/>
<meta name="robots" content="noindex,nofollow"/>
<title>Reset Password — Pulsefy 🇿🇦</title>
<link rel="canonical" href="https://pulsefy.co.za/reset-password"/>
<link rel="icon" type="image/png" href="/favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080F;--bg2:#090D1A;--surf:#0D1424;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--tx:#F0EEF8;--mu:#5A5870;--mu2:#9997B0;--pu:#B026FF}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.06em;display:flex;align-items:center;gap:10px;margin-bottom:4px;color:var(--tx);text-decoration:none}
.dot{width:10px;height:10px;border-radius:50%;background:var(--or);box-shadow:0 0 12px var(--or);animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.card{width:100%;max-width:440px;background:var(--surf);border:1px solid var(--border);border-radius:18px;padding:28px 22px;margin-top:18px}
h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:.02em;margin-bottom:6px}
.sub{color:var(--mu2);font-size:.86rem;margin-bottom:22px;line-height:1.5}
.lbl{display:block;font-family:'Syne',sans-serif;font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin:14px 0 6px}
.ipt{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.ipt:focus{border-color:var(--or)}
.ipt::placeholder{color:var(--mu)}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--mu2);font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.06em;cursor:pointer;text-transform:uppercase}
.hint{font-size:.74rem;color:var(--mu);margin-top:6px;line-height:1.5}
.btn{width:100%;margin-top:18px;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:14px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:not(:disabled):active{transform:scale(.99)}
.msg{margin-top:14px;padding:12px 14px;border-radius:12px;font-size:.82rem;line-height:1.55;display:none}
.msg.err{display:block;background:rgba(255,45,120,.1);border:1px solid rgba(255,45,120,.35);color:var(--pk)}
.msg.ok{display:block;background:rgba(198,255,74,.08);border:1px solid rgba(198,255,74,.35);color:var(--li)}
.foot{margin-top:24px;font-size:.78rem;color:var(--mu)}
.foot a{color:var(--or);text-decoration:none;font-weight:700}
.strength{display:flex;gap:4px;margin-top:8px;height:4px}
.strength span{flex:1;background:var(--border);border-radius:2px;transition:background .2s}
.strength.w1 span:nth-child(-n+1){background:var(--pk)}
.strength.w2 span:nth-child(-n+2){background:var(--or)}
.strength.w3 span:nth-child(-n+3){background:#FFD700}
.strength.w4 span:nth-child(-n+4){background:var(--li)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<a href="/" class="logo"><span class="dot"></span> PULSEFY</a>

<div class="card">
  <h1>Reset Your Password</h1>
  <p class="sub" id="sub">Choose a new password for your account. Make it strong — at least 8 characters with a mix of letters and numbers.</p>

  <div id="form-wrap">
    <label class="lbl" for="pw">New Password</label>
    <div class="pw-wrap">
      <input id="pw" class="ipt" type="password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" maxlength="100"/>
      <button type="button" class="pw-toggle" onclick="togglePw('pw')">Show</button>
    </div>
    <div class="strength" id="strength"><span></span><span></span><span></span><span></span></div>
    <div class="hint" id="hint">Use 8+ characters with letters, numbers and a symbol for best security.</div>

    <label class="lbl" for="pw2">Confirm Password</label>
    <div class="pw-wrap">
      <input id="pw2" class="ipt" type="password" placeholder="Re-enter password" autocomplete="new-password" minlength="8" maxlength="100"/>
      <button type="button" class="pw-toggle" onclick="togglePw('pw2')">Show</button>
    </div>

    <button id="btn" class="btn" onclick="doReset()">Update Password</button>
  </div>

  <div id="msg" class="msg"></div>

  <div class="foot">
    <a href="/signin">← Back to sign in</a>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://cjzewfvtdayjgjdpdmln.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqemV3ZnZ0ZGF5amdqZHBkbWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTg0MjYsImV4cCI6MjA5MTQzNDQyNn0.KQ80RmaB6cfA0dkcT-pdTe53fwyUrrIBeVJtToWF_Mk';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let _ready = false;

function showErr(html) {
  const m = document.getElementById('msg');
  m.className = 'msg err'; m.innerHTML = html;
}
function showOk(html) {
  const m = document.getElementById('msg');
  m.className = 'msg ok'; m.innerHTML = html;
}
function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  const btn = el.nextElementSibling;
  btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
}

function scorePw(s) {
  let score = 0;
  if (!s) return 0;
  if (s.length >= 8) score++;
  if (s.length >= 12) score++;
  if (/[a-z]/.test(s) && /[A-Z]/.test(s)) score++;
  if (/[0-9]/.test(s)) score++;
  if (/[^A-Za-z0-9]/.test(s)) score++;
  return Math.min(score, 4);
}

document.getElementById('pw').addEventListener('input', (e) => {
  const score = scorePw(e.target.value);
  const el = document.getElementById('strength');
  el.className = 'strength w' + score;
  const labels = ['', 'Too weak', 'Weak', 'Decent', 'Strong'];
  document.getElementById('hint').textContent = e.target.value ? labels[score] + ' password' : 'Use 8+ characters with letters, numbers and a symbol for best security.';
});

async function doReset() {
  const pw  = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  if (!_ready) return showErr('Reset link is missing or has expired. Request a new one from the <a href="/signin" style="color:var(--or)">sign-in page</a>.');
  if (pw.length < 8) return showErr('Password must be at least 8 characters.');
  if (pw !== pw2) return showErr('Passwords do not match.');
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Updating…';
  const { error } = await sb.auth.updateUser({ password: pw });
  btn.disabled = false; btn.textContent = 'Update Password';
  if (error) {
    if ((error.message || '').toLowerCase().includes('same password')) {
      return showErr('New password must be different from your current password.');
    }
    return showErr('Could not update password: ' + (error.message || 'Unknown error'));
  }
  document.getElementById('form-wrap').style.display = 'none';
  showOk('✅ Password updated successfully. Redirecting to sign in…');
  setTimeout(() => { window.location.href = '/signin'; }, 1800);
}

// Supabase sends the user back here with the recovery token in the URL hash.
// onAuthStateChange fires PASSWORD_RECOVERY when the token is processed.
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
    _ready = true;
  }
});

// Fallback: if no event fires within 2s, check the URL for a recovery token
window.addEventListener('load', () => {
  setTimeout(async () => {
    if (_ready) return;
    const hash = window.location.hash || '';
    const search = window.location.search || '';
    if (hash.includes('type=recovery') || hash.includes('access_token') || search.includes('type=recovery') || search.includes('code=')) {
      _ready = true;
      return;
    }
    const { data } = await sb.auth.getSession();
    if (data?.session) { _ready = true; return; }
    showErr('Reset link is missing or has expired. Request a new one from the <a href="/signin" style="color:var(--or)">sign-in page</a>.');
    document.getElementById('btn').disabled = true;
  }, 2000);
});
</script>

</body>
</html>
