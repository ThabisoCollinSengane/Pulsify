<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Pulsify Diagnostic</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
body{font-family:monospace;background:#000;color:#0f0;padding:20px;font-size:13px}
h2{color:#ff0;margin-top:20px}
.ok{color:#0f0}.err{color:#f44}.warn{color:#ff0}.info{color:#0cf}
pre{background:#111;padding:10px;border:1px solid #333;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<h1>🔬 Pulsify Diagnostic</h1>
<div id="out">Running tests…</div>
<script>
const SUPA_URL = 'https://cjzewfvtdayjgjdpdmln.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqemV3ZnZ0ZGF5amdqZHBkbWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTg0MjYsImV4cCI6MjA5MTQzNDQyNn0.KQ80RmaB6cfA0dkcT-pdTe53fwyUrrIBeVJtToWF_Mk';
const out = document.getElementById('out');
function log(html) { out.innerHTML += html + '<br>'; }
function section(t) { log(`<h2>${t}</h2>`); }

(async () => {
  out.innerHTML = '';
  section('1. SDK loaded');
  log(window.supabase ? '<span class="ok">✓ Supabase SDK loaded</span>' : '<span class="err">✗ SDK NOT loaded</span>');

  section('2. Direct REST query (no SDK)');
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/events?select=id,name&limit=1`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
    });
    const txt = await r.text();
    log(`<span class="info">HTTP ${r.status}</span>`);
    log(`<pre>${txt}</pre>`);
  } catch (e) {
    log(`<span class="err">Network error: ${e.message}</span>`);
  }

  section('3. SDK query: events');
  try {
    const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    const { data, error, count } = await sb.from('events').select('id,name', { count: 'exact' }).limit(3);
    if (error) log(`<span class="err">✗ ${error.message}</span><pre>${JSON.stringify(error,null,2)}</pre>`);
    else log(`<span class="ok">✓ Got ${data.length} rows (total ${count})</span><pre>${JSON.stringify(data,null,2)}</pre>`);
  } catch (e) { log(`<span class="err">Crash: ${e.message}</span>`); }

  section('4. SDK query: businesses');
  try {
    const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    const { data, error, count } = await sb.from('businesses').select('id,name', { count: 'exact' }).limit(3);
    if (error) log(`<span class="err">✗ ${error.message}</span><pre>${JSON.stringify(error,null,2)}</pre>`);
    else log(`<span class="ok">✓ Got ${data.length} rows (total ${count})</span><pre>${JSON.stringify(data,null,2)}</pre>`);
  } catch (e) { log(`<span class="err">Crash: ${e.message}</span>`); }

  section('5. SDK query: posts');
  try {
    const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    const { data, error } = await sb.from('posts').select('id').limit(1);
    if (error) log(`<span class="err">✗ ${error.message}</span>`);
    else log(`<span class="ok">✓ posts accessible (${data.length} rows)</span>`);
  } catch (e) { log(`<span class="err">Crash: ${e.message}</span>`); }

  section('6. SDK query: profiles');
  try {
    const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    const { data, error } = await sb.from('profiles').select('id').limit(1);
    if (error) log(`<span class="err">✗ ${error.message}</span>`);
    else log(`<span class="ok">✓ profiles accessible (${data.length} rows)</span>`);
  } catch (e) { log(`<span class="err">Crash: ${e.message}</span>`); }

  section('7. Deployment freshness check');
  log(`<span class="info">Page loaded at: ${new Date().toISOString()}</span>`);
  log(`<span class="info">User agent: ${navigator.userAgent}</span>`);
  log(`<span class="info">Origin: ${window.location.origin}</span>`);

  section('8. Landing page version check');
  try {
    const r = await fetch('/', { cache: 'no-store' });
    const html = await r.text();
    const m = html.match(/build-version[^>]*content="([^"]+)"/);
    if (m) {
      const v = m[1];
      const isNew = v >= 'v2.2.0';
      log(`<span class="${isNew ? 'ok' : 'err'}">${isNew ? '✓' : '✗'} Landing page version: ${v}${isNew ? '' : ' — OLD CODE still deployed!'}</span>`);
    } else {
      log(`<span class="err">✗ No build-version found — deploy is still OLD code. Run git pull then redeploy.</span>`);
    }
  } catch(e) { log(`<span class="err">Could not fetch landing page: ${e.message}</span>`); }

  section('9. Events with future dates (DB check)');
  try {
    const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    const today = new Date().toISOString().split('T')[0];
    const { data, error, count } = await sb.from('events').select('id,name,date_local', { count: 'exact' }).gte('date_local', today).limit(3);
    if (error) log(`<span class="err">✗ ${error.message}</span>`);
    else log(`<span class="ok">✓ ${count} upcoming events in DB</span><pre>${JSON.stringify(data,null,2)}</pre>`);
  } catch(e) { log(`<span class="err">Crash: ${e.message}</span>`); }
})();
</script>
</body>
</html>
