<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#05080F"/>
<meta name="description" content="Pulsefy community feed — see what fans, organisers and venues are sharing across South Africa. Photos, reviews, event check-ins and more."/>
<meta name="robots" content="noindex,follow"/>
<title>Feed — Pulsefy 🇿🇦</title>
<link rel="canonical" href="https://pulsefy.co.za/feeds"/>
<link rel="icon" type="image/png" href="/favicon.png"/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Pulsefy"/>
<meta property="og:title" content="Pulsefy Community Feed"/>
<meta property="og:description" content="See what fans, organisers and venues are sharing across South Africa."/>
<meta property="og:url" content="https://pulsefy.co.za/feeds"/>
<meta property="og:image" content="https://pulsefy.co.za/og-image.png"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="Pulsefy Community Feed"/>
<meta name="twitter:image" content="https://pulsefy.co.za/og-image.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080F;--bg2:#090D1A;--surf:#0D1424;--surf2:#121B30;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  --or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--cy:#00E5FF;
  --pu:#B026FF;--te:#00D4AA;--tx:#F0EEF8;--mu:#5A5870;--mu2:#9997B0;
  --th:58px;--bh:70px
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--or);border-radius:2px}
.tb{position:fixed;top:0;left:0;right:0;height:var(--th);z-index:800;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(5,8,15,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.06em;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--tx);text-decoration:none}
.dot{width:8px;height:8px;border-radius:50%;background:var(--or);box-shadow:0 0 12px var(--or);animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.back-btn{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--mu2);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;padding:0}
.tb2-btn{background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:7px 16px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.74rem;font-weight:700;cursor:pointer}
.cr{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:8px 14px 6px;position:fixed;top:var(--th);left:0;right:0;z-index:100;background:rgba(5,8,15,.95);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.cr::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:50px;border:1px solid var(--border);background:rgba(255,255,255,.02);font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;color:var(--mu);cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.chip.active{border-color:var(--or);color:var(--or);background:rgba(255,92,0,.09)}
.feed{position:fixed;top:calc(var(--th) + 42px);left:0;right:0;bottom:var(--bh);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.feed::-webkit-scrollbar{display:none}
.fc{margin:0 0 2px;border-bottom:1px solid var(--border);background:var(--surf);cursor:default;-webkit-tap-highlight-color:transparent}
.fh{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.fa{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:1.5px solid var(--border);overflow:hidden;background:linear-gradient(135deg,#B026FF,#FF5C00)}
.fa img{width:100%;height:100%;object-fit:cover}
.fa.org{border-color:rgba(255,92,0,.6)}
.fo{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;line-height:1.2;display:flex;align-items:center;gap:6px}
.fl{font-size:.66rem;color:var(--mu)}
.org-pill{font-size:.54rem;background:rgba(255,92,0,.12);border:1px solid rgba(255,92,0,.28);color:var(--or);padding:2px 7px;border-radius:50px;font-weight:700}
.follow-btn{margin-left:auto;padding:5px 13px;border-radius:50px;border:1px solid var(--border2);background:transparent;color:var(--mu2);font-family:'Syne',sans-serif;font-size:.66rem;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.follow-btn.on{border-color:var(--or);color:var(--or);background:rgba(255,92,0,.08)}
.fb{width:100%;max-height:420px;object-fit:cover;display:block}
.fd{padding:10px 14px 4px}
.cap{font-size:.84rem;line-height:1.6;color:var(--mu2)}
.cap-ev{font-family:'Syne',sans-serif;font-size:.64rem;font-weight:700;color:var(--or);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.cap-more{color:var(--or);cursor:pointer;font-family:'Syne',sans-serif;font-size:.74rem;font-weight:700}
.fac{display:flex;align-items:center;gap:8px;padding:6px 14px 12px}
.ab{display:flex;align-items:center;gap:5px;background:transparent;border:none;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:var(--mu);cursor:pointer;padding:4px 6px;border-radius:50px;transition:color .18s;-webkit-tap-highlight-color:transparent}
.ab:active{background:rgba(255,255,255,.04)}
.ab.lk{color:var(--pk)}
.ab.rp{color:var(--li)}
.ai{font-size:1rem;line-height:1}
.cmt-wrap{background:rgba(0,0,0,.2);border-top:1px solid var(--border);display:none}
.cmt-item{display:flex;gap:9px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.cmt-item:last-of-type{border-bottom:none}
.cmt-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:.78rem;overflow:hidden}
.cmt-av img{width:100%;height:100%;object-fit:cover}
.cmt-name{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;margin-bottom:2px}
.cmt-text{font-size:.78rem;color:var(--mu2);line-height:1.45}
.cmt-time{font-size:.6rem;color:var(--mu);margin-top:3px}
.cir{display:flex;gap:8px;padding:9px 14px;border-top:1px solid var(--border);align-items:center}
.ci{flex:1;background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:8px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s}
.ci:focus{border-color:var(--or)!important}
.ci::placeholder{color:var(--mu)}
.csnd{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#B026FF,#FF5C00);border:none;color:#fff;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmt-reply-btn{background:none;border:none;color:var(--mu);font-family:'Syne',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.04em;cursor:pointer;padding:2px 0;margin-top:3px}
.cmt-reply-btn:hover{color:var(--or)}
.cmt-replies{margin-left:36px;border-left:1px solid var(--border);padding-left:8px;margin-top:4px}
.reply-banner{background:rgba(255,92,0,.08);border:1px solid rgba(255,92,0,.25);border-radius:8px;padding:6px 10px;margin:0 14px 6px;font-size:.7rem;color:var(--mu2);display:flex;align-items:center;justify-content:space-between;gap:8px}
.reply-banner button{background:none;border:none;color:var(--mu);cursor:pointer;font-size:.85rem}
.fc.cmt-target{box-shadow:0 0 0 2px var(--or)}
.cmt-item.cmt-target-c{background:rgba(255,92,0,.08)}
.puls-badge{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:linear-gradient(135deg,#FF5C00,#FF2D78);box-shadow:0 0 8px rgba(255,92,0,.8),0 0 16px rgba(255,45,120,.5);position:relative;vertical-align:middle;margin-left:4px;flex-shrink:0;cursor:default;font-size:9px;font-weight:900;color:#fff;line-height:1;animation:puls-glow 1.6s ease-in-out infinite}
.puls-badge::after{content:'\2713';font-size:9px;font-weight:900;color:#fff;line-height:1}
.verified-pill{display:inline-flex;align-items:center;gap:2px;vertical-align:middle;margin-left:4px}
.verified-pill .puls-badge{margin-left:0;width:11px;height:11px}
.verified-pill .puls-badge::after{font-size:7px}
.verified-pill .verified-txt{font-family:'Syne',sans-serif;font-size:.44rem;font-weight:700;letter-spacing:.04em;color:#FF5C00;text-transform:uppercase;line-height:1;opacity:.85}
@keyframes puls-glow{0%,100%{box-shadow:0 0 6px rgba(255,92,0,.7),0 0 12px rgba(255,45,120,.4)}50%{box-shadow:0 0 12px rgba(255,92,0,1),0 0 24px rgba(255,45,120,.8)}}
.fab{position:fixed;bottom:calc(var(--bh) + 14px);right:16px;z-index:200;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#B026FF,#FF5C00);border:none;color:#fff;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 18px rgba(176,38,255,.4);display:flex;align-items:center;justify-content:center}
.co{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);z-index:1200;display:none;align-items:flex-end;justify-content:center}
.co.open{display:flex}
.cs{width:100%;max-width:520px;background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid rgba(255,255,255,.1);border-bottom:none;animation:su .25s ease;display:flex;flex-direction:column;max-height:85vh;overflow-y:auto}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1;flex-shrink:0}
.ct{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.cc{width:30px;height:30px;border-radius:50%;background:var(--surf);border:none;color:var(--tx);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.compose-body{padding:16px 18px 28px}
.img-drop{height:150px;background:rgba(255,255,255,.03);border:1.5px dashed rgba(0,229,255,.3);border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;overflow:hidden;flex-direction:column;gap:8px}
.img-drop img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.ff-c{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;margin-bottom:10px;transition:border-color .2s}
.ff-c:focus{border-color:var(--or)}.ff-c::placeholder{color:var(--mu)}
textarea.ff-c{resize:none;height:80px;line-height:1.55}
.post-btn{width:100%;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:14px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.post-btn:disabled{opacity:.45;cursor:not-allowed}
.pg{display:flex;gap:10px;padding:16px 14px 24px;justify-content:center;align-items:center}
.pb{background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:10px 22px;font-family:'Syne',sans-serif;font-size:.76rem;font-weight:700;color:var(--tx);cursor:pointer;transition:all .2s}
.pb:active{border-color:var(--or);color:var(--or)}.pb:disabled{opacity:.3;cursor:default}
.pi{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:var(--mu)}
.es{padding:60px 24px;text-align:center}
.ei{font-size:3rem;margin-bottom:14px}
.et{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:8px}
.em{font-size:.82rem;color:var(--mu);line-height:1.5;margin-bottom:20px}
.bn{position:fixed;bottom:0;left:0;right:0;height:var(--bh);z-index:800;background:rgba(5,8,15,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:stretch}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;border:none;cursor:pointer;padding:8px 2px 10px;position:relative;-webkit-tap-highlight-color:transparent}
.bb svg{width:22px;height:22px;stroke:var(--mu);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s,transform .2s}
.bb.active svg{stroke:var(--or);transform:scale(1.12)}
.bl{font-family:'Syne',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);transition:color .2s}
.bb.active .bl{color:var(--or)}
.bb.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,#B026FF,#FF5C00);border-radius:0 0 4px 4px}
.toast{position:fixed;bottom:calc(var(--bh) + 16px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:10px 20px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;color:var(--tx);z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(198,255,74,.4);color:var(--li)}
.toast.err{border-color:rgba(255,45,120,.4);color:var(--pk)}
.sl{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;font-family:'Syne',sans-serif;font-size:.64rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--mu)}
</style>
</head>
<body>

<header class="tb">
  <button class="back-btn" onclick="window.location.href='/'">← Back</button>
  <a class="logo" href="/feeds"><span class="dot"></span>
    <span style="font-size:1.4rem">Feed</span>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="notif-btn" onclick="openNotifPanel()" style="position:relative;width:36px;height:36px;border-radius:50%;background:var(--surf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem">🔔<span id="notif-dot" style="position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--or);border:1.5px solid var(--bg);display:none"></span></div>
    <button class="tb2-btn" onclick="openCompose()">+ Post</button>
  </div>
</header>

<div id="notif-overlay" onclick="if(event.target===this)closeNotifPanel()" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.6);backdrop-filter:blur(8px)">
  <div style="position:absolute;top:62px;right:12px;width:min(340px,calc(100vw - 24px));background:var(--bg2);border:1px solid var(--border2);border-radius:18px;overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.03em">Notifications</div>
      <button onclick="markAllNotifsRead()" style="font-size:.64rem;color:var(--or);background:none;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700">Mark all read</button>
    </div>
    <div id="notif-list" style="max-height:380px;overflow-y:auto;scrollbar-width:none"></div>
  </div>
</div>

<div class="cr">
  <button class="chip active" onclick="setFilter(this,'all')">✦ All</button>
  <button class="chip" onclick="setFilter(this,'following')">👥 Following</button>
  <button class="chip" onclick="setFilter(this,'organizers')">📢 Organizers</button>
  <button class="chip" onclick="setFilter(this,'community')">👤 Community</button>
</div>

<div class="feed" id="feed"></div>

<button class="fab" onclick="openCompose()" title="Share a post">✏️</button>

<nav class="bn">
  <button class="bb" onclick="window.location.href='/'">
    <svg viewBox="0 0 24 24"><path d="M12 3C12 3 4 9.5 4 15a8 8 0 0016 0C20 9.5 12 3 12 3Z"/><path d="M12 10v5M9.5 13h5"/></svg>
    <span class="bl">Home</span>
  </button>
  <button class="bb active">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    <span class="bl">Feed</span>
  </button>
  <button class="bb" onclick="window.location.href='/'">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3M9 20V7m6 13l5.447-2.724A1 1 0 0021 16.382V5.618a1 1 0 00-1.447-.894L15 7m0 13V7M9 7l6-3"/></svg>
    <span class="bl">Map</span>
  </button>
  <button class="bb" onclick="window.location.href='/'">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M16 7v-.5a3.5 3.5 0 00-7 0V7M16 17v.5a3.5 3.5 0 01-7 0V17"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span class="bl">Bookings</span>
  </button>
  <button class="bb" onclick="window.location.href='/'">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
    <span class="bl">Profile</span>
  </button>
</nav>

<div class="co" id="compose-modal" onclick="if(event.target===this)closeCompose()">
  <div class="cs">
    <div class="ch">
      <span class="ct">📸 Share a Post</span>
      <button class="cc" onclick="closeCompose()">✕</button>
    </div>
    <div class="compose-body">
      <div class="img-drop" id="img-drop" onclick="document.getElementById('post-img-file').click()">
        <span style="font-size:2rem">📷</span>
        <span style="font-size:.8rem;color:var(--mu)" id="img-drop-hint">Tap to add a photo</span>
      </div>
      <input type="file" id="post-img-file" accept="image/*" style="display:none" onchange="handleImg(this)"/>

      <textarea class="ff-c" id="post-caption" placeholder="Add a caption…" maxlength="500"></textarea>

      <div id="user-posting-note" style="display:none;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);border-radius:10px;padding:10px 13px;font-size:.74rem;color:var(--mu2);line-height:1.5;margin-bottom:10px">
        📸 Upload a photo from an event you attended. Caption is optional.
      </div>

      <div id="organizer-text-section" style="display:none">
        <div style="font-family:'Syne',sans-serif;font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:6px">Or post text only</div>
        <textarea class="ff-c" id="post-text-only" placeholder="Write an update, promo or announcement…" maxlength="1000" style="height:96px"></textarea>
      </div>

      <input class="ff-c" id="post-event-name" placeholder="Tag an event name (optional)"/>
      <button class="post-btn" id="post-submit" onclick="submitPost()">Share 🔥</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="prof-overlay" style="display:none;position:fixed;inset:0;z-index:2500;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeProfOverlay()">
  <div style="width:100%;max-width:520px;background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid rgba(255,255,255,.1);border-bottom:none;max-height:85vh;display:flex;flex-direction:column;animation:su .25s ease">
    <div style="width:40px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 0;flex-shrink:0"></div>
    <button onclick="closeProfOverlay()" style="position:absolute;top:18px;right:18px;background:var(--surf);border:none;color:var(--mu2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;z-index:1">✕</button>
    <div id="prof-overlay-body" style="overflow-y:auto;padding:16px 18px 32px;flex:1;scrollbar-width:none;position:relative"></div>
  </div>
</div>

<!-- Followers/Following list overlay -->
<div id="fl-overlay" style="display:none;position:fixed;inset:0;z-index:2700;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);align-items:flex-end;justify-content:center" onclick="if(event.target===this)document.getElementById('fl-overlay').style.display='none'">
  <div style="width:100%;max-width:520px;max-height:80vh;background:var(--bg2);border:1px solid var(--border2);border-bottom:none;border-radius:22px 22px 0 0;display:flex;flex-direction:column;animation:su .25s ease">
    <div style="width:40px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 0;flex-shrink:0"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;flex-shrink:0">
      <div id="fl-title" style="font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800">Followers</div>
      <button onclick="document.getElementById('fl-overlay').style.display='none'" style="background:var(--surf);border:none;color:var(--mu2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.9rem">✕</button>
    </div>
    <div id="fl-body" style="flex:1;overflow-y:auto;padding:4px 14px 22px"></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://cjzewfvtdayjgjdpdmln.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqemV3ZnZ0ZGF5amdqZHBkbWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTg0MjYsImV4cCI6MjA5MTQzNDQyNn0.KQ80RmaB6cfA0dkcT-pdTe53fwyUrrIBeVJtToWF_Mk';
let _sbClient = null;
function getSB() {
  if (!_sbClient && window.supabase) _sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  return _sbClient;
}

async function safeJson(r) { try { const t = await r.text(); return t ? JSON.parse(t) : {}; } catch(e) { return {}; } }

let _session = null;
let _profile  = null;
let _token    = null;
try { _session = JSON.parse(localStorage.getItem('p_user'));   } catch(e) {}
try { _profile = JSON.parse(localStorage.getItem('p_profile')); } catch(e) {}
let _uid = _session?.id || null;

let _posts      = [];
let _filter     = 'all';
let _page       = 1;
let _totalPages = 1;
let _loading    = false;

async function fetchPosts() {
  const sb = getSB();
  if (!sb) throw new Error('Supabase not loaded');
  const limit = 10, offset = (_page - 1) * limit;
  let q = sb.from('posts')
    .select('id,user_id,post_type,image_url,caption,event_name,like_count,comment_count,created_at,profiles:user_id(username,display_name,avatar_url,role,is_verified)', { count: 'exact' })
    .order('created_at', { ascending: false })
    .range(offset, offset + limit - 1);
  if (_filter === 'following' && _uid) {
    const { data: followsRows } = await sb.from('follows').select('following_id').eq('follower_id', _uid);
    const ids = (followsRows || []).map(r => r.following_id);
    if (!ids.length) return { posts: [], total: 0 };
    q = q.in('user_id', ids);
  } else if (_filter === 'organizers') {
    const { data: orgRows } = await sb.from('profiles').select('id').eq('role', 'organizer');
    const orgIds = (orgRows || []).map(r => r.id);
    if (!orgIds.length) return { posts: [], total: 0 };
    q = q.in('user_id', orgIds);
  } else if (_filter === 'businesses') {
    const { data: bizRows } = await sb.from('profiles').select('id').eq('role', 'business');
    const bizIds = (bizRows || []).map(r => r.id);
    if (!bizIds.length) return { posts: [], total: 0 };
    q = q.in('user_id', bizIds);
  }
  const { data, error, count } = await q;
  if (error) throw new Error(error.message);
  return { posts: data || [], total: count || 0 };
}

function mapPost(p) {
  const prof = p.profile || p.profiles || {};
  return {
    id: p.id, user_id: p.user_id,
    username:     prof.username     || 'user',
    display_name: prof.display_name || 'User',
    avatar_url:   prof.avatar_url   || null,
    role:         prof.role         || 'user',
    is_verified:  prof.is_verified  || false,
    post_type:    p.post_type || 'attended_photo',
    image_url:    p.image_url || null,
    caption:      p.caption   || '',
    event_name:   p.event_name || null,
    like_count:   p.likes_count || p.like_count || 0,
    comment_count: p.comments_count || p.comment_count || 0,
    likes: [], reposts: [], comments: [],
    ts: p.created_at,
  };
}

function _getLikes(postId) { try { return JSON.parse(localStorage.getItem('p_likes_'+postId) || 'null'); } catch { return null; } }
function _setLikes(postId, arr) { localStorage.setItem('p_likes_'+postId, JSON.stringify(arr)); }
function _getReposts(postId) { try { return JSON.parse(localStorage.getItem('p_rp_'+postId) || 'null'); } catch { return null; } }
function _setReposts(postId, arr) { localStorage.setItem('p_rp_'+postId, JSON.stringify(arr)); }
function _getComments(postId) { try { return JSON.parse(localStorage.getItem('p_cmts_'+postId) || 'null'); } catch { return null; } }
function _setComments(postId, arr) { localStorage.setItem('p_cmts_'+postId, JSON.stringify(arr)); }

function getLikes(post)    { return _getLikes(post.id)    || []; }
function getReposts(post)  { return _getReposts(post.id)  || []; }
function getComments(post) { return _getComments(post.id) || []; }

function x(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(iso) {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60)    return 'just now';
  if (d < 3600)  return Math.floor(d/60)+'m ago';
  if (d < 86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}
function fn(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n||0); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setFilter(btn, filter) {
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _filter = filter; _page = 1;
  render();
}

async function render() {
  if (_loading) return;
  _loading = true;
  const feedEl = document.getElementById('feed');
  feedEl.innerHTML = '<div style="padding:60px 24px;text-align:center;color:var(--mu)">Loading posts…</div>';
  feedEl.scrollTop = 0;

  try {
    const data = await fetchPosts();
    _posts = (data.posts || []).map(mapPost);
    _totalPages = Math.max(1, Math.ceil((data.total || _posts.length) / 10));

    feedEl.innerHTML = '';
    if (!_posts.length) {
      const msg = _filter === 'following'
        ? 'Follow organizers and friends to see their posts here.'
        : 'No posts yet. Be the first to share something!';
      feedEl.innerHTML = '<div class="es"><div class="ei">📰</div><div class="et">Nothing here yet</div><div class="em">'+msg+'</div></div>';
    } else {
      _posts.forEach(post => feedEl.appendChild(buildCard(post)));
      if (_totalPages > 1) {
        const pg = document.createElement('div');
        pg.className = 'pg';
        pg.innerHTML = '<button class="pb" onclick="changePage(-1)" '+(_page===1?'disabled':'')+'>← Prev</button><span class="pi">'+_page+' / '+_totalPages+'</span><button class="pb" onclick="changePage(1)" '+(_page>=_totalPages?'disabled':'')+'>Next →</button>';
        feedEl.appendChild(pg);
      }
    }
  } catch(e) {
    feedEl.innerHTML = '<div class="es"><div class="ei">📡</div><div class="et">Could not load posts</div><div class="em">'+x(e.message || 'Unknown error')+'</div></div>';
    console.error('Feed load error:', e);
  }
  _loading = false;
}

function changePage(delta) { _page += delta; render(); }

function buildCard(post) {
  const likes    = getLikes(post);
  const reposts  = getReposts(post);
  const comments = getComments(post);
  const liked    = _uid && likes.includes(_uid);
  const reposted = _uid && reposts.includes(_uid);
  const isOrg    = post.role === 'organizer';
  let following  = [];
  try { following = JSON.parse(localStorage.getItem('p_following') || '[]'); } catch(e) {}
  const isFollowing = following.includes(post.user_id);
  const isOwn    = post.user_id === _uid;

  const cap = post.caption || '';
  const shortCap = cap.length > 220 ? cap.slice(0,220) : cap;

  // Always use server's counts as the source of truth; local cache is only for "did I like this" boolean state
  const likeCount = fn(post.like_count || 0);
  const cmtCount  = fn(post.comment_count || 0);
  const rpostCount = fn(reposts.length);

  const el = document.createElement('div');
  el.className = 'fc';
  el.id = 'post-' + post.id;
  el.innerHTML =
    '<div class="fh">' +
      '<div class="fa '+(isOrg?'org':'')+'">' +
        (post.avatar_url ? '<img src="'+x(post.avatar_url)+'" loading="lazy" onerror="this.style.display=\u0027none\u0027"/>' : (post.display_name?.[0]?.toUpperCase()||'😊')) +
      '</div>' +
      '<div style="flex:1;min-width:0;cursor:pointer" onclick="openProfile(\u0027'+x(post.user_id)+'\u0027)">' +
        '<div class="fo">' + x(post.display_name || post.username) + (post.is_verified ? '<span class="verified-pill" title="Verified by Pulsefy"><span class="puls-badge"></span><span class="verified-txt">Verified</span></span>' : '') + (isOrg ? '<span class="org-pill">📢 Page</span>' : '') + '</div>' +
        (post.event_name ? '<div style="font-size:.64rem;color:var(--or);font-family:\u0027Syne\u0027,sans-serif;font-weight:700;letter-spacing:.04em">🎟 '+x(post.event_name)+'</div>' : '') +
        '<div class="fl">@'+x(post.username)+' · '+timeAgo(post.ts || post.created_at)+'</div>' +
      '</div>' +
      (!isOwn ? '<button class="follow-btn '+(isFollowing?'on':'')+'" id="fbtn-'+x(post.id)+'" onclick="doFollow(\u0027'+x(post.user_id)+'\u0027,\u0027'+x(post.id)+'\u0027)">'+(isFollowing?'✓ Following':'+ Follow')+'</button>' : '') +
    '</div>' +
    (() => {
      let urls = [];
      if (post.image_url) {
        // image_url may be a single URL OR a JSON-encoded array of URLs (multi-photo posts)
        if (typeof post.image_url === 'string' && post.image_url.trim().startsWith('[')) {
          try { urls = JSON.parse(post.image_url).filter(u => typeof u === 'string' && u.trim()); } catch(e) { urls = [post.image_url]; }
        } else if (Array.isArray(post.image_url)) {
          urls = post.image_url.filter(u => typeof u === 'string' && u.trim());
        } else if (typeof post.image_url === 'string') {
          urls = [post.image_url];
        }
      }
      if (!urls.length) return '';
      if (urls.length === 1) return '<img class="fb" src="' + x(urls[0]) + '" loading="lazy" onerror="this.remove()"/>';
      // Multiple photos — horizontal scroll gallery
      return '<div style="display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#000">' + urls.map(u => '<img src="' + x(u) + '" loading="lazy" onerror="this.remove()" style="width:100%;height:auto;max-height:420px;object-fit:cover;flex:0 0 100%;scroll-snap-align:start;display:block"/>').join('') + '</div>';
    })() +
    (cap ? '<div class="fd"><div class="cap" id="cap-'+x(post.id)+'">'+x(shortCap)+(cap.length>220?' <span class="cap-more" onclick="expandCap(\u0027'+x(post.id)+'\u0027)">more</span>':'')+'</div></div>' : '') +
    '<div class="fac">' +
      '<button class="ab '+(liked?'lk':'')+'" id="lb-'+x(post.id)+'" onclick="doLike(\u0027'+x(post.id)+'\u0027)"><span class="ai">'+(liked?'❤️':'🤍')+'</span> <span id="lc-'+x(post.id)+'">'+likeCount+'</span></button>' +
      '<button class="ab" onclick="toggleCmt(\u0027'+x(post.id)+'\u0027)"><span class="ai">💬</span> <span id="cc-'+x(post.id)+'">'+cmtCount+'</span></button>' +
      '<button class="ab '+(reposted?'rp':'')+'" id="rb-'+x(post.id)+'" onclick="doRepost(\u0027'+x(post.id)+'\u0027)"><span class="ai">🔁</span> <span id="rc-'+x(post.id)+'">'+fn(reposts.length)+'</span></button>' +
      '<button class="ab" onclick="doShare(\u0027'+x(post.caption||'')+'\u0027)"><span class="ai">🔗</span></button>' +
      '<button class="ab" onclick="openReportPost(\u0027'+x(post.id)+'\u0027,\u0027'+x((post.caption||'').slice(0,80).replace(/\u0027/g,''))+'\u0027)" title="Report post"><span class="ai">🚩</span></button>' +
    '</div>' +
    '<div class="cmt-wrap" id="cmt-'+x(post.id)+'">' +
      '<div id="cmtl-'+x(post.id)+'">'+(_cmtCache[post.id]?buildCmts(_cmtCache[post.id],post.id):'<div style="padding:10px 14px;font-size:.74rem;color:var(--mu)">Tap to load comments…</div>')+'</div>' +
      '<div class="cir"><input class="ci" id="cmti-'+x(post.id)+'" placeholder="Add a comment…" maxlength="500" onkeydown="if(event.key===\u0027Enter\u0027)doComment(\u0027'+x(post.id)+'\u0027)"/><button class="csnd" onclick="doComment(\u0027'+x(post.id)+'\u0027)">➤</button></div>' +
    '</div>';
  return el;
}

function buildCmts(comments, postId) {
  if (!comments || !comments.length) return '<div style="padding:10px 14px;font-size:.76rem;color:var(--mu)">No comments yet. Be first 💬</div>';
  const renderOne = (c, isReply) => {
    const p = c.profile || {};
    const name  = p.display_name || p.username || c.display_name || c.username || 'Someone';
    const init  = (name[0] || '?').toUpperCase();
    const ts    = c.created_at || c.ts;
    const avEl  = p.avatar_url
      ? '<div class="cmt-av"><img src="'+x(p.avatar_url)+'" loading="lazy" onerror="this.parentNode.textContent=\''+init+'\'"/></div>'
      : '<div class="cmt-av">'+init+'</div>';
    const replyBtn = (!isReply && postId)
      ? '<button class="cmt-reply-btn" onclick="startReply(\''+x(postId)+'\',\''+x(c.id)+'\',\''+x(name).replace(/\'/g,'&#39;')+'\')">↩ Reply</button>'
      : '';
    const repliesHtml = (c.replies && c.replies.length)
      ? '<div class="cmt-replies">'+c.replies.map(r => renderOne(r, true)).join('')+'</div>'
      : '';
    const body = c.body || c.content || c.text || '';
    return ''+
      '<div class="cmt-item" id="c-'+x(c.id)+'">'+avEl+
        '<div style="flex:1;min-width:0">'+
          '<div class="cmt-name" style="cursor:pointer" onclick="openProfile(\''+x(c.user_id||'')+'\')">'+x(name)+'</div>'+
          '<div class="cmt-text">'+x(body)+'</div>'+
          '<div class="cmt-time">'+timeAgo(ts)+'</div>'+
          replyBtn+
        '</div>'+
      '</div>'+repliesHtml;
  };
  return comments.map(c => renderOne(c, false)).join('');
}

function expandCap(postId) {
  const post = _posts.find(p => p.id === postId);
  if (!post) return;
  const el = document.getElementById('cap-'+postId);
  if (el) el.innerHTML = x(post.caption);
}

async function doLike(postId) {
  if (!_uid) return showToast('Sign in to like posts');
  // Find the post in our in-memory list so we can update the server count optimistically
  const post = _posts.find(p => p.id === postId);
  const likes   = _getLikes(postId) || [];
  const liked   = likes.includes(_uid);
  const newLikes = liked ? likes.filter(l=>l!==_uid) : [...likes, _uid];
  _setLikes(postId, newLikes);
  if (post) post.like_count = Math.max(0, (post.like_count || 0) + (liked ? -1 : 1));
  const btn = document.getElementById('lb-'+postId);
  const cnt = document.getElementById('lc-'+postId);
  if (btn) { btn.classList.toggle('lk', !liked); btn.querySelector('.ai').textContent = liked?'🤍':'❤️'; }
  if (cnt && post) cnt.textContent = fn(post.like_count);
  fetch('/api/reactions', {
    method: liked ? 'DELETE' : 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_token||''}` },
    body: JSON.stringify({ entity_type: 'post', entity_id: postId, type: 'like' }),
  }).catch(()=>{});
}

async function doRepost(postId) {
  if (!_uid) return showToast('Sign in to repost');
  const reposts = _getReposts(postId) || [];
  const rp      = reposts.includes(_uid);
  const newRp   = rp ? reposts.filter(r=>r!==_uid) : [...reposts, _uid];
  _setReposts(postId, newRp);
  const btn = document.getElementById('rb-'+postId);
  const cnt = document.getElementById('rc-'+postId);
  if (btn) btn.classList.toggle('rp', !rp);
  if (cnt) cnt.textContent = fn(newRp.length);
  if (!rp) showToast('🔁 Reposted!', 'ok');
  const sb = getSB();
  if (sb && _uid) {
    if (rp) {
      await sb.from('reposts').delete().eq('post_id', postId).eq('user_id', _uid).catch(()=>{});
    } else {
      await sb.from('reposts').insert({post_id: postId, user_id: _uid}).catch(()=>{});
    }
  }
}

// Threaded comments — lazy-load from DB on first open
const _cmtCache = {};        // postId → array of top-level comments (each with .replies[])
const _replyTo  = {};        // postId → { parent_id, name }  when user is composing a reply
async function toggleCmt(postId) {
  const el = document.getElementById('cmt-'+postId);
  if (!el) return;
  const opening = el.style.display !== 'block';
  el.style.display = opening ? 'block' : 'none';
  if (opening && !_cmtCache[postId]) await loadComments(postId);
}
async function loadComments(postId) {
  const lEl = document.getElementById('cmtl-'+postId);
  if (lEl) lEl.innerHTML = '<div style="padding:10px 14px;font-size:.74rem;color:var(--mu)">Loading comments…</div>';
  try {
    const res  = await fetch('/api/comments?entity_id=' + encodeURIComponent(postId) + '&entity_type=post');
    const json = await safeJson(res);
    const top  = (json.comments || []).map(c => ({ ...c, profile: c.profile || {} }));
    _cmtCache[postId] = top;
    const totalCount = (json.flat || []).length;
    const cEl = document.getElementById('cc-'+postId);
    if (cEl) cEl.textContent = fn(totalCount);
    if (lEl) lEl.innerHTML = top.length ? buildCmts(top, postId) : '<div style="padding:14px;text-align:center;font-size:.74rem;color:var(--mu)">Be the first to comment</div>';
  } catch(e) {
    if (lEl) lEl.innerHTML = '<div style="padding:10px 14px;font-size:.74rem;color:var(--mu)">Could not load comments</div>';
  }
}

function startReply(postId, parentId, name) {
  _replyTo[postId] = { parent_id: parentId, name };
  const wrap = document.getElementById('cmt-'+postId);
  if (!wrap) return;
  // Insert/refresh a banner above the input
  let bn = wrap.querySelector('.reply-banner');
  if (!bn) {
    bn = document.createElement('div');
    bn.className = 'reply-banner';
    wrap.querySelector('.cir').before(bn);
  }
  bn.innerHTML = 'Replying to <strong>'+x(name||'this comment')+'</strong> <button onclick="cancelReply(\''+x(postId)+'\')">✕</button>';
  const inp = document.getElementById('cmti-'+postId);
  if (inp) { inp.placeholder = 'Write your reply…'; inp.focus(); }
}
function cancelReply(postId) {
  delete _replyTo[postId];
  const wrap = document.getElementById('cmt-'+postId);
  const bn   = wrap?.querySelector('.reply-banner');
  if (bn) bn.remove();
  const inp  = document.getElementById('cmti-'+postId);
  if (inp) inp.placeholder = 'Add a comment…';
}

async function doComment(postId) {
  if (!_uid) return showToast('Sign in to comment');
  const inp  = document.getElementById('cmti-'+postId);
  const txt  = inp?.value.trim(); if (!txt) return;
  const reply = _replyTo[postId] || null;
  inp.value = '';
  cancelReply(postId);

  // Optimistic insert into local cache
  const name  = _profile?.display_name || _session?.display_name || 'You';
  const uname = _profile?.username     || _session?.email?.split('@')[0] || 'you';
  const localCmt = {
    id: 'tmp_'+Date.now(), user_id: _uid, body: txt, content: txt,
    parent_id: reply?.parent_id || null, created_at: new Date().toISOString(),
    profile: { display_name: name, username: uname, avatar_url: _profile?.avatar_url || null },
    replies: []
  };
  const cache = _cmtCache[postId] = _cmtCache[postId] || [];
  if (reply?.parent_id) {
    const parent = cache.find(c => c.id === reply.parent_id);
    if (parent) parent.replies.push(localCmt);
    else cache.push(localCmt);
  } else {
    cache.push(localCmt);
  }
  const lEl = document.getElementById('cmtl-'+postId);
  if (lEl) lEl.innerHTML = buildCmts(cache, postId);

  try {
    const res = await fetch('/api/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_token||''}` },
      body: JSON.stringify({ entity_id: postId, entity_type: 'post', body: txt, parent_id: reply?.parent_id || undefined }),
    });
    const json = await safeJson(res);
    if (!res.ok) throw new Error(json.error || ('HTTP ' + res.status));
    // Re-sync from server to pick up real id + DB trigger side-effects
    loadComments(postId);
  } catch(e) {
    showToast('Could not post comment: ' + e.message, 'err');
  }
}

async function doFollow(targetUserId, postId) {
  if (!_uid) return showToast('Sign in to follow');
  const sb  = getSB();
  let fol;

  if (_uid) {
    const res = await fetch('/api/follows', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_token||''}` },
      body: JSON.stringify({ following_id: targetUserId }),
    }).catch(()=>({ok:false,json:()=>({})}) );
    const json = await res.json().catch(()=>({}));
    fol = json.following !== false;
  } else {
    let following = [];
    try { following = JSON.parse(localStorage.getItem('p_following') || '[]'); } catch(e) {}
    const idx = following.indexOf(targetUserId);
    if (idx > -1) { following.splice(idx, 1); fol = false; } else { following.push(targetUserId); fol = true; }
    localStorage.setItem('p_following', JSON.stringify(following));
  }

  document.querySelectorAll('[id^="fbtn-"]').forEach(btn => {
    const pid = btn.id.replace('fbtn-','');
    const p   = _posts.find(mp => mp.id === pid);
    if (p && p.user_id === targetUserId) { btn.classList.toggle('on', fol); btn.textContent = fol ? '✓ Following' : '+ Follow'; }
  });
  let _fw=[]; try{_fw=JSON.parse(localStorage.getItem('p_following')||'[]');}catch(e){} if(fol){if(!_fw.includes(targetUserId))_fw.push(targetUserId);}else{_fw=_fw.filter(i=>i!==targetUserId);} localStorage.setItem('p_following',JSON.stringify(_fw));
  showToast(fol ? '✓ Following' : 'Unfollowed', fol ? 'ok' : '');
  if (_filter === 'following') { _page = 1; render(); }
}

async function submitPost() {
  const isOrg    = ['organizer','business','admin'].includes(_session?.role);
  const caption  = document.getElementById('post-caption').value.trim();
  const textOnly = (document.getElementById('post-text-only')?.value || '').trim();
  const evName   = document.getElementById('post-event-name').value.trim();
  const finalCap = caption || textOnly;

  if (!isOrg && !_cImg) return showToast('Upload a photo from the event 📸', 'err');
  if (isOrg && !_cImg && !finalCap) return showToast('Add a photo or write something');
  if (!isOrg && !finalCap) return showToast('Add a caption to your photo');

  const btn = document.getElementById('post-submit');
  btn.disabled = true; btn.textContent = 'Sharing…';

  const name  = _profile?.display_name || _session?.display_name || 'You';
  const uname = _profile?.username     || _session?.email?.split('@')[0] || 'you';
  const sb    = getSB();
  let imageUrl = null;

  try {
    if (_cImg && _cImgFile && sb && _uid) {
      const ext  = _cImgFile.name.split('.').pop() || 'jpg';
      const path = _uid + '/' + Date.now() + '.' + ext;
      const { data: up, error: upErr } = await sb.storage.from('post-images').upload(path, _cImgFile, { upsert: false });
      if (!upErr) {
        const { data: { publicUrl } } = sb.storage.from('post-images').getPublicUrl(path);
        imageUrl = publicUrl;
      }
    } else if (_cImg && _cImg.startsWith('http')) {
      imageUrl = _cImg;
    }

    const post_type = isOrg ? 'business_update' : 'attended_photo';

    if (sb && _uid) {
      const token = (await sb.auth.getSession())?.data?.session?.access_token;
      const res = await fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (token || '') },
        body: JSON.stringify({ caption: finalCap, image_url: imageUrl, event_name: evName || null, post_type }),
      });
      const data = await res.json();
      if (res.ok && data.post) {
        _posts.unshift({ id: data.post.id, user_id: _uid, username: uname, display_name: name,
          role: _session?.role||'user', avatar_url: _profile?.avatar_url||null,
          event_name: evName||null, image_url: imageUrl, caption: finalCap,
          likes:[], comments:[], reposts:[], ts: data.post.created_at });
      }
    } else {
      _posts.unshift({ id: 'p_'+Date.now(), user_id: _uid||'anon', username: uname, display_name: name,
        role: _session?.role||'user', avatar_url: _profile?.avatar_url||null,
        event_name: evName||null, image_url: imageUrl || _cImg, caption: finalCap,
        likes:[], comments:[], reposts:[], ts: new Date().toISOString() });
    }

    closeCompose();
    _page = 1; render();
    showToast('🔥 Post shared!', 'ok');
  } catch(e) {
    showToast('Failed to post: ' + e.message, 'err');
  }
  btn.disabled = false; btn.textContent = 'Share 🔥';
}

async function initFeed() {
  const sb = getSB();
  if (sb) {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      _uid = session.user.id;
      _token = session.access_token;

      localStorage.setItem('p_following', JSON.stringify((_fws || []).map(f => f.following_id)));
      initNotifBell(_uid, sb);
    }
  }
  await render();
  // Deep-link: notification routed to /feeds?pid={postId}[&cid={commentId}]
  // Scroll to the post, open its comment section, and (if cid) highlight comment.
  const qp = new URLSearchParams(location.search);
  const pid = qp.get('pid'), cid = qp.get('cid');
  if (pid) scrollToPostAndComment(pid, cid);

async function scrollToPostAndComment(postId, commentId) {
  // Wait one frame for buildCard DOM to settle
  await new Promise(r => requestAnimationFrame(r));
  const post = document.getElementById('post-' + postId);
  if (!post) return;
  post.scrollIntoView({ behavior: 'smooth', block: 'start' });
  post.classList.add('cmt-target');
  setTimeout(() => post.classList.remove('cmt-target'), 2400);
  // Open comments + load
  const wrap = document.getElementById('cmt-' + postId);
  if (wrap && wrap.style.display !== 'block') await toggleCmt(postId);
  if (!commentId) return;
  // Wait for loadComments to render, then scroll to the comment
  for (let i = 0; i < 20; i++) {
    const c = document.getElementById('c-' + commentId);
    if (c) {
      c.scrollIntoView({ behavior: 'smooth', block: 'center' });
      c.classList.add('cmt-target-c');
      setTimeout(() => c.classList.remove('cmt-target-c'), 2400);
      return;
    }
    await new Promise(r => setTimeout(r, 100));
  }
}

async function initNotifBell(uid, sb) {

async function loadNotifList() {
  const el = document.getElementById('notif-list');
  if (!el) return;
  el.innerHTML = '<div style="padding:16px;font-size:.75rem;color:var(--mu)">Loading…</div>';
  const token = localStorage.getItem('p_token') || '';
  try {
    const r = await fetch('/api/notifications?limit=30', { headers: { 'Authorization': `Bearer ${token}` } });
    const { notifications: notifs } = await r.json();
    if (!notifs?.length) { el.innerHTML = '<div style="padding:30px;text-align:center;font-size:.78rem;color:var(--mu)">No notifications yet 🔔</div>'; return; }
    const sb = getSB();
    const fromIds = [...new Set(notifs.map(n => n.from_user_id).filter(Boolean))];
    let avMap = {};
    if (fromIds.length && sb) {
      const { data: profs } = await sb.from('profiles').select('id,avatar_url').in('id', fromIds);
      (profs||[]).forEach(p => { avMap[p.id] = p.avatar_url; });
    }
    const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const ico = {follow:'👤',like:'❤️',comment:'💬',repost:'🔁',business_post:'📢'};
    const tAgo = iso => { if(!iso) return ''; const d=Math.floor((Date.now()-new Date(iso))/1000); if(d<60) return 'just now'; if(d<3600) return Math.floor(d/60)+'m ago'; if(d<86400) return Math.floor(d/3600)+'h ago'; return Math.floor(d/86400)+'d ago'; };
    el.innerHTML = notifs.map(n => {
      const av = n.from_user_id ? avMap[n.from_user_id] : null;
      const avEl = av ? `<img src="${esc(av)}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid var(--border2)">`
        : `<div style="width:40px;height:40px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0">${ico[n.type]||'🔔'}</div>`;
      const name = n.from_display_name || '';
      const msg  = esc(n.message || '');
      const boldMsg = name ? msg.replace(esc(name), `<b style="color:var(--tx)">${esc(name)}</b>`) : msg;
      return `<div onclick="markNRead('${n.id}')" style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);background:${n.read?'transparent':'rgba(176,38,255,.07)'};cursor:pointer">
        <div style="position:relative;flex-shrink:0">${avEl}<div style="position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-radius:50%;background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:.7rem;border:1.5px solid var(--bg2)">${ico[n.type]||'🔔'}</div></div>
        <div style="flex:1;min-width:0"><div style="font-size:.79rem;color:var(--mu2);line-height:1.45">${boldMsg}</div><div style="font-size:.63rem;color:var(--mu);margin-top:3px">${tAgo(n.created_at)}</div></div>
        ${!n.read?'<div style="width:8px;height:8px;border-radius:50%;background:var(--or)"></div>':''}
      </div>`;
    }).join('');
    const unread = notifs.filter(n=>!n.read).length;
    const dot = document.getElementById('notif-dot');
    if (dot) dot.style.display = unread ? 'block' : 'none';
  } catch(e) { el.innerHTML = '<div style="padding:16px;font-size:.75rem;color:var(--mu)">Could not load</div>'; }
}

    m.textContent = 'Please select a reason.';
    return;
  }
  const b = document.getElementById('rp-submit');
  b.disabled = true; b.textContent = 'Sending…';
  try {
    const { data: { session } } = await sb.auth.getSession();
    const headers = { 'Content-Type': 'application/json' };
    if (session) headers['Authorization'] = 'Bearer ' + session.access_token;
    const r = await fetch('/api/report-post', {
      method: 'POST', headers,
      body: JSON.stringify({ post_id: _rpId, post_caption: _rpCap || null, reason, detail: detail || null }),
    });
    if (!r.ok) throw new Error((await r.json()).error || 'Failed');
    m.style.cssText = 'display:block;background:rgba(198,255,74,.1);color:#C6FF4A;padding:10px 12px;border-radius:10px;font-size:.8rem;margin-bottom:12px';
    m.textContent = '✅ Report submitted. Our team will review it shortly.';
    b.textContent = 'Reported';
    setTimeout(closeReportPost, 2000);
  } catch(e) {
    m.style.cssText = 'display:block;background:rgba(255,45,120,.12);color:#FF2D78;padding:10px 12px;border-radius:10px;font-size:.8rem;margin-bottom:12px';
    m.textContent = e.message || 'Failed to submit. Please try again.';
    b.disabled = false; b.textContent = 'Submit Report';
  }
}
</script>

<!-- REPORT POST MODAL -->
<div id="rp-overlay" onclick="if(event.target===this)closeReportPost()" style="display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center">
  <div style="width:100%;max-width:480px;background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid rgba(255,255,255,.1);padding:20px 20px 32px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1rem">🚩 Report Post</div>
      <button onclick="closeReportPost()" style="background:rgba(255,255,255,.06);border:none;color:var(--tx);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem">✕</button>
    </div>
    <div id="rp-msg" style="display:none;padding:10px 12px;border-radius:10px;font-size:.8rem;margin-bottom:12px"></div>
    <div style="font-size:.76rem;color:var(--mu);margin-bottom:6px">Reason *</div>
    <select id="rp-reason" style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--tx);font-size:.84rem;margin-bottom:12px;outline:none">
      <option value="">— Select a reason —</option>
      <option value="inappropriate">⚠️ Inappropriate content</option>
      <option value="stolen_content">📋 Stolen / copied content</option>
      <option value="fake_event">🎭 Spam or misleading</option>
      <option value="i_am_owner">👤 Impersonation / I own this</option>
      <option value="doesnt_exist">❌ Hate speech or harassment</option>
      <option value="other">💬 Other</option>
    </select>
    <div style="font-size:.76rem;color:var(--mu);margin-bottom:6px">Additional details <span style="color:var(--mu)">(optional)</span></div>
    <textarea id="rp-detail" rows="3" placeholder="Tell us more..." style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--tx);font-size:.84rem;resize:none;outline:none;box-sizing:border-box"></textarea>
    <button id="rp-submit" onclick="submitReportPost()" style="width:100%;margin-top:14px;padding:13px;background:linear-gradient(135deg,#B026FF,#FF5C00);border:none;border-radius:50px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer">Submit Report</button>
  </div>
</div>

</body>
</html>
