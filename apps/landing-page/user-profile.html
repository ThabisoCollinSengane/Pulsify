
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#05080F"/>
<title>User Profile — Pulsefy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080F;--bg2:#090D1A;--surf:#0D1424;--surf2:#121B30;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--cy:#00E5FF;--tx:#F0EEF8;--mu:#5A5870;--mu2:#9997B0;--bh:70px}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
body{padding-bottom:32px}
.tb{position:fixed;top:0;left:0;right:0;height:58px;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(5,8,15,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.back{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--mu2);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;padding:0}
.settings-btn{width:34px;height:34px;border-radius:50%;background:var(--surf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem}
.hero{margin-top:58px;padding:0 0 0;background:linear-gradient(180deg,rgba(176,38,255,.12) 0%,transparent 100%);border-bottom:1px solid var(--border)}
.hero-bg{height:120px;background:linear-gradient(135deg,#1a0533,#0a001a,#1a0015);position:relative;overflow:hidden}
.hero-bg-blur{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6rem;opacity:.08;filter:blur(8px)}
.hero-body{padding:0 16px 20px;position:relative}
.avatar{width:78px;height:78px;border-radius:50%;background:linear-gradient(135deg,#B026FF,#FF5C00);display:flex;align-items:center;justify-content:center;font-size:1.9rem;border:3px solid var(--bg);margin-top:-39px;overflow:hidden;cursor:pointer;position:relative}
.avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px}
.edit-btn{background:var(--surf);border:1px solid var(--border2);border-radius:50px;padding:7px 16px;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:var(--tx);cursor:pointer}
.edit-btn:active{border-color:var(--or);color:var(--or)}
.pname{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.03em;line-height:1}
.phandle{font-size:.78rem;color:var(--mu);margin-bottom:6px}
.pbio{font-size:.82rem;color:var(--mu2);line-height:1.5;margin-bottom:14px}
.stats{display:flex;gap:20px;margin-bottom:14px}
.stat{text-align:center}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--tx);line-height:1}
.stat-l{font-family:'Syne',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu)}
.genres-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.genre-tag{background:rgba(255,92,0,.08);border:1px solid rgba(255,92,0,.2);color:var(--or);font-family:'Syne',sans-serif;font-size:.66rem;font-weight:700;padding:4px 11px;border-radius:50px}
.follow-row{display:flex;gap:16px;margin-bottom:10px}
.follow-stat{text-align:center;cursor:pointer}
.follow-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--tx)}
.follow-label{font-size:.6rem;color:var(--mu);font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.05em}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:58px;z-index:10}
.tab{flex:1;padding:13px;text-align:center;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--or);border-bottom-color:var(--or)}
.pane{display:none;padding:14px 16px}
.pane.active{display:block}
.post{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:14px}
.post-img{width:100%;height:220px;object-fit:cover;display:block;background:var(--surf2)}
.post-img-placeholder{height:220px;background:linear-gradient(135deg,var(--surf),var(--surf2));display:flex;align-items:center;justify-content:center;font-size:3rem}
.post-body{padding:14px}
.post-ev{font-family:'Syne',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--or);margin-bottom:5px}
.post-cap{font-size:.86rem;line-height:1.5;color:var(--mu2);margin-bottom:10px}
.post-foot{display:flex;align-items:center;justify-content:space-between}
.post-date{font-size:.68rem;color:var(--mu)}
.post-actions{display:flex;gap:12px}
.pa{background:none;border:none;font-size:.78rem;color:var(--mu);font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.ev-card{display:flex;gap:12px;align-items:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px;cursor:pointer}
.ev-card:active{border-color:rgba(255,92,0,.3)}
.ev-thumb{width:54px;height:54px;border-radius:10px;flex-shrink:0;overflow:hidden;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.ev-thumb img{width:100%;height:100%;object-fit:cover}
.ev-info{flex:1;min-width:0}
.ev-name{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-meta{font-size:.7rem;color:var(--mu);margin-bottom:5px}
.ev-badge{display:inline-block;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.25);color:#00D4AA;font-family:'Syne',sans-serif;font-size:.6rem;font-weight:700;padding:2px 9px;border-radius:50px}
.empty{padding:48px 20px;text-align:center}
.empty-ico{font-size:3rem;margin-bottom:14px}
.empty-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:8px}
.empty-sub{font-size:.8rem;color:var(--mu);line-height:1.5;margin-bottom:20px}
.empty-btn{background:var(--or);color:#fff;border:none;padding:10px 24px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer}
.fab{position:fixed;bottom:calc(var(--bh) + 16px);right:16px;z-index:50;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#B026FF,#FF5C00);border:none;color:#fff;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 20px rgba(176,38,255,.4);display:flex;align-items:center;justify-content:center}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:10px 22px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;color:var(--tx);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(198,255,74,.4);color:var(--li)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal-sheet{width:100%;max-width:520px;background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid rgba(255,255,255,.1);border-bottom:none;padding:24px 20px 36px;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px}
.modal-inp{width:100%;background:var(--surf);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;margin-bottom:12px}
.modal-inp:focus{border-color:var(--or)}
.modal-btn{width:100%;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:14px;border-radius:12px;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-bottom:10px}
.modal-cancel{width:100%;background:transparent;border:1px solid var(--border);border-radius:12px;padding:13px;font-family:'Syne',sans-serif;font-size:.86rem;font-weight:700;color:var(--mu);cursor:pointer}
.follow-btn{margin-left:auto;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:7px 16px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;cursor:pointer}
.follow-btn.following{background:transparent;border:1px solid var(--border2);color:var(--mu2)}
</style>
</head>
<body>
<div class="tb">
  <button class="back" onclick="history.back()">← Back</button>
  <span id="nav-title" style="font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700">Profile</span>
  <div id="settings-btn-wrapper"></div>
</div>
<div class="hero">
  <div class="hero-bg"><div class="hero-bg-blur">🎶</div></div>
  <div class="hero-body">
    <div class="hero-row">
      <div class="avatar" id="avatar-el">
        <span id="avatar-emoji">😊</span>
      </div>
      <div id="profile-action-btn"></div>
    </div>
    <div class="pname" id="pname">User</div>
    <div class="phandle" id="phandle">@user</div>
    <div class="pbio" id="pbio"></div>
    <div class="follow-row">
      <div class="follow-stat" id="followers-stat">
        <div class="follow-num" id="followers-count">0</div>
        <div class="follow-label">Followers</div>
      </div>
      <div class="follow-stat" id="following-stat">
        <div class="follow-num" id="following-count">0</div>
        <div class="follow-label">Following</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="stat-posts">0</div><div class="stat-l">Posts</div></div>
      <div class="stat"><div class="stat-n" id="stat-events">0</div><div class="stat-l">Events</div></div>
      <div class="stat"><div class="stat-n" id="stat-saved">0</div><div class="stat-l">Saved</div></div>
    </div>
    <div class="genres-row" id="genres-row"></div>
    <div id="social-links-row" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px"></div>
  </div>
</div>
<div class="tabs">
  <div class="tab active" id="posts-tab" onclick="switchTab(this,'pane-posts')">📸 Posts</div>
  <div class="tab" id="events-tab" onclick="switchTab(this,'pane-events')">🎟 Events</div>
  <div class="tab" id="activity-tab" onclick="switchTab(this,'pane-activity')">❤️ Activity</div>
</div>
<div class="pane active" id="pane-posts">
  <div id="posts-list"></div>
</div>
<div class="pane" id="pane-events">
  <div id="events-list"></div>
</div>
<div class="pane" id="pane-activity">
  <div id="activity-list"></div>
</div>
<div id="fab-wrapper"></div>
<div class="modal-ov" id="post-modal" onclick="if(event.target===this)closePostModal()">
  <div class="modal-sheet">
    <div class="modal-title">📸 Share a Memory</div>
    <input type="file" id="post-file" accept="image/*" style="display:none" onchange="previewPost(this)"/>
    <div id="post-preview" onclick="document.getElementById('post-file').click()" style="height:160px;background:var(--surf);border:1.5px dashed rgba(0,229,255,.3);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;font-size:.84rem;color:var(--cy);flex-direction:column;gap:8px;overflow:hidden">
      <span style="font-size:2rem">📷</span>
      <span>Tap to choose photo</span>
    </div>
    <input class="modal-inp" id="post-caption" placeholder="Write a caption…"/>
    <input class="modal-inp" id="post-event" placeholder="Event name (optional)"/>
    <button class="modal-btn" onclick="submitPost()">Share Memory 🔥</button>
    <button class="modal-cancel" onclick="closePostModal()">Cancel</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://cjzewfvtdayjgjdpdmln.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqemV3ZnZ0ZGF5amdqZHBkbWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTg0MjYsImV4cCI6MjA5MTQzNDQyNn0.KQ80RmaB6cfA0dkcT-pdTe53fwyUrrIBeVJtToWF_Mk';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;
let profileId = null;
let isFollowing = false;

const GENRE_LABELS = {
  amapiano: '🎶 Amapiano', gqom: '🔊 Gqom', hiphop: '🎤 Hip Hop',
  house: '🎧 House', afrobeats: '🥁 Afrobeats', rock: '🎸 Rock',
  gospel: '🙏 Gospel', jazz: '🎷 Jazz', sport: '⚽ Sport',
  maskandi: '🪗 Maskandi'
};

const _SL_META = [
  { key:'whatsapp',  label:'WhatsApp',  color:'#25D366', bg:'rgba(37,211,102,.12)',  border:'rgba(37,211,102,.3)',   svg:'<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884z"/></svg>' },
  { key:'instagram', label:'Instagram', color:'#E4405F', bg:'rgba(228,64,95,.1)',    border:'rgba(228,64,95,.3)',    svg:'<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>' },
  { key:'tiktok',    label:'TikTok',    color:'#ffffff', bg:'rgba(255,255,255,.06)', border:'rgba(255,255,255,.15)', svg:'<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.27 8.27 0 004.84 1.55V6.79a4.85 4.85 0 01-1.07-.1z"/></svg>' },
  { key:'facebook',  label:'Facebook',  color:'#1877F2', bg:'rgba(24,119,242,.1)',   border:'rgba(24,119,242,.3)',   svg:'<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>' },
  { key:'x',         label:'X',         color:'#ffffff', bg:'rgba(255,255,255,.06)', border:'rgba(255,255,255,.15)', svg:'<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>' },
];
function _slUrl(p, v) {
  if (!v) return ''; if (v.startsWith('http')) return v;
  if (p==='whatsapp')  return 'https://wa.me/'+v.replace(/\D/g,'');
  if (p==='instagram') return 'https://instagram.com/'+v.replace(/^@/,'');
  if (p==='tiktok')    return 'https://tiktok.com/@'+v.replace(/^@/,'');
  if (p==='facebook')  return 'https://facebook.com/'+v;
  if (p==='x')         return 'https://x.com/'+v.replace(/^@/,'');
  return v;
}
function _renderSocIcons(links) {
  if (!links || typeof links !== 'object') return '';
  const active = _SL_META.filter(s => links[s.key]);
  if (!active.length) return '';
  return active.map(s => `<a href="${_slUrl(s.key,links[s.key])}" target="_blank" rel="noopener" title="${s.label}" `+
    `style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;`+
    `background:${s.bg};border:1.5px solid ${s.border};color:${s.color};text-decoration:none;flex-shrink:0">`+
    `${s.svg}</a>`).join('');
}

async function loadUserData() {
  const urlParams = new URLSearchParams(window.location.search);
  profileId = urlParams.get('id');

  const { data: { session } } = await sb.auth.getSession();
  if (!session) { 
    if (!profileId) { window.location.href = '/signin'; return; }
  } else {
    currentUser = session.user;
  }
  
  if (!profileId && currentUser) {
    profileId = currentUser.id;
  }

  if (!profileId) {
    showToast('Could not find user profile.', 'error');
    document.getElementById('pname').textContent = "User not found";
    return;
  }

  const { data: profile, error } = await sb.from('profiles').select('id,display_name,username,bio,avatar_url,genres,social_links,role').eq('id', profileId).single();
  if (error || !profile) {
    showToast('User profile not found.', 'error');
    document.getElementById('pname').textContent = "User not found";
    return;
  }
  
  const isOwnProfile = currentUser ? profile.id === currentUser.id : false;

  document.title = (profile.display_name || 'User') + ' — Pulsefy';
  document.getElementById('nav-title').textContent = isOwnProfile ? 'My Profile' : profile.display_name;
  
  if (isOwnProfile) {
    document.getElementById('settings-btn-wrapper').innerHTML = `<div class="settings-btn" onclick="window.location.href='/profile-settings'">⚙️</div>`;
    document.getElementById('profile-action-btn').innerHTML = `<button class="edit-btn" onclick="window.location.href='/profile-settings'">Edit Profile</button>`;
    document.getElementById('avatar-el').style.cursor = 'pointer';
    document.getElementById('avatar-el').onclick = () => window.location.href='/profile-settings';
    document.getElementById('posts-tab').textContent = '📸 My Posts';
    document.getElementById('events-tab').textContent = '🎟 My Events';
    document.getElementById('fab-wrapper').innerHTML = `<button class="fab" onclick="openPostModal()" title="Add memory">📷</button>`;
  } else {
    // Follow button logic
    const followBtn = document.createElement('button');
    followBtn.id = 'follow-btn';
    followBtn.className = 'follow-btn';
    followBtn.textContent = 'Follow';
    followBtn.onclick = () => toggleFollow(profile.id);
    document.getElementById('profile-action-btn').appendChild(followBtn);
    if(currentUser) await checkFollowing(profile.id);
  }

  document.getElementById('pname').textContent = profile.display_name || 'User';
  document.getElementById('phandle').textContent = '@' + (profile.username || 'user');
  document.getElementById('pbio').textContent = profile.bio || '';

  if (profile.avatar_url) {
    const avatarEl = document.getElementById('avatar-el');
    avatarEl.innerHTML = `<img src="${profile.avatar_url}" alt="avatar">`;
  } else {
    document.getElementById('avatar-emoji').style.display = 'block';
  }

  const genres = profile.genres || [];
  const gr = document.getElementById('genres-row');
  gr.innerHTML = '';
  if (genres.length) {
    genres.forEach(g => {
      const tag = document.createElement('span');
      tag.className = 'genre-tag';
      tag.textContent = GENRE_LABELS[g] || g;
      gr.appendChild(tag);
    });
    gr.style.display = 'flex';
  } else {
    gr.style.display = 'none';
  }

  const socRow = document.getElementById('social-links-row');
  socRow.innerHTML = _renderSocIcons(profile.social_links);
  socRow.style.display = socRow.innerHTML ? 'flex' : 'none';

  const { count: followersCount } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('following_id', profile.id);
  const { count: followingCount } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('follower_id', profile.id);
  document.getElementById('followers-count').textContent = followersCount || 0;
  document.getElementById('following-count').textContent = followingCount || 0;

  renderPosts(profile.id);
  renderAttended(profile.id, isOwnProfile);
  renderActivity(profile.id);
}

async function checkFollowing(userId) {
  const followBtn = document.getElementById('follow-btn');
  if (!currentUser) {
    followBtn.style.display = 'none';
    return;
  }
  const { data, error } = await sb.from('follows').select('*').eq('follower_id', currentUser.id).eq('following_id', userId);
  if (data && data.length > 0) {
    isFollowing = true;
    followBtn.textContent = 'Following';
    followBtn.classList.add('following');
  } else {
    isFollowing = false;
    followBtn.textContent = 'Follow';
    followBtn.classList.remove('following');
  }
}

async function toggleFollow(userId) {
  if (!currentUser) {
    window.location.href = '/signin';
    return;
  }
  
  const followBtn = document.getElementById('follow-btn');
  followBtn.disabled = true;

  if (isFollowing) {
    // Unfollow
    const { error } = await sb.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', userId);
    if (!error) {
      isFollowing = false;
      followBtn.textContent = 'Follow';
      followBtn.classList.remove('following');
      updateFollowerCount(-1);
    } else {
      showToast('Could not unfollow.', 'error');
    }
  } else {
    // Follow
    const { error } = await sb.from('follows').insert({ follower_id: currentUser.id, following_id: userId });
    if (!error) {
      isFollowing = true;
      followBtn.textContent = 'Following';
      followBtn.classList.add('following');
      updateFollowerCount(1);
    } else {
      showToast('Could not follow.', 'error');
    }
  }
  followBtn.disabled = false;
}

function updateFollowerCount(change) {
  const followersCountEl = document.getElementById('followers-count');
  let currentCount = parseInt(followersCountEl.textContent, 10);
  followersCountEl.textContent = currentCount + change;
}

function escHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

async function renderPosts(userId) {
  const el = document.getElementById('posts-list');
  el.innerHTML = '<div class="empty"><div class="empty-ico">⏳</div><div class="empty-title">Loading…</div></div>';
  try {
    const { data: posts, error, count } = await sb.from('posts').select('id,caption,image_url,event_name,created_at', { count: 'exact' }).eq('user_id', userId).order('created_at', { ascending: false }).limit(30);
    if (error) throw error;
    document.getElementById('stat-posts').textContent = count || 0;
    if (!posts?.length) {
      el.innerHTML = '<div class="empty"><div class="empty-ico">📸</div><div class="empty-title">No posts yet</div></div>';
      return;
    }
    el.innerHTML = posts.map(p => `
      <div class="post" id="post-${escHtml(p.id)}">
        ${p.image_url ? `<img class="post-img" src="${escHtml(p.image_url)}" loading="lazy" onerror="this.style.display='none'"/>` : '<div class="post-img-placeholder">📸</div>'}
        <div class="post-body">
          ${p.event_name ? `<div class="post-ev">🎟 ${escHtml(p.event_name)}</div>` : ''}
          ${p.caption ? `<div class="post-cap">${escHtml(p.caption)}</div>` : ''}
          <div class="post-foot">
            <span class="post-date">${new Date(p.created_at).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'})}</span>
          </div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">📸</div><div class="empty-title">Could not load posts</div></div>';
  }
}

async function renderAttended(userId, isOwnProfile) {
  const el = document.getElementById('events-list');
  el.innerHTML = '<div class="empty"><div class="empty-ico">⏳</div><div class="empty-title">Loading…</div></div>';
  try {
    const { data: attended, count } = await sb.from('event_attendances').select('event_id, events(id,name,venue_name,city,date_local,image_url)', { count: 'exact' }).eq('user_id', userId).order('created_at', { ascending: false }).limit(20);
    document.getElementById('stat-events').textContent = count || 0;
    if (!attended?.length) {
      if(isOwnProfile) {
        el.innerHTML = `<div class="empty"><div class="empty-ico">🎟</div><div class="empty-title">No events attended yet</div><div class="empty-sub">When you buy tickets or RSVP, your events appear here.</div><button class="empty-btn" onclick="window.location.href='/'">Browse Events</button></div>`;
      } else {
        el.innerHTML = '<div class="empty"><div class="empty-ico">🎟</div><div class="empty-title">No events attended yet</div></div>';
      }
      return;
    }
    el.innerHTML = attended.map(a => {
      const ev = a.events || {};
      return `
        <div class="ev-card" onclick="window.location.href='/?eid=${ev.id}'">
          <div class="ev-thumb">${ev.image_url ? `<img src="${escHtml(ev.image_url)}" loading="lazy"/>` : '🎶'}</div>
          <div class="ev-info">
            <div class="ev-name">${escHtml(ev.name || 'Event')}</div>
            <div class="ev-meta">📍 ${escHtml(ev.city || ev.venue_name || '')}${ev.date_local ? ' · ' + new Date(ev.date_local).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}) : ''}</div>
            <span class="ev-badge">✅ Attended</span>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">🎟</div><div class="empty-title">Could not load events</div></div>';
  }

  try {
    const { count: savedCount } = await sb.from('saved_items').select('*', { count: 'exact', head: true }).eq('user_id', userId);
    document.getElementById('stat-saved').textContent = savedCount || 0;
  } catch(e) {}
}

async function renderActivity(userId) {
  const el = document.getElementById('activity-list');
  el.innerHTML = '<div class="empty"><div class="empty-ico">⏳</div><div class="empty-title">Loading…</div></div>';
  try {
    const [{ data: likes }, { data: comments }] = await Promise.all([
      sb.from('reactions').select('post_id, created_at, posts(id,caption,image_url,event_name)').eq('user_id', userId).eq('type', 'like').order('created_at', { ascending: false }).limit(20),
      sb.from('comments').select('id, body, content, text, created_at, post_id, posts(id,caption,image_url,event_name)').eq('user_id', userId).order('created_at', { ascending: false }).limit(20),
    ]);
    const items = [
      ...(likes || []).map(r => ({ ...r, _type: 'like', _at: r.created_at, post: r.posts })),
      ...(comments || []).map(c => ({ ...c, _type: 'comment', _at: c.created_at, post: c.posts })),
    ].sort((a, b) => new Date(b._at) - new Date(a._at)).slice(0, 30);

    if (!items.length) {
      el.innerHTML = '<div class="empty"><div class="empty-ico">❤️</div><div class="empty-title">No activity yet</div></div>';
      return;
    }
    el.innerHTML = items.map(it => {
      const p = it.post || {};
      const ico = it._type === 'like' ? '❤️' : '💬';
      const label = it._type === 'like' ? 'Liked a post' : 'Commented';
      const body = it._type === 'comment' ? escHtml(it.body || it.content || it.text || '') : '';
      const date = new Date(it._at).toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
      return `<div class="post" style="display:flex;gap:10px;padding:12px;align-items:flex-start">
        ${p.image_url ? `<img src="${escHtml(p.image_url)}" style="width:50px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0"/>` : `<div style="width:50px;height:50px;border-radius:8px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0">${ico}</div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:.7rem;color:var(--mu);margin-bottom:3px">${ico} ${label} · ${date}</div>
          ${p.event_name ? `<div style="font-size:.62rem;color:var(--or);font-weight:700;margin-bottom:2px">🎟 ${escHtml(p.event_name)}</div>` : ''}
          ${p.caption ? `<div style="font-size:.82rem;color:var(--mu2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(p.caption)}</div>` : ''}
          ${body ? `<div style="font-size:.82rem;color:var(--tx);font-style:italic">"${body}"</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">❤️</div><div class="empty-title">Could not load activity</div></div>';
  }
}

function switchTab(tab, paneId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById(paneId)?.classList.add('active');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}
