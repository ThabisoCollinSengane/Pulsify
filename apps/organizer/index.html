<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#05080F"/>
<title>Organizer Dashboard — Pulsify</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080F;--bg2:#090D1A;--surf:#0D1424;--surf2:#121B30;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--or:#FF5C00;--li:#C6FF4A;--pk:#FF2D78;--cy:#00E5FF;--pu:#B026FF;--tx:#F0EEF8;--mu:#5A5870;--mu2:#9997B0;--bh:70px}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
body{padding-bottom:calc(var(--bh)+20px)}
.tb{position:fixed;top:0;left:0;right:0;height:58px;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(5,8,15,.96);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.06em;display:flex;align-items:center;gap:8px;color:var(--tx)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--or);box-shadow:0 0 12px var(--or);animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.pill{background:rgba(176,38,255,.15);border:1px solid rgba(176,38,255,.35);color:var(--pu);font-family:'Syne',sans-serif;font-size:.64rem;font-weight:700;padding:3px 10px;border-radius:50px;letter-spacing:.06em;text-transform:uppercase}
.main{margin-top:58px;padding:16px}
.hero{background:linear-gradient(135deg,rgba(176,38,255,.15),rgba(255,92,0,.1));border:1px solid rgba(176,38,255,.2);border-radius:20px;padding:20px;margin-bottom:16px}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;margin-bottom:4px}
.hero-sub{font-size:.78rem;color:var(--mu2)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--or);line-height:1}
.stat-l{font-family:'Syne',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-top:4px}
.section{margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px}
.card-body{padding:14px}
.inp{width:100%;background:var(--surf);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.87rem;outline:none;margin-bottom:10px;transition:border-color .2s}
.inp:focus{border-color:var(--or)}.inp::placeholder{color:var(--mu)}
textarea.inp{resize:none;height:80px;line-height:1.5}
select.inp{-webkit-appearance:none;cursor:pointer}
select.inp option{background:#0D1424}
.img-drop{height:130px;background:rgba(255,255,255,.03);border:1.5px dashed rgba(0,229,255,.3);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:10px;overflow:hidden;flex-direction:column;gap:6px}
.img-drop img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.btn-primary{width:100%;background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff;border:none;padding:13px;border-radius:50px;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.post-item{padding:13px;border-bottom:1px solid var(--border)}
.post-item:last-child{border-bottom:none}
.post-cap{font-size:.84rem;color:var(--mu2);line-height:1.5;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-meta{font-size:.66rem;color:var(--mu);font-family:'Syne',sans-serif;font-weight:700}
.post-img-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surf2)}
.post-row{display:flex;gap:10px;align-items:flex-start}
.del-btn{background:none;border:none;color:var(--mu);font-size:.78rem;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;margin-left:auto;padding:0;flex-shrink:0}
.del-btn:active{color:var(--pk)}
.tabs{display:flex;gap:0;background:var(--surf);border-radius:12px;padding:3px;margin-bottom:16px}
.tab{flex:1;padding:9px;text-align:center;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:var(--mu);cursor:pointer;border-radius:10px;transition:all .2s}
.tab.active{background:linear-gradient(135deg,#B026FF,#FF5C00);color:#fff}
.pane{display:none}.pane.active{display:block}
.bn{position:fixed;bottom:0;left:0;right:0;height:var(--bh);z-index:800;background:rgba(5,8,15,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:stretch}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;border:none;cursor:pointer;padding:8px 2px 10px;-webkit-tap-highlight-color:transparent}
.bb svg{width:22px;height:22px;stroke:var(--mu);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.bb.active svg{stroke:var(--or)}
.bl{font-family:'Syne',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);transition:color .2s}
.bb.active .bl{color:var(--or)}
.toast{position:fixed;bottom:calc(var(--bh)+16px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--surf);border:1px solid var(--border);border-radius:50px;padding:10px 22px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;color:var(--tx);z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(198,255,74,.4);color:var(--li)}
.toast.err{border-color:rgba(255,45,120,.4);color:var(--pk)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:40px 20px;text-align:center;color:var(--mu);font-size:.82rem}
</style>
</head>
<body>

<div class="tb">
  <div class="logo"><span class="dot"></span>PULSIFY</div>
  <span class="pill">🎪 Organizer</span>
</div>

<div class="main">
  <div class="hero">
    <div class="hero-name" id="org-name">Loading…</div>
    <div class="hero-sub" id="org-handle">@handle · Event Organizer</div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-n" id="stat-posts">0</div><div class="stat-l">Posts</div></div>
    <div class="stat-card"><div class="stat-n" id="stat-followers">0</div><div class="stat-l">Followers</div></div>
    <div class="stat-card"><div class="stat-n" id="stat-events">0</div><div class="stat-l">Events</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(this,'pane-post')">📢 New Post</div>
    <div class="tab" onclick="switchTab(this,'pane-event')">🎟 New Event</div>
    <div class="tab" onclick="switchTab(this,'pane-myposts')">📋 My Posts</div>
  </div>

  <div class="pane active" id="pane-post">
    <div class="card">
      <div class="card-body">
        <div class="img-drop" id="img-drop" onclick="document.getElementById('post-img').click()">
          <span style="font-size:1.8rem">🖼</span>
          <span style="font-size:.78rem;color:var(--mu)">Tap to add an image (optional)</span>
        </div>
        <input type="file" id="post-img" accept="image/*" style="display:none" onchange="previewImg(this)"/>
        <textarea class="inp" id="post-caption" placeholder="Write your update, promo or announcement…" maxlength="1000"></textarea>
        <input class="inp" id="post-event-tag" placeholder="Tag an event name (optional)"/>
        <button class="btn-primary" id="post-btn" onclick="submitPost()">Publish to Feed 🚀</button>
      </div>
    </div>
  </div>

  <div class="pane" id="pane-event">
    <div class="card">
      <div class="card-body">
        <input class="inp" id="ev-name" placeholder="Event name *"/>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <input class="inp" id="ev-date" type="date" style="color-scheme:dark;margin-bottom:0"/>
          <input class="inp" id="ev-time" type="time" style="color-scheme:dark;margin-bottom:0"/>
        </div>
        <div style="height:10px"></div>
        <input class="inp" id="ev-venue" placeholder="Venue name *"/>
        <input class="inp" id="ev-city" placeholder="City / suburb *"/>
        <input class="inp" id="ev-price" type="number" placeholder="Ticket price (R) — 0 for free"/>
        <select class="inp" id="ev-genre">
          <option value="">Select genre…</option>
          <option value="amapiano">Amapiano</option>
          <option value="gqom">Gqom</option>
          <option value="hiphop">Hip Hop</option>
          <option value="house">House</option>
          <option value="afrobeats">Afrobeats</option>
          <option value="rock">Rock</option>
          <option value="gospel">Gospel</option>
          <option value="jazz">Jazz</option>
          <option value="sport">Sport</option>
          <option value="comedy">Comedy</option>
          <option value="maskandi">Maskandi</option>
          <option value="other">Other</option>
        </select>
        <textarea class="inp" id="ev-desc" placeholder="Event description (optional)" maxlength="500"></textarea>
        <button class="btn-primary" id="ev-btn" onclick="submitEvent()">Create Event 🎉</button>
      </div>
    </div>
  </div>

  <div class="pane" id="pane-myposts">
    <div class="card" id="my-posts-card">
      <div class="empty">Loading your posts…</div>
    </div>
  </div>
</div>

<nav class="bn">
  <button class="bb" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24"><path d="M12 3C12 3 4 9.5 4 15a8 8 0 0016 0C20 9.5 12 3 12 3Z"/></svg>
    <span class="bl">Home</span>
  </button>
  <button class="bb" onclick="window.location.href='feeds.html'">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    <span class="bl">Feed</span>
  </button>
  <button class="bb active">
    <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M16 7v-.5a3.5 3.5 0 00-7 0V7"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span class="bl">Dashboard</span>
  </button>
  <button class="bb" onclick="window.location.href='user-profile.html'">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
    <span class="bl">Profile</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://cjzewfvtdayjgjdpdmln.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqemV3ZnZ0ZGF5amdqZHBkbWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTg0MjYsImV4cCI6MjA5MTQzNDQyNn0.KQ80RmaB6cfA0dkcT-pdTe53fwyUrrIBeVJtToWF_Mk';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;
let currentProfile = null;
let _token = null;
let _imgFile = null;

function x(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m, t='') { const el=document.getElementById('toast'); el.textContent=m; el.className='toast '+t+' show'; setTimeout(()=>el.classList.remove('show'),3500); }

function switchTab(btn, paneId) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(paneId).classList.add('active');
  if (paneId === 'pane-myposts') loadMyPosts();
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'signin.html'; return; }
  currentUser = session.user;
  _token = session.access_token;

  const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = profile || {};

  if (!['organizer','admin'].includes(currentProfile.role)) {
    toast('This dashboard is for organizers only', 'err');
    setTimeout(() => window.location.href = 'index.html', 2000);
    return;
  }

  document.getElementById('org-name').textContent = currentProfile.display_name || currentUser.email?.split('@')[0] || 'Organizer';
  document.getElementById('org-handle').textContent = '@' + (currentProfile.username || 'organizer') + ' · Event Organizer';

  const [{ count: postsCount }, { count: followersCount }, { count: eventsCount }] = await Promise.all([
    sb.from('posts').select('*', {count:'exact',head:true}).eq('user_id', currentUser.id),
    sb.from('follows').select('*', {count:'exact',head:true}).eq('following_id', currentUser.id),
    sb.from('events').select('*', {count:'exact',head:true}).eq('organiser_id', currentUser.id),
  ]);

  document.getElementById('stat-posts').textContent = postsCount || 0;
  document.getElementById('stat-followers').textContent = followersCount || 0;
  document.getElementById('stat-events').textContent = eventsCount || 0;
}

function previewImg(input) {
  if (!input.files?.[0]) return;
  _imgFile = input.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    const drop = document.getElementById('img-drop');
    drop.innerHTML = '<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>';
  };
  reader.readAsDataURL(_imgFile);
}

async function submitPost() {
  const caption = document.getElementById('post-caption').value.trim();
  const evTag   = document.getElementById('post-event-tag').value.trim();
  if (!caption && !_imgFile) return toast('Add a caption or image to post', 'err');

  const btn = document.getElementById('post-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Publishing…';

  try {
    let imageUrl = null;
    if (_imgFile) {
      const ext  = _imgFile.name.split('.').pop() || 'jpg';
      const path = currentUser.id + '/' + Date.now() + '.' + ext;
      const { error: upErr } = await sb.storage.from('post-images').upload(path, _imgFile, { upsert: false });
      if (!upErr) {
        const { data: { publicUrl } } = sb.storage.from('post-images').getPublicUrl(path);
        imageUrl = publicUrl;
      }
    }

    const res = await fetch('/api/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _token },
      body: JSON.stringify({ caption, image_url: imageUrl, event_name: evTag || null, post_type: 'organizer' })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Post failed');

    toast('🔥 Published to feed!', 'ok');
    document.getElementById('post-caption').value = '';
    document.getElementById('post-event-tag').value = '';
    document.getElementById('img-drop').innerHTML = '<span style="font-size:1.8rem">🖼</span><span style="font-size:.78rem;color:var(--mu)">Tap to add an image (optional)</span>';
    _imgFile = null;
    document.getElementById('stat-posts').textContent = parseInt(document.getElementById('stat-posts').textContent||0)+1;
  } catch(e) {
    toast('Error: ' + e.message, 'err');
  }
  btn.disabled = false; btn.textContent = 'Publish to Feed ��';
}

async function submitEvent() {
  const name  = document.getElementById('ev-name').value.trim();
  const date  = document.getElementById('ev-date').value;
  const time  = document.getElementById('ev-time').value;
  const venue = document.getElementById('ev-venue').value.trim();
  const city  = document.getElementById('ev-city').value.trim();
  const price = parseFloat(document.getElementById('ev-price').value) || 0;
  const genre = document.getElementById('ev-genre').value;
  const desc  = document.getElementById('ev-desc').value.trim();

  if (!name) return toast('Enter an event name', 'err');
  if (!date) return toast('Select a date', 'err');
  if (!venue) return toast('Enter a venue', 'err');
  if (!city)  return toast('Enter a city', 'err');

  const btn = document.getElementById('ev-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Creating…';

  try {
    const eventId = 'org_' + currentUser.id.slice(0,8) + '_' + Date.now();
    const dateLocal = date + (time ? 'T'+time+':00' : 'T20:00:00');

    const { error } = await sb.from('events').insert({
      id: eventId,
      name,
      date_local: dateLocal,
      venue_name: venue,
      city,
      province: currentProfile.province || null,
      genre: genre || 'other',
      description: desc || null,
      price_min: price,
      price_max: price,
      currency: 'ZAR',
      organiser_name: currentProfile.display_name || currentUser.email?.split('@')[0],
      organiser_id: currentUser.id,
      is_active: true,
      source: 'organizer',
    });
    if (error) throw new Error(error.message);

    await fetch('/api/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _token },
      body: JSON.stringify({
        caption: '🎟 ' + name + ' — ' + venue + ', ' + city + ' · ' + date + (price > 0 ? ' · R' + price : ' · FREE') + (desc ? '\n'+desc : ''),
        event_id: eventId,
        event_name: name,
        post_type: 'organizer'
      })
    }).catch(() => {});

    toast('🎉 Event created and posted to feed!', 'ok');
    document.getElementById('ev-name').value = '';
    document.getElementById('ev-date').value = '';
    document.getElementById('ev-time').value = '';
    document.getElementById('ev-venue').value = '';
    document.getElementById('ev-city').value = '';
    document.getElementById('ev-price').value = '';
    document.getElementById('ev-genre').value = '';
    document.getElementById('ev-desc').value = '';
    document.getElementById('stat-events').textContent = parseInt(document.getElementById('stat-events').textContent||0)+1;
  } catch(e) {
    toast('Error: ' + e.message, 'err');
  }
  btn.disabled = false; btn.textContent = 'Create Event 🎉';
}

async function loadMyPosts() {
  const card = document.getElementById('my-posts-card');
  card.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const { data: posts, error } = await sb.from('posts').select('id,caption,image_url,created_at,post_type').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(30);
    if (error) throw error;
    if (!posts?.length) { card.innerHTML = '<div class="empty">No posts yet. Share your first update above!</div>'; return; }

    card.innerHTML = posts.map(p => '<div class="post-item"><div class="post-row">'+(p.image_url ? '<img class="post-img-thumb" src="'+x(p.image_url)+'" loading="lazy" onerror="this.style.display=\u0027none\u0027"/>' : '')+'<div style="flex:1;min-width:0"><div class="post-cap">'+x(p.caption || '(no caption)')+'</div><div class="post-meta">'+new Date(p.created_at).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'})+' · '+(p.post_type||'post')+'</div></div><button class="del-btn" onclick="deletePost(\u0027'+x(p.id)+'\u0027,this)">Delete</button></div></div>').join('');
  } catch(e) {
    card.innerHTML = '<div class="empty">Could not load posts</div>';
  }
}

async function deletePost(postId, btn) {
  if (!confirm('Delete this post?')) return;
  btn.textContent = '…';
  const { error } = await sb.from('posts').delete().eq('id', postId).eq('user_id', currentUser.id);
  if (error) { toast('Delete failed', 'err'); btn.textContent = 'Delete'; return; }
  btn.closest('.post-item').remove();
  const n = parseInt(document.getElementById('stat-posts').textContent||0)-1;
  document.getElementById('stat-posts').textContent = Math.max(0,n);
  toast('Post deleted', 'ok');
}

init();
</script>
</body>
</html>
