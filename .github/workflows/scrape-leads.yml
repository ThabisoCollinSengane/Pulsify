name: Scrape Leads

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday 05:00 UTC (07:00 SAST)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  google:
    name: Google Places Scraper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Scrape Google Places
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/scrape-google-places.js

  social:
    name: Social Media Scraper (Apify)
    runs-on: ubuntu-latest
    needs: google          # run after Google to avoid parallel Supabase writes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Scrape TikTok / Instagram / Facebook via Apify
        env:
          APIFY_TOKEN:          ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/scrape-social.js
