name: Scrape Leads

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday 05:00 UTC (07:00 SAST)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  google:
    name: Google Places (General SA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Scrape Google Places
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/scrape-google-places.js

  google-venues:
    name: Google Places (Durban & JHB Venues)
    runs-on: ubuntu-latest
    needs: google
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Scrape Durban & JHB venues
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/scrape-durban-jhb-venues.js

  social:
    name: Social (General SA — Apify)
    runs-on: ubuntu-latest
    needs: google-venues
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Scrape TikTok / Instagram / Facebook (SA)
        env:
          APIFY_TOKEN:          ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/scrape-social.js

  social-venues:
    name: Social (Durban & JHB Venues — Apify)
    runs-on: ubuntu-latest
    needs: social
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Scrape TikTok / Instagram / Facebook (Durban & JHB venues)
        env:
          APIFY_TOKEN:          ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/scrape-social-venues.js
