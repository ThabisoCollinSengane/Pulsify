name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  deploy:
    name: Vercel Deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "ERROR: VERCEL_TOKEN secret is not set" && exit 1; fi
          if [ -z "$VERCEL_ORG_ID" ]; then echo "ERROR: VERCEL_ORG_ID secret is not set" && exit 1; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "ERROR: VERCEL_PROJECT_ID secret is not set" && exit 1; fi
          echo "All secrets present"

      # Production deploy — ONLY from main. This is the single source of truth for
      # pulsefy.co.za. Feature branches can never clobber the production alias.
      - name: Deploy to Production (main only)
        if: github.ref == 'refs/heads/main'
        run: npx vercel --prod --yes --force --token=$VERCEL_TOKEN

      # Preview deploy — for claude/** feature branches. Produces a unique preview
      # URL and never touches production. Merge to main to release.
      - name: Deploy Preview (feature branches)
        if: github.ref != 'refs/heads/main'
        run: npx vercel --yes --token=$VERCEL_TOKEN
