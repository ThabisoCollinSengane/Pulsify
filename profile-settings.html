<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Profile Settings — Pulsify</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #05080F;
  color: #F0EEF8;
  font-family: 'DM Sans', sans-serif;
  padding: 20px;
  padding-top: 80px;
}
.tb {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 58px;
  background: rgba(5,8,15,.96);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,.07);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
}
.back {
  background: none;
  border: none;
  color: #9997B0;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.tb-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
}
.sec {
  background: #090D1A;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 16px;
  margin-bottom: 16px;
  overflow: hidden;
}
.sec-head {
  padding: 14px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #5A5870;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
.field {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
.field:last-child {
  border-bottom: none;
}
.lbl {
  display: block;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #9997B0;
  margin-bottom: 6px;
}
.inp {
  width: 100%;
  background: #0D1424;
  border: 1.5px solid rgba(255,255,255,.07);
  border-radius: 10px;
  padding: 11px 14px;
  color: #F0EEF8;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
}
.inp:focus {
  border-color: #FF5C00;
}
select.inp {
  appearance: none;
  cursor: pointer;
}
textarea.inp {
  resize: vertical;
  min-height: 70px;
}
.gg {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 14px;
}
.gc {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #0D1424;
  border: 1.5px solid rgba(255,255,255,.07);
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.gc.on {
  border-color: #FF5C00;
  background: rgba(255,92,0,.08);
}
.gc-lbl {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: #5A5870;
}
.gc.on .gc-lbl {
  color: #FF5C00;
}
.gc-chk {
  margin-left: auto;
  color: #FF5C00;
  font-size: 14px;
  opacity: 0;
}
.gc.on .gc-chk {
  opacity: 1;
}
.save-btn {
  width: 100%;
  background: linear-gradient(135deg, #B026FF, #FF5C00);
  color: white;
  border: none;
  padding: 15px;
  border-radius: 50px;
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 10px;
}
.out-btn {
  width: 100%;
  background: rgba(255,45,120,.07);
  border: 1px solid rgba(255,45,120,.22);
  color: #FF2D78;
  border-radius: 50px;
  padding: 13px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #0D1424;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 50px;
  padding: 10px 22px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: white;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
}
.toast.ok {
  border-color: rgba(198,255,74,.4);
  color: #C6FF4A;
}
.toast.err {
  border-color: rgba(255,45,120,.4);
  color: #FF2D78;
}
</style>
</head>
<body>

<div class="tb">
  <button class="back" onclick="history.back()">← Back</button>
  <span class="tb-title">Profile Settings</span>
  <div style="width: 40px;"></div>
</div>

<div class="sec">
  <div class="sec-head">Personal Information</div>
  <div class="field">
    <label class="lbl">Display Name</label>
    <input class="inp" id="display-name" type="text" placeholder="Your name"/>
  </div>
  <div class="field">
    <label class="lbl">Username</label>
    <input class="inp" id="username" type="text" placeholder="@username"/>
  </div>
  <div class="field">
    <label class="lbl">Email</label>
    <input class="inp" id="email-field" type="email" disabled/>
  </div>
  <div class="field">
    <label class="lbl">Bio</label>
    <textarea class="inp" id="bio" placeholder="Tell us about yourself..."></textarea>
  </div>
  <div class="field">
    <label class="lbl">Province</label>
    <select class="inp" id="province">
      <option value="">Select...</option>
      <option value="KZN">KwaZulu-Natal</option>
      <option value="GP">Gauteng</option>
      <option value="WC">Western Cape</option>
      <option value="EC">Eastern Cape</option>
      <option value="MP">Mpumalanga</option>
      <option value="LP">Limpopo</option>
      <option value="NW">North West</option>
      <option value="FS">Free State</option>
      <option value="NC">Northern Cape</option>
    </select>
  </div>
  <div class="field">
    <label class="lbl">City / Suburb</label>
    <input class="inp" id="city" type="text" placeholder="e.g. Durban, Soweto"/>
  </div>
</div>

<div class="sec">
  <div class="sec-head">Music Preferences</div>
  <div class="gg" id="genres-container"></div>
</div>

<button class="save-btn" id="save-btn">💾 Save All Changes</button>
<button class="out-btn" id="logout-btn">🚪 Sign Out</button>

<div class="toast" id="toast"></div>

<script>
// Supabase config
const SUPA_URL = 'https://cjzewfvtdayjgjdpdmln.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqemV3ZnZ0ZGF5amdqZHBkbWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTg0MjYsImV4cCI6MjA5MTQzNDQyNn0.KQ80RmaB6cfA0dkcT-pdTe53fwyUrrIBeVJtToWF_Mk';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// Available genres
const GENRES_LIST = [
  { id: 'amapiano', label: '🎶 Amapiano' },
  { id: 'gqom', label: '🔊 Gqom' },
  { id: 'hiphop', label: '🎤 Hip Hop' },
  { id: 'house', label: '🎧 House' },
  { id: 'afrobeats', label: '🥁 Afrobeats' },
  { id: 'rock', label: '🎸 Rock' },
  { id: 'gospel', label: '🙏 Gospel' },
  { id: 'jazz', label: '🎷 Jazz' },
  { id: 'sport', label: '⚽ Sport' },
  { id: 'maskandi', label: '🪗 Maskandi' }
];

let currentUser = null;
let selectedGenresSet = new Set();

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (type || '') + ' show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function renderGenreChips() {
  const container = document.getElementById('genres-container');
  if (!container) return;
  
  container.innerHTML = '';
  
  GENRES_LIST.forEach(genre => {
    const div = document.createElement('div');
    div.className = 'gc' + (selectedGenresSet.has(genre.id) ? ' on' : '');
    div.setAttribute('data-genre', genre.id);
    div.innerHTML = `
      <span class="gc-lbl">${genre.label}</span>
      <span class="gc-chk">✓</span>
    `;
    div.onclick = (function(g) {
      return function() {
        if (selectedGenresSet.has(g.id)) {
          selectedGenresSet.delete(g.id);
          this.classList.remove('on');
        } else {
          selectedGenresSet.add(g.id);
          this.classList.add('on');
        }
        console.log('Selected genres:', Array.from(selectedGenresSet));
      };
    })(genre);
    container.appendChild(div);
  });
}

async function loadProfile() {
  console.log('Loading profile...');
  
  const { data: { session }, error: sessionError } = await sb.auth.getSession();
  
  if (sessionError) {
    console.error('Session error:', sessionError);
    showToast('Session error', 'err');
    return;
  }
  
  if (!session) {
    console.log('No session, redirecting to signin');
    window.location.href = 'signin.html';
    return;
  }
  
  currentUser = session.user;
  console.log('User email:', currentUser.email);
  
  document.getElementById('email-field').value = currentUser.email || '';
  
  const { data: profile, error: profileError } = await sb
    .from('profiles')
    .select('*')
    .eq('id', currentUser.id)
    .single();
  
  if (profileError) {
    console.error('Profile error:', profileError);
  } else if (profile) {
    console.log('Profile data:', profile);
    document.getElementById('display-name').value = profile.display_name || '';
    document.getElementById('username').value = profile.username || '';
    document.getElementById('bio').value = profile.bio || '';
    document.getElementById('province').value = profile.province || '';
    document.getElementById('city').value = profile.city || '';
    
    if (profile.genres && Array.isArray(profile.genres)) {
      selectedGenresSet.clear();
      profile.genres.forEach(g => selectedGenresSet.add(g));
    }
  }
  
  renderGenreChips();
}

async function saveProfile() {
  console.log('Save button clicked');
  
  if (!currentUser) {
    showToast('Please sign in again', 'err');
    return;
  }
  
  const displayName = document.getElementById('display-name').value.trim();
  const username = document.getElementById('username').value.trim();
  const bio = document.getElementById('bio').value.trim();
  const province = document.getElementById('province').value;
  const city = document.getElementById('city').value.trim();
  const genresArray = Array.from(selectedGenresSet);
  
  console.log('Saving:', { displayName, username, bio, province, city, genresArray });
  
  const updateData = {
    display_name: displayName || null,
    username: username || null,
    bio: bio || null,
    province: province || null,
    city: city || null,
    genres: genresArray,
    updated_at: new Date().toISOString()
  };
  
  const { error } = await sb
    .from('profiles')
    .update(updateData)
    .eq('id', currentUser.id);
  
  if (error) {
    console.error('Save error:', error);
    showToast('Error: ' + error.message, 'err');
  } else {
    console.log('Save successful');
    showToast('✅ All changes saved!', 'ok');
  }
}

async function logoutUser() {
  console.log('Logout clicked');
  await sb.auth.signOut();
  window.location.href = 'signin.html';
}

document.addEventListener('DOMContentLoaded', () => {
  console.log('DOM ready, setting up event listeners');
  
  const saveBtn = document.getElementById('save-btn');
  const logoutBtn = document.getElementById('logout-btn');
  
  if (saveBtn) {
    saveBtn.onclick = saveProfile;
    console.log('Save button attached');
  }
  
  if (logoutBtn) {
    logoutBtn.onclick = logoutUser;
    console.log('Logout button attached');
  }
  
  loadProfile();
});
</script>
</body>
</html>
